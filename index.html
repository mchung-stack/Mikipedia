<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mikipedia — 探索知識的世界</title>
<style>
:root {
  --primary: #5B21B6;
  --primary-dark: #4C1D95;
  --primary-light: #7C3AED;
  --primary-pale: #A78BFA;
  --primary-ghost: #C4B5FD;
  --bg: #F5F3FF;
  --bg-light: #FAFAFE;
  --surface: #FFFFFF;
  --surface-alt: #F8F7FF;
  --text: #1F2937;
  --text-secondary: #6B7280;
  --text-tertiary: #9CA3AF;
  --border: #E9D5FF;
  --border-light: #F3E8FF;
  --shadow: rgba(91, 33, 182, 0.08);
  --shadow-md: rgba(91, 33, 182, 0.12);
  --gold: #B7942E;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --font-serif: 'Songti SC', 'STSong', 'SimSun', 'Times New Roman', serif', 'STSong', 'SimSun', 'Times New Roman', serif;
  --font-sans: -apple-system, 'PingFang SC', 'Microsoft JhengHei', 'Helvetica Neue', sans-serif;
  --transition: 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Subtle texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 70%, rgba(124, 58, 237, 0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 50%, rgba(167, 139, 250, 0.03) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  z-index: 1;
  background: rgba(245, 243, 255, 0.7);
  backdrop-filter: blur(20px);
  border-left: 1px solid var(--border-light);
  border-right: 1px solid var(--border-light);
  box-shadow: 0 0 60px var(--shadow), 0 0 120px rgba(91, 33, 182, 0.03);
}

/* ── Header ── */
.header {
  padding: 48px 24px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(245, 243, 255, 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-light);
}

.header-left { display: flex; flex-direction: column; }

.logo {
  font-family: var(--font-serif);
  font-size: 30px;
  font-weight: 900;
  color: var(--primary-dark);
  letter-spacing: -0.5px;
  line-height: 1;
}

.logo-accent {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: var(--primary-light);
  border-radius: 2px;
  margin-left: 2px;
  vertical-align: super;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.8); }
}

.subtitle {
  font-family: var(--font-serif);
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
  font-style: italic;
}

.header-actions {
  display: flex;
  gap: 8px;
}

.header-btn {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  background: var(--surface);
  border: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.header-btn:hover {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(91, 33, 182, 0.25);
}

/* ── Search ── */
.search-wrapper {
  padding: 12px 24px;
  position: sticky;
  top: 100px;
  z-index: 99;
  background: rgba(245, 243, 255, 0.85);
  backdrop-filter: blur(16px);
}

.search-bar {
  display: flex;
  align-items: center;
  background: var(--surface);
  border-radius: var(--radius-md);
  padding: 0 16px;
  border: 1px solid var(--border-light);
  transition: all var(--transition);
  cursor: text;
  box-shadow: 0 1px 3px var(--shadow);
}
.search-bar:focus-within {
  border-color: var(--primary-pale);
  box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15), 0 2px 8px var(--shadow-md);
}
.search-bar input {
  flex: 1;
  border: none;
  background: none;
  padding: 14px 0;
  font-size: 15px;
  font-family: var(--font-sans);
  color: var(--text);
  outline: none;
}
.search-bar input::placeholder { color: var(--text-tertiary); }
.search-icon { font-size: 16px; margin-right: 10px; opacity: 0.6; }

/* ── Content ── */
.content {
  padding: 8px 24px 120px;
}

.section-title {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin: 20px 0 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Category Cards ── */
.categories-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.cat-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 18px 14px;
  text-align: center;
  cursor: pointer;
  border: 1px solid var(--border-light);
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.cat-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(167, 139, 250, 0.06), transparent);
  opacity: 0;
  transition: opacity var(--transition);
}
.cat-card:hover::before { opacity: 1; }
.cat-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px var(--shadow-md);
  border-color: var(--primary-pale);
}
.cat-card:active { transform: scale(0.97); }

.cat-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin: 0 auto 10px;
}

.cat-title {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}
.cat-count {
  font-size: 11px;
  color: var(--text-tertiary);
}

/* ── Topic Detail View ── */
.topic-view {
  display: none;
  animation: fadeSlideIn 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
}
.topic-view.active { display: block; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.back-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-top: 4px;
}

.back-btn {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  cursor: pointer;
  transition: all var(--transition);
  color: var(--primary-light);
  font-weight: 700;
}
.back-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

.breadcrumb {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-sans);
}

.topic-header { margin-bottom: 20px; }
.topic-h1 {
  font-family: var(--font-serif);
  font-size: 26px;
  font-weight: 700;
  color: var(--primary-dark);
  margin-bottom: 6px;
  line-height: 1.3;
}
.topic-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.topic-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border-light);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-sans);
  color: var(--text-secondary);
}
.action-btn:hover {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(91, 33, 182, 0.2);
}
.action-btn.bookmarked { background: #FEF3C7; border-color: #F59E0B; color: #B45309; }

/* ── Collapsible Accordion ── */
.accordion { margin-top: 4px; }

.accordion-item { margin-bottom: 2px; }

.accordion-header {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all var(--transition);
  position: relative;
  user-select: none;
}
.accordion-header:hover { background: rgba(167, 139, 250, 0.06); }

.accordion-header .arrow {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
  transition: transform var(--transition);
  font-size: 10px;
  color: var(--primary-light);
  flex-shrink: 0;
}
.accordion-item.open > .accordion-header .arrow { transform: rotate(90deg); }

.accordion-header .dot {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
  flex-shrink: 0;
}
.accordion-header .dot::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--primary-ghost);
}

.accordion-title {
  font-weight: 500;
  color: var(--text);
  flex: 1;
  line-height: 1.4;
}

/* Depth styles */
.depth-0 .accordion-title { font-family: var(--font-serif); font-size: 18px; font-weight: 700; color: var(--primary-dark); }
.depth-1 .accordion-title { font-family: var(--font-serif); font-size: 16px; font-weight: 600; color: var(--primary); }
.depth-2 .accordion-title { font-size: 14px; font-weight: 500; }
.depth-3 .accordion-title { font-size: 13px; font-weight: 400; color: var(--text-secondary); }

.depth-1 > .accordion-header { border-left: 3px solid var(--primary-light); padding-left: 28px; background: var(--surface); }
.depth-2 > .accordion-header { border-left: 3px solid var(--primary-pale); padding-left: 42px; background: var(--surface-alt); }
.depth-3 > .accordion-header { border-left: 2px solid var(--border); padding-left: 56px; }

.accordion-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.4s cubic-bezier(0.22, 0.61, 0.36, 1), padding 0.4s ease;
}
.accordion-item.open > .accordion-body {
  max-height: 2000px;
}

.accordion-content {
  font-size: 13px;
  line-height: 1.75;
  color: var(--text-secondary);
  padding: 10px 16px 16px;
}
.depth-0 > .accordion-body .accordion-content { padding-left: 28px; }
.depth-1 > .accordion-body .accordion-content { padding-left: 42px; }
.depth-2 > .accordion-body .accordion-content { padding-left: 56px; }

/* ── Home View Transitions ── */
.home-view { display: block; }
.home-view.hidden { display: none; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--primary-dark);
  color: white;
  padding: 14px 24px;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-family: var(--font-sans);
  font-weight: 500;
  z-index: 999;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
  box-shadow: 0 12px 32px rgba(76, 29, 149, 0.35);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Footer ── */
.app-footer {
  text-align: center;
  padding: 32px 24px 48px;
}
.app-footer p { font-size: 12px; color: var(--text-tertiary); }
.app-footer .divider {
  width: 40px;
  height: 1px;
  background: var(--border);
  margin: 14px auto;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .app { max-width: 100%; border: none; }
  .header { padding: 40px 16px 12px; }
  .search-wrapper { padding: 10px 16px; }
  .content { padding: 8px 16px 100px; }
  .categories-grid { gap: 8px; }
  .cat-card { padding: 14px 10px; }
}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">Mikipedia<span class="logo-accent"></span></div>
      <div class="subtitle">探索知識的世界</div>
    </div>
    <div class="header-actions">
      <button class="header-btn" title="收藏" onclick="showToast('⭐ 已加入收藏')">⭐</button>
      <button class="header-btn" title="離線文章" onclick="showToast('📥 已儲存為離線閱讀')">📥</button>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="search-wrapper">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="搜索主題..." id="searchInput" oninput="handleSearch()">
    </div>
  </div>

  <!-- Content Area -->
  <div class="content" id="contentArea">
    <!-- Home View -->
    <div class="home-view" id="homeView">
      <div class="section-title">知識分類</div>
      <div class="categories-grid" id="categoriesGrid"></div>
      <div class="app-footer">
        <div class="divider"></div>
        <p>涵蓋 7 大分類 · 42+ 個主題</p>
        <p style="margin-top:4px">層層深入 · 大學入門級深度</p>
      </div>
    </div>
    <!-- Topic Detail View -->
    <div class="topic-view" id="topicView"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>

const categories = [{"id":"history","title":"歷史","icon":"📜","color":"#7C3AED","description":"縱覽古今，涵蓋中國與世界歷史，從遠古文明至現代發展","topics":[{"id":"china-ancient","title":"中國古代史","category":"history","description":"從先秦至明清，跨越五千年的中華文明演進","icon":"🏯","sections":[{"id":"ca-pre-qin","title":"先秦時期（約前2070–前221）","content":"先秦時期是中國文明的發軔與奠基階段，涵蓋夏、商、周三代及春秋戰國。這一時期奠定了中國政治制度、哲學思想、文字體系與文化傳統的基礎框架。從部落聯盟到封建王朝，從甲骨卜辭到百家爭鳴，華夏文明的核心基因在此時期全部成形。","subsections":[{"id":"ca-xia","title":"夏朝（約前2070–前1600）","content":"夏朝被認為是中國歷史上第一個世襲王朝。《史記·夏本紀》記載，禹因治水有功，受舜禪讓而為首領，定都陽城（今河南登封）。禹將天下劃分為九州，建立了中國最早的行政區劃體系。禹之子啟打破了禪讓傳統，開啟了「家天下」的世襲制度。夏朝共傳十四代、十七王，歷時約470年。考古學上與夏朝相關的遺址以河南偃師的二里頭文化遺址最為重要——發現了大型宮殿基址、青銅冶鑄作坊和禮器，顯示出成熟的青銅文明和社會分層。由於缺乏同時期的文字記載，夏朝的存在仍有爭議，但二里頭文化的考古發現提供了有力佐證。\n\n• 禹治水的具體方法：改「堵」為「疏」——順應水性將洪水疏導入海，而非其父鯀的築堤堵塞，歷時十三年，「三過家門而不入」\n• 九州劃分：冀、兗、青、徐、揚、荊、豫、梁、雍——每州按土壤肥力分為九等以確定賦稅等級\n• 二里頭文化分期：一期（約前1900–前1750）為形成期、二期為發展期、三期為鼎盛期（大型宮殿建成）、四期為衰落期\n• 二里頭出土的綠松石龍形器（長64.5厘米，由2000餘片綠松石片鑲嵌而成）被譽為「中華第一龍」\n• 夏朝世系：禹→啟→太康→仲康→相→少康→杼→槐→芒→泄→不降→扃→廑→孔甲→皋→發→桀（末代暴君）"},{"id":"ca-shang","title":"商朝（約前1600–前1046）","content":"商朝是中國歷史上第一個有同時期文字（甲骨文）記載的王朝。商族起源於黃河下游，商湯滅夏桀後建立商朝，傳十七世、三十一王，歷時約550年。","subsections":[{"id":"ca-shang-politics","title":"政治與社會結構","content":"商朝政治制度以王權為核心，王被視為神的代表和最高祭司。商王之下設有尹（相當於後世的宰相）和各級官職如小臣、多尹、史、卜等，形成了較為成熟的官僚體系。社會結構分為貴族（王族、諸侯）、平民和奴隸三級。商朝實行內外服制度：內服為王畿直轄區，外服為諸侯領地。商朝軍隊以戰車（由兩匹馬拉動，載三人：馭手、弓箭手、持戈者）為主力，青銅兵器（戈、矛、鉞、刀）廣泛使用。\n\n• 伊尹輔政：出身庖廚（廚師）的傳奇宰相，輔助商湯滅夏，後在太甲失德時將其放逐於桐宮三年、待其悔改後迎回復位——「伊尹放太甲」成為後世權臣廢立君主的道德標竿\n• 商朝官僚體系層級：內服（王畿官員）包括尹（最高輔政）、小臣（王室侍從和管理者）、多尹（各類事務官）、史（文書記錄）、卜（占卜）、作冊（文書起草）\n• 商朝軍隊構成：戰車兵（貴族和自由民）、步兵（平民）、徒兵（奴隸）三級\n• 內外服制度下的重要方國：周方（後來的周朝先祖）、羌方（甘青地區）、土方、鬼方（北方勁敵，商王武丁曾用三年時間征伐鬼方）\n• 甲骨文中「眾」字出現數百次，指從事集體農業勞動的平民階層——「王大令眾人曰：協田（集體耕作）」"},{"id":"ca-shang-culture","title":"文化與技術成就","content":"甲骨文是中國已知最早的成熟文字系統，發現於河南安陽殷墟，刻寫於龜甲和獸骨之上。甲骨文已經是具備象形、指事、會意、形聲等六書結構的體系化文字，單字總數約4000–5000個，其中約1500個已被辨識。青銅器的鑄造技術達到頂峰：后母戊鼎（原稱司母戊鼎）高133厘米，重832.84公斤，是世界已出土最重的青銅器。商朝人極度重視祭祀與占卜，祭祀對象包括上帝、祖先神和自然神。天文曆法方面，商朝已使用陰陽合曆，有平年（12個月）和閏年（13個月）之分，並能記錄日食和月食。\n\n• 甲骨占卜完整流程：1）整治甲骨（鋸削打磨龜甲或牛肩胛骨）→2）鑽鑿（在背面鑽出橢圓形凹槽和鑿出棗核形凹槽）→3）灼燒（以燃燒的硬木枝灼燙鑽鑿處使正面產生裂紋）→4）判斷吉凶（由商王或貞人根據裂紋走向解讀）→5）刻辭記錄（將占卜時間、貞人、問題、結果刻於甲骨上）\n• 后母戊鼎鑄造工藝：使用陶範分鑄法——鼎身用8塊外範、鼎足各用2塊外範、鼎耳分開鑄造後與鼎身焊接，推測需要約200–300名工匠協作完成\n• 商代玉器：以新疆和闐玉（軟玉）為主要材料，主要器型包括璧（祭天）、琮（祭地）、圭（禮器）、璋（禮器）、玦（耳飾）、環（佩飾）\n• 商代音樂：出土的編鐃（三件或五件一組的青銅打擊樂器）、石磬（特磬）、陶塤（吹奏樂器）表明商代已有成熟的宮廷音樂體系\n• 甲骨文中的天文記錄：月食記錄5次、日食記錄可能多達10次、新星（客星）記錄1次——這些是世界上最早的天文觀測記錄之一"}]},{"id":"ca-zhou","title":"周朝（前1046–前256）","content":"周朝是中國歷史上延續時間最長的王朝（約790年），分為西周和東周，東周又分為春秋和戰國兩個時期。周朝建立了對中國影響深遠的宗法封建制度和禮樂文化。","subsections":[{"id":"ca-western-zhou","title":"西周（前1046–前771）","content":"周族起源於陝西渭水流域。周武王姬發在牧野之戰中擊敗商紂王，建立周朝，定都鎬京（今西安附近）。周公姬旦（武王之弟）在武王去世後攝政七年，平定了三監之亂（商朝遺民與周室內部的叛亂），並進行了一系列制度建設——制禮作樂、確立宗法制和分封制。","subsections":[{"id":"ca-wzhou-feudalism","title":"封建制度與宗法制度","content":"周朝的封建制度是基於血緣關係的分封體系：周天子將土地和人民分封給宗室子弟和功臣，建立諸侯國（重要封國包括齊、魯、燕、衛、晉等）。諸侯對天子有朝覲、納貢和從征的義務。宗法制度則以嫡長子繼承制為核心——正妻所生的長子（嫡長子）享有優先繼承權，次子和庶子則降為小宗。大宗與小宗的關係形成了一個嚴密的血緣等級體系。這些制度有效地維持了周朝長期的政治穩定，並深刻影響了此後兩千年中國社會的組織方式——家族、宗族、祠堂和族譜等傳統均根源於此。\n\n• 分封制的五等爵位：公（如周公旦封於魯、姜太公封於齊皆為公爵）、侯（大多數姬姓諸侯為侯爵）、伯（如秦國先祖被封為西陲大夫後升伯爵）、子（如楚國最初為子爵後來自稱王）、男（最低等級，封地最小）\n• 禮樂制度的具體體現：天子八佾（8×8=64人舞蹈）、諸侯六佾（48人）、大夫四佾（32人）、士二佾（16人）——孔子曾因魯國大夫季氏「八佾舞於庭」而憤怒「是可忍也孰不可忍也」\n• 周天子直轄領地（王畿）範圍：以鎬京為中心方約千里（約350公里），設有六軍（每軍約12500人，共約75000人）常備軍力\n• 諸侯對天子的義務：「比年一小聘，三年一大聘，五年一朝」——每年派大夫級使者朝貢、三年派卿級使者、五年諸侯親自到鎬京朝見\n• 宗法制度的親屬稱謂體系極其精細——父之兄曰伯、父之弟曰叔、母之兄弟曰舅、妻之父曰外舅——反映了宗法社會對血緣關係的精確區分"}]},{"id":"ca-spring-autumn","title":"春秋時期（前770–前476）","content":"公元前771年，犬戎攻入鎬京，周幽王被殺，西周滅亡。次年周平王東遷洛邑（今洛陽），開啟了東周時代。春秋時期以孔子修訂的魯國史書《春秋》而得名。","subsections":[{"id":"ca-spring-hegemons","title":"五霸爭霸與社會變革","content":"周王室東遷後勢力大衰，諸侯國開始爭奪霸權。「春秋五霸」的具體名單有多種說法，最常見的版本為：齊桓公（首位霸主，尊王攘夷）、晉文公（城濮之戰擊敗楚國）、楚莊王（問鼎中原）、吳王闔閭（破楚入郢）和越王勾踐（臥薪嘗膽滅吳）。爭霸戰爭雖然頻繁，但因「禮」的約束，戰爭規模有限，貴族精神依然濃厚。經濟上，鐵器開始使用，牛耕逐步推廣，井田制開始瓦解。\n\n• 管仲改革（齊國）：1）「相地而衰徵」——按土地肥力分等級徵稅、2）「官山海」——鹽鐵官營、3）「四民分業」——士農工商分區居住以便專業化、4）設立「女閭」——最早的官營妓院以增加財政收入\n• 晉文公流亡路線圖：翟國（12年）→衛國（被拒）→齊國（5年，娶齊姜）→曹國（被辱，曹共公偷窺其駢肋）→宋國→楚國（約定「退避三舍」）→秦國（秦穆公助其回國）——共19年、歷經8國\n• 城濮之戰戰術（前632年）：晉軍先「退避三舍」（90里）以兌現對楚成王的承諾並誘敵深入、集中優勢兵力先擊潰楚軍的左右兩翼（陳蔡聯軍）再包圍中軍——是中國軍事史上最早的戰術欺騙案例之一\n• 吳越爭霸時間線：前496年槜李之戰吳王闔閭傷重而死→前494年夫差在夫椒之戰大敗越國→勾踐入吳為奴三年→前482年勾踐趁夫差北上黃池會盟偷襲吳都→前473年越滅吳\n• 楚國崛起路徑：從子爵小邦→熊通自立為武王（前704年，第一個稱王的諸侯）→楚莊王問鼎中原→戰國時期成為面積最大的國家（約佔七國總面積的三分之一）"},{"id":"ca-spring-thought","title":"思想文化的萌芽","content":"春秋末期是中國思想史上最為關鍵的時期之一。孔子（前551–前479）創立儒家學派，提出「仁」和「禮」的核心概念，主張恢復周禮、推行德治。他開創了私人講學的傳統，據說有弟子三千，賢者七十二人。《論語》記錄了孔子及其弟子的言行，是儒家最重要的經典。老子（據傳與孔子同時代）創立了道家學說，《道德經》以「道可道，非常道」開篇，提出了以「無為」為核心的哲學體系。孔子和老子分別代表了中國思想史上入世和出世的兩大傳統。\n\n• 孔子教學內容——「六藝」：禮（禮儀規範）、樂（音樂）、射（射箭）、御（駕馭馬車）、書（文字書寫）、數（數學計算）\n• 孔門十哲：德行科（顏淵、閔子騫、冉伯牛、仲弓）、言語科（宰我、子貢）、政事科（冉有、子路）、文學科（子游、子夏）\n• 《道德經》的核心辯證思想：「天下皆知美之為美，斯惡已；皆知善之為善，斯不善已」——對立的概念相互依存、相互轉化\n• 老子的政治理想：「小國寡民」——使民「甘其食、美其服、安其居、樂其俗，鄰國相望、雞犬之聲相聞，民至老死不相往來」\n• 孫武（約前545–前470）與《孫子兵法》13篇——「兵者，詭道也」、「知彼知己，百戰不殆」、「不戰而屈人之兵，善之善者也」"}]},{"id":"ca-warring-states","title":"戰國時期（前475–前221）","content":"戰國時期是兼併戰爭空前激烈的時代。經過春秋時期的兼併，形成了齊、楚、燕、韓、趙、魏、秦七個大國（「戰國七雄」），各國紛紛變法圖強以在生存競爭中取勝。","subsections":[{"id":"ca-ws-reforms","title":"變法運動","content":"魏國李悝變法是最早的成功改革，頒布《法經》、推行「盡地力之教」。楚國吳起變法削減貴族特權，但因觸動既得利益者而失敗（吳起被射殺）。秦國商鞅變法（前356、前350年兩次）最為徹底和成功——獎勵耕戰、廢除井田制、推行縣制、統一度量衡、實行連坐法。商鞅雖然最終被車裂而死，但其變法徹底改造了秦國的社會結構和國家體制，使秦國從西陲弱國一躍成為超級強國，為後來的統一天下奠定了不可逆轉的基礎。\n\n• 李悝《法經》六篇體系：盜法（懲治盜竊）、賊法（懲治殺傷）、囚法（審判程序）、捕法（追捕罪犯）、雜法（懲治欺詐賭博等雜罪）、具法（量刑加減的總則）——商鞅帶著《法經》到秦國並在此基礎上制定秦律\n• 商鞅二十等爵制度（從低到高）：1公士→2上造→3簪裊→4不更→5大夫→6官大夫→7公大夫→8公乘→9五大夫→10左庶長→11右庶長→12左更→13中更→14右更→15少上造→16大上造→17駟車庶長→18大庶長→19關內侯→20徹侯——斬獲敵軍甲士一級可升爵一級、賜田一頃、宅九畝\n• 申不害在韓國（前351–前337）推行「術」治——君主以隱密的手段考核和操控臣下：「獨視謂之明、獨聽謂之聰、能獨斷者故可以為天下主」\n• 慎到（約前395–前315）強調「勢」——君主必須掌握絕對權勢：「賢者未足以服眾，而勢位足以屈賢者也」\n• 吳起在魏國創立「魏武卒」——中國最早的職業化精銳部隊：選拔標準為身穿三重鎧甲、手持十二石強弩、背五十支箭和長戈、腰佩劍、攜帶三日口糧、半天內行軍百里——通過選拔者免除全家徭役並賜予田宅"},{"id":"ca-ws-hundred-schools","title":"百家爭鳴","content":"戰國時期是中國思想史上最為輝煌的時代。儒家經孟子（性善論、仁政）和荀子（性惡論、禮法並重）的發展而更加豐富；墨家（墨子創立）提倡兼愛、非攻、尚賢、節用，組織嚴密如軍事團體；道家在莊子手中發展出汪洋恣肆的哲學想像（《逍遙遊》）；法家（韓非子集大成）主張以法治國、以術馭臣、以勢立威，為專制君主提供了系統化的統治理論；名家（公孫龍的白馬非馬論）探討邏輯和語言問題；陰陽家（鄒衍）提出五德終始說解釋歷史循環；縱橫家（蘇秦、張儀）以外交謀略影響國際格局。各家自由爭鳴、互相辯難，使這一時期成為可以和古希臘哲學黃金時代相媲美的思想大爆發時代。\n\n• 孟子的「仁政」具體方案：1）制民之產（每家百畝之田、五畝之宅、種桑養蠶、養雞豬）→2）省刑罰、薄稅斂→3）謹庠序之教（辦學校教化百姓）→4）與民同樂（君主與人民共享歡樂）\n• 荀子的認識論：「心有徵知」——心靈具有對感覺材料進行分析和判斷的能力，「虛壹而靜」（虛心、專一、冷靜）是達到正確認識的條件\n• 墨子「三表法」（檢驗真理的三個標準）：1）本之者——追溯古代聖王的事蹟、2）原之者——考察百姓耳目的事實、3）用之者——應用於國家百姓刑罰政治的實際效果\n• 名家辯題：1）「離堅白」——石頭的「堅」（硬度）和「白」（顏色）是兩種不同的性質，可以被不同的感官分別感知；2）「合同異」——萬物從最大層面看都相同（都是物）、從最小層面看都不同（各自不同），因此「天地一體」\n• 鄒衍的五德終始循環：土（黃帝）→木（夏禹）→金（商湯）→火（周文王）→水（秦朝——取代周的下一德）→土（漢朝——新循環開始）\n• 縱橫家的經典操作：蘇秦說服六國合縱——先到燕國獲得信任→再到趙國說服趙肅侯→依次說服韓魏齊楚→身佩六國相印回到趙國、秦國因此「十五年不敢出函谷關」"}]}]}]},{"id":"ca-qin-han","title":"秦漢時期（前221–220）","content":"秦漢時期是中國歷史上第一個大一統時代。秦始皇建立了中國歷史上第一個中央集權帝國，漢朝則在此基礎上發展成為可與羅馬帝國並列的東方超級大國。","subsections":[{"id":"ca-qin","title":"秦朝（前221–前206）","content":"公元前221年，秦王嬴政滅掉最後的對手齊國，完成了統一。他自稱「始皇帝」，意為第一個皇帝，後世以二世、三世以至萬世相傳。秦始皇在短短十餘年間實施了大規模的制度建設，但其暴政也導致了帝國的迅速崩潰。","subsections":[{"id":"ca-qin-reforms","title":"統一措施與制度改革","content":"政治體制：廢除分封制，全面推行郡縣制——全國劃分為36郡（後增至40餘郡），郡下設縣，由中央直接任命官員管理。中央設立三公九卿制度：三公為丞相（行政）、太尉（軍事）、御史大夫（監察）。文化統一：書同文——以小篆為標準字體（後簡化為隸書），統一了此前各國不統一的漢字書寫；車同軌——統一車輛輪距和道路標準；統一度量衡和貨幣（圓形方孔的「秦半兩」銅錢）。思想控制：採納李斯建議實行焚書令（前213年），除醫藥、卜筮、農書外銷毀民間藏書；坑殺460餘名方士和儒生（前212年，坑儒事件）。\n\n• 郡縣制下的行政層級：郡（設郡守掌行政、郡尉掌軍事、郡監掌監察）→縣（設縣令/長掌全面、縣丞掌文書和司法、縣尉掌治安）→鄉（三老掌教化、嗇夫掌賦稅訴訟、游徼掌治安）→里（里正/里典掌一里事務）→什（十家）→伍（五家）——形成了空前嚴密的基層控制體系\n• 秦朝的標準化措施細節：文字——小篆由李斯作《倉頡篇》、趙高作《爰歷篇》、胡毋敬作《博學篇》三部標準字書推廣；度量衡——在全國各地鑄造和頒發標準的銅量和鐵權（砝碼）；貨幣——秦半兩錢規定「重如其文」即半兩（約8克）、直徑約3厘米\n• 秦朝的交通建設：除了馳道外還修築了「直道」——從咸陽北經上郡直達九原郡（今內蒙古包頭），全長約700公里，用於快速向北方邊境調兵\n• 焚書的具體範圍：非博士官所藏的《詩》、《書》、百家語全部燒毀；醫藥、卜筮、種樹之書不燒；秦國史記不燒；令下三十日內不燒者黥為城旦（刺面並罰做築城勞役）\n• 坑儒的爭議：有學者認為「坑儒」實際上是「坑術士」（方士和煉丹術士而非儒生）——司馬遷《史記》中使用的是「諸生」而非「儒」"},{"id":"ca-qin-projects","title":"大型工程與社會矛盾","content":"修築長城：將原秦、趙、燕三國北部的長城連接起來，西起臨洮、東至遼東，動用數十萬勞工。修建馳道：以咸陽為中心修築通往全國各地的官道，寬50步（約69米）。營建宮殿：阿房宮（僅前殿就可容納萬人）和驪山陵墓（兵馬俑即為其陪葬坑，1974年被農民打井時發現）耗費了大量人力物力。秦朝的暴政——沉重的徭役（全國約2000萬人口中有超過200萬人被徵發服役）、嚴酷的刑法（連坐法、夷三族）和沉重的賦稅——最終導致了陳勝吳廣在大澤鄉的起義（前209年）和全國性的反秦浪潮。公元前206年，劉邦率軍攻入咸陽，秦朝僅存在15年便滅亡了。\n\n• 驪山陵墓的內部結構（據《史記》記載）：地宮「穿三泉（穿透三層地下水）、下銅而致槨（用銅水澆灌加固墓壁）」、墓室中「以水銀為百川江河大海、機相灌輸（以機械裝置使水銀流動模擬江河）」、「上具天文（墓頂鑲嵌寶石模擬日月星辰）、下具地理（地面模塑山川地形）」——2002年對陵墓封土進行的汞含量檢測發現異常高的汞濃度，印證了《史記》的記載\n• 兵馬俑的驚人工藝：每個陶俑均為真人大小（身高175–196厘米不等），千人千面——面部表情、髮髻樣式、鬍鬚形狀各不相同；陶馬與真馬等大，分為戰車馬和騎兵馬兩種\n• 靈渠的工程巧思：利用湘江和灕江在興安附近最近處僅約1.5公里的地理條件，以鏵嘴（分水壩）將湘江水分為南北兩支——北渠匯入湘江、南渠流入灕江——實現了長江水系和珠江水系的連接\n• 秦末起義時間線：前209年7月陳勝吳廣大澤鄉起義→9月陳勝稱王建立張楚政權→前208年陳勝被車夫莊賈殺害→項梁立楚懷王孫心為楚懷王→前207年項羽在鉅鹿之戰破釜沉舟大敗秦軍主力→前206年劉邦入咸陽、秦王子嬰投降"}]},{"id":"ca-han","title":"漢朝（前202–220）","content":"漢朝是中國歷史上最輝煌的王朝之一，也是華夏族從此被稱為「漢族」的時代。","subsections":[{"id":"ca-western-han","title":"西漢（前202–9）","content":"劉邦在楚漢戰爭（前206–前202）中擊敗項羽後稱帝，定都長安（今西安）。西漢前期採取與民休息的黃老之學政策。「文景之治」（漢文帝、漢景帝時期，前180–前141）輕徭薄賦（田賦降至三十稅一）、廢除肉刑，社會經濟得到恢復和發展，國庫充實（「太倉之粟陳陳相因，充溢露積於外」）。","subsections":[{"id":"ca-whan-wudi","title":"漢武帝時代（前141–前87）","content":"漢武帝劉徹是漢朝在位時間最長的皇帝（54年），其統治將漢朝推向了鼎盛。政治上：頒布推恩令（允許諸侯王將封地分給非嫡長子的子孫），巧妙地削弱了諸侯國的力量；設立刺史制度監督地方。經濟上：實行鹽鐵官營、均輸平準等國家干預政策，增加財政收入以支持軍事行動。軍事上：派衛青、霍去病多次北擊匈奴，收復河套地區、打通河西走廊。外交上：派張騫兩次出使西域（前138、前119年），開闢了從長安經中亞通往地中海世界的絲綢之路。文化上：採納董仲舒建議「罷黜百家，獨尊儒術」，設立太學培養儒生，儒家從此成為中國兩千年的正統思想。\n\n• 推恩令的絕妙設計：讓諸侯王「推私恩」將封地分給所有兒子——表面上是皇帝的恩典（允許非嫡長子也能分得封地），實質上是利用諸侯王家族內部矛盾（非嫡長子必然強烈要求分地），使大諸侯國在三代內自然分裂為數十個小侯國\n• 刺史制度的監察內容「六條問事」：1）強宗豪右田宅踰制、以強凌弱→2）郡守不奉詔書、背公向私→3）郡守不恤疑獄、風厲殺人→4）郡守選署不平、苟阿所愛→5）郡守子弟恃怙榮勢、請託所監→6）郡守違公下比、阿附豪強\n• 張騫第一次出使西域路線：長安→隴西→被匈奴俘虜（10年）→逃至大宛→康居→大月氏→大夏→歸途經羌中再被匈奴俘虜（1年多）→前126年逃回長安——出發時100餘人、歸來僅張騫和堂邑父兩人\n• 張騫帶回的西域知識：大宛有汗血寶馬（日行千里、出汗如血）、安息（帕提亞）以銀為錢幣、錢幣上鑄國王頭像（中國此前從未見過）、大夏有蜀布和邛竹杖（來自中國西南——由此推斷從西南另有一條通往西域的道路）\n• 漢武帝時期的文學成就：司馬相如（賦聖——《子虛賦》、《上林賦》）、東方朔（詼諧諷諫——《答客難》）、司馬遷（《史記》——中國第一部紀傳體通史，記載從黃帝到漢武帝約3000年歷史，526500字）"}]},{"id":"ca-eastern-han","title":"東漢（25–220）","content":"王莽篡位建立新朝（9–23）後推行了一系列激進的改革（恢復井田制、改革幣制等），但很快因執行混亂和社會反對而失敗，死於綠林軍之手。劉秀（光武帝）在戰亂中崛起，重建漢朝，定都洛陽。東漢前期出現了「光武中興」和「明章之治」（明帝、章帝時期）的繁榮局面。科技成就卓著：蔡倫改進造紙術（105年），使用樹皮、麻頭、破布和漁網等原料，使紙張成為方便的書寫材料；張衡發明地動儀（132年）和渾天儀，前者能測定地震方向，後者用以演示天體運行。東漢中後期，宦官和外戚交替專權（發生了兩次「黨錮之禍」，大量正直士大夫被禁錮或殺害），政治日益腐敗。184年，張角領導的黃巾起義爆發，雖然很快被鎮壓，卻揭開了東漢崩潰的序幕，天下從此進入群雄割據、三國鼎立的亂世。\n\n• 蔡倫造紙的完整工藝流程：1）選料（樹皮、麻頭、破布、舊漁網）→2）切碎浸泡→3）石灰水蒸煮（去除雜質軟化纖維）→4）搗爛成漿→5）以竹簾抄紙（在紙漿中撈出薄層）→6）壓榨脫水→7）晾乾揭紙——從此紙張成為廉價的書寫材料\n• 張衡地動儀的科學原理：內部設有「都柱」（倒立的重心極高的銅柱——慣性擺），地震波傳來時地面晃動、都柱因慣性向震源方向傾倒、推動槓桿→對應方向的龍口張開→銅球落入蟾蜍口中——西方直到約1700年後才出現類似的地震儀\n• 漢代醫學三大經典：《黃帝內經》（中醫理論基礎——陰陽五行、臟腑經絡學說）、《神農本草經》（最早的藥學專著——收錄365種藥物分為上中下三品）、《傷寒雜病論》（張仲景——臨床診斷治療的系統著作）\n• 兩次黨錮之禍：166年第一次——宦官誣告李膺等「養太學遊士、交結諸郡生徒、共為部黨、誹訕朝廷」→200餘人被禁錮終身；169年第二次——宦官再次大規模搜捕黨人→李膺等100餘人死於獄中、被牽連者達六七百人\n• 黃巾起義的組織基礎：張角以「太平道」傳道十餘年、信徒達數十萬、分為三十六方（大方萬餘人、小方六七千人）、以「蒼天（漢朝）已死、黃天（太平道）當立」為口號、約定甲子年（184年）三月五日全國同時起事——因叛徒告密提前發動"}]}]},{"id":"ca-three-to-tang","title":"三國魏晉南北朝（220–589）","content":"這三百餘年是中國歷史上最為動盪但也極具創造力的分裂時代。戰亂頻繁、政權更迭迅速，但民族融合加速、佛教廣泛傳播、文學藝術綻放異彩。\n\n• 三國時期的人口銳減：東漢永壽三年（157年）人口約5600萬，到三國末期（280年）僅剩約1600萬——損失約70%，是中國歷史上人口減少最劇烈的時期之一\n• 赤壁之戰（208年）的實際規模爭議：傳統說法曹軍83萬（「八十萬大軍」），現代史學家估算曹軍實際約20–25萬、孫劉聯軍約5萬——《三國演義》對戰爭規模進行了大量文學誇張\n• 九品中正制（220年曹丕採納陳群建議創立）：將人才分為九個品級，由各郡的「中正官」根據家世、德行和才能評定——初衷是選賢任能，但實際執行中「上品無寒門、下品無勢族」，演變為門閥士族壟斷官職的工具，直到科舉制度（隋朝）的出現才被打破","subsections":[{"id":"ca-three-kingdoms","title":"三國（220–280）","content":"東漢末年，曹操挾天子以令諸侯，統一北方；劉備在諸葛亮的輔助下割據益州（蜀）；孫權據有江東（吳）。赤壁之戰（208年）中，孫劉聯軍以火攻大敗曹操水軍，奠定了天下三分的基本格局。220年曹丕篡漢自立、建立魏國，221年劉備稱帝建蜀漢，229年孫權稱帝建吳國。三國時期雖然僅60年，但因《三國演義》的文學渲染而成為中國人最為熟悉和喜愛的歷史段落。263年魏滅蜀，265年司馬炎篡魏建立西晉，280年晉滅吳統一天下。"},{"id":"ca-jin-southern-northern","title":"兩晉南北朝","content":"西晉（265–316）短暫統一後，因八王之亂（291–306，司馬氏宗室間的殘酷內鬥）和隨之而來的五胡亂華（匈奴、鮮卑、羯、氐、羌等北方少數民族大規模南下）而崩潰。317年司馬睿在建康（今南京）建立東晉，北方則進入五胡十六國時期。420年東晉被劉宋取代，南方先後經歷宋、齊、梁、陳四朝（合稱南朝）。北方在439年由鮮卑拓跋部建立的北魏統一，後分裂為東魏和西魏，再分別被北齊和北周取代（合稱北朝）。北魏孝文帝（471–499在位）推行漢化改革——遷都洛陽、改鮮卑姓氏為漢姓、禁胡服、提倡胡漢通婚——極大地促進了民族融合。這一時期的文化成就包括：陶淵明的田園詩、王羲之的書法（《蘭亭序》被譽為「天下第一行書」）、顧愷之的人物畫、雲岡和龍門石窟的佛教雕刻等。\n\n• 五胡亂華的五個主要民族及其建立的政權：匈奴（前趙、北涼、夏）、鮮卑（前燕、後燕、南燕、西秦、南涼、北魏→東魏/西魏→北齊/北周）、羯（後趙——石勒建立，對漢族進行大規模屠殺）、氐（前秦——苻堅統一北方後發動淝水之戰（383年）大敗而崩潰、後涼）、羌（後秦）\n• 北魏孝文帝（471–499在位）漢化改革的具體措施：1）遷都洛陽（494年，從平城大同遷到中原腹地洛陽）；2）禁胡服（改穿漢族寬袍大袖的服裝）；3）禁鮮卑語（30歲以下官員在朝中說鮮卑語者免官）；4）改鮮卑姓氏為漢姓（拓跋→元、獨孤→劉、步六孤→陸等共118個姓氏）；5）鼓勵胡漢通婚（孝文帝本人娶漢族高門女子為妃）；6）採用漢族的門閥制度評定姓氏等級\n• 佛教在南北朝的大規模傳播：北魏末年北方有寺廟約3萬座、僧尼約200萬人（佔人口約1/15）；南朝梁武帝（502–549在位）四次「捨身」同泰寺為奴、每次由大臣以億萬錢贖回——佛教的極度膨脹消耗了巨額社會財富，也是北周武帝滅佛（574年）的原因之一"}]},{"id":"ca-sui-tang","title":"隋唐盛世（581–907）","content":"隋唐時期重新統一了中國，並將中國封建文明推向了最高峰。唐朝的開放、包容和繁榮使其成為當時世界上最強大的帝國。","subsections":[{"id":"ca-sui","title":"隋朝（581–618）","content":"隋文帝楊堅（出身關隴軍事貴族集團）於581年篡北周自立，589年滅南陳統一了分裂近300年的中國。隋朝創立科舉制度（以考試選拔官員，打破了魏晉以來門閥士族壟斷官職的局面），確立了三省六部制（中書省決策、門下省審核、尚書省執行；六部為吏戶禮兵刑工），為唐代政治制度奠定了基礎。大運河以洛陽為中心，南至餘杭（今杭州）、北達涿郡（今北京），全長約2700公里，連接了五大水系，極大促進了南北經濟文化交流。然而隋煬帝楊廣好大喜功——營建東都洛陽、開鑿大運河、三征高句麗（均以失敗告終，損失慘重）——導致民怨沸騰、起義四起。618年，隋煬帝在江都（今揚州）被部將宇文化及所殺，隋朝僅存在37年便滅亡了。\n\n• 科舉制度的創立細節：隋文帝於587年下令各州每年選拔三名人才到中央參加考試（「分科取士」——分不同科目考試選拔人才）；隋煬帝於605年正式設立進士科（以詩賦和時務策為考試內容）——這是科舉制度的正式起點，從此打破了門閥士族壟斷官職的局面，為平民開闢了通過讀書和考試進入官僚體系的通道\n• 隋朝大運河的工程數據：以洛陽為中心，分為三段——通濟渠（洛陽→淮河，連接黃河和淮河）、邗溝（淮安→揚州，連接淮河和長江，原為春秋吳王夫差開鑿的舊運河）、永濟渠（洛陽→涿郡今北京，連接黃河和海河）。總長約2700公里，動用約500萬勞工，僅用約6年完成——是古代世界最大的水利工程之一\n• 隋煬帝三征高句麗（612、613、614年）：第一次出動約113萬大軍（號稱200萬），因補給線過長和高句麗的頑強抵抗而失敗——僅約2700人返回。三次征伐導致民怨沸騰→全國性農民起義→隋朝滅亡"},{"id":"ca-tang","title":"唐朝（618–907）","content":"唐朝延續近300年，堪稱中國封建社會的巔峰。","subsections":[{"id":"ca-tang-golden","title":"貞觀之治與開元盛世","content":"唐太宗李世民（626–649在位）通過玄武門之變奪取皇位，但其統治時期開創了中國歷史上著名的「貞觀之治」。他以隋亡為鑑，虛心納諫（魏徵是最著名的諫臣），任用賢能，輕徭薄賦，民族政策開明（被周邊民族尊為「天可汗」），奠定了唐朝強盛的基礎。唐玄宗李隆基前期（開元年間，713–741）將唐朝推向鼎盛——「開元盛世」時期，長安人口超過百萬，是當時世界上最大的城市，來自波斯、阿拉伯、印度、日本、朝鮮等地的商人、僧侶和留學生雲集於此。詩歌在唐朝達到巔峰——李白（浪漫主義，被譽為「詩仙」）、杜甫（現實主義，被譽為「詩聖」）、白居易（《長恨歌》、《琵琶行》）、王維（詩中有畫，畫中有詩）等詩人的作品至今廣泛傳誦。唐朝的開放性體現在各個方面：景教（基督教聶斯脫里派）、祅教、摩尼教和伊斯蘭教都在唐朝傳入中國；鑒真和尚六次東渡日本弘揚佛法；日本派遣了大量遣唐使學習唐朝的制度和文化（至今日本京都的格局仍然模仿長安）。\n\n• 唐朝的開放性體現在哪些方面：1）長安城的國際化——西市和東市聚集了來自波斯、阿拉伯、印度、日本、朝鮮、東南亞等地的商人，胡餅（燒餅）、葡萄酒、胡旋舞在長安流行；2）宗教寬容——景教（基督教聶斯脫里派，635年阿羅本到長安，638年獲准建寺）、祅教（瑣羅亞斯德教/拜火教，波斯人信仰）、摩尼教（明教的前身）和伊斯蘭教（651年大食遣使來唐）都在唐朝自由傳播；3）女性的相對自由——唐代女性可以騎馬、穿男裝、參與社交活動，武則天甚至成為中國唯一的女皇帝\n• 唐詩的分期：初唐（618–713——王勃、楊炯、盧照鄰、駱賓王「初唐四傑」和陳子昂）；盛唐（713–766——李白、杜甫、王維、孟浩然、王之渙、王昌齡等，是唐詩的巔峰期）；中唐（766–835——白居易、元稹、韓愈、柳宗元、劉禹錫等）；晚唐（836–907——李商隱、杜牧「小李杜」、溫庭筠等）\n• 遣唐使的規模和影響：從630年到894年的264年間，日本共派遣了約19次遣唐使（其中約13次成功到達），每次約100–600人，包括大使、副使、留學生、學問僧和技術人員。著名留學生：阿倍仲麻呂（漢名晁衡，在唐朝任官，與李白、王維交好）、吉備真備（將唐朝的曆法、音樂、圍棋和刺繡等文化帶回日本）；學問僧：空海（回國後創立真言宗並創製平假名）、最澄（回國後創立天台宗）。日本京都的棋盤式佈局（平安京）模仿了唐朝長安城的規劃"},{"id":"ca-tang-decline","title":"安史之亂與唐朝衰亡","content":"安史之亂（755–763）是唐朝乃至整個中國歷史的轉折點。身兼范陽、平盧、河東三鎮節度使的安祿山於755年在范陽（今北京）起兵叛亂，一度攻陷洛陽和長安，唐玄宗倉皇逃往四川，途中在馬嵬坡被迫賜死楊貴妃。雖然叛亂最終被平定，但付出了極其慘重的代價：人口從約5200萬銳減至約1700萬；中央政府對地方的控制力嚴重削弱，形成了藩鎮割據的局面；宦官開始掌握禁軍並干預朝政；牛李黨爭（以牛僧孺和李德裕為首的官僚派系鬥爭）持續了近40年。唐朝後期雖有「元和中興」等短暫的復興，但根本問題始終未能解決。875年黃巢起義爆發（「沖天香陣透長安，滿城盡帶黃金甲」），沉重打擊了唐朝的統治基礎。907年，朱溫篡唐自立，唐朝正式滅亡，中國進入五代十國的分裂時期。\n\n• 安史之亂的全局影響：1）人口銳減——戰前唐朝戶口約890萬戶（天寶十三年，754年），戰後僅剩約190萬戶（760年），損失近80%；2）均田制和府兵制瓦解——戰爭導致土地荒蕪和人口大遷移，以均田制為基礎的稅收和兵役制度全面崩潰→轉向兩稅法（780年楊炎推行——按土地和財產多少分夏秋兩次徵稅）和募兵制（職業兵取代義務兵）；3）藩鎮割據——為鎮壓叛亂而賦予地方節度使過大權力，戰後形成「天下盡裂於方鎮」的局面，河北三鎮（盧龍、成德、魏博）實際上成為獨立王國\n• 唐代後期的重大事件時間線：780年楊炎推行兩稅法→805年永貞革新（王叔文集團試圖打擊宦官和藩鎮，僅146天失敗——「二王八司馬事件」）→835年甘露之變（唐文宗與朝臣密謀誅殺宦官失敗→宦官大規模屠殺朝臣，從此宦官完全控制朝政）→845年唐武宗滅佛（拆除寺廟約4600座、令約26萬僧尼還俗、沒收大量寺廟土地和財產）→875年黃巢起義→907年唐朝滅亡"}]}]},{"id":"ca-song-to-qing","title":"宋元明清（960–1912）","content":"這一千年涵蓋了中國封建社會的後半段，經濟重心從北方轉移到南方，商品經濟持續發展，但也經歷了兩次異族統治（元朝和清朝）。","subsections":[{"id":"ca-song","title":"宋朝（960–1279）","content":"宋朝分為北宋（960–1127，定都開封）和南宋（1127–1279，定都臨安即今杭州）。宋朝是中國歷史上經濟、文化和科技最為繁榮的時代之一，GDP總量約佔當時全球的22–25%。","subsections":[{"id":"ca-song-economy","title":"經濟與科技創新","content":"商業革命：打破了唐代坊市分離的限制，開封和臨安成為繁華的商業都市，《清明上河圖》生動描繪了汴京（開封）的繁華景象。世界上最早的紙幣「交子」在北宋四川地區出現（約1023年）。科技發明：畢昇發明活字印刷術（約1040年代），大幅降低了書籍的生產成本；指南針廣泛用於航海（北宋末朱彧《萍洲可談》記載了指南針在航海的應用）；火藥武器開始應用於戰爭（火箭、火炮、火槍等）。沈括的《夢溪筆談》（1088年）記錄了大量科學發現，涵蓋天文、地理、物理、化學等多個領域，被李約瑟譽為「中國科技史上的里程碑」。\n\n• 宋朝「商業革命」的具體表現：1）坊市制度的打破——唐代長安實行嚴格的坊（居住區）市（商業區）分離和夜禁制度，宋代開封和臨安取消了坊市界限和夜禁，沿街開設商鋪、夜市繁榮（《東京夢華錄》記載了開封夜市的盛況）；2）紙幣的出現——北宋四川地區因鐵錢過重不便攜帶，商人自發使用「交子」（紙質信用票據），1023年北宋政府正式發行官交子，這是世界上最早的官方紙幣；3）海上貿易的繁榮——宋代海外貿易規模遠超唐代，在廣州、泉州、明州（寧波）、杭州等港口設立市舶司管理對外貿易，南宋時期海關稅收約佔政府財政收入的15–20%\n• 宋代科技成就列表：1）活字印刷術（畢昇約1040年代——使用膠泥製作的單個字模，排版靈活可重複使用）；2）指南針用於航海（北宋末朱彧《萍洲可談》記載「舟師識地理，夜則觀星，晝則觀日，陰晦則觀指南針」——世界最早使用指南針航海的記錄）；3）火藥武器（突火槍——以竹筒為管內裝火藥和子彈，是槍炮的雛形；震天雷——鐵殼炸彈）；4）水運儀象臺（蘇頌1090年建造——以水力驅動的天文鐘，高約12米，既能演示天體運行又能自動報時，使用了擒縱機構——鐘錶的關鍵技術）"},{"id":"ca-song-culture","title":"文化成就與理學","content":"宋詞是宋朝最具代表性的文學形式，與唐詩並稱。蘇軾（東坡）開創了豪放派詞風（「大江東去，浪淘盡，千古風流人物」）；李清照（易安居士）是婉約派詞人的傑出代表（「尋尋覓覓，冷冷清清，淒淒慘慘戚戚」）；辛棄疾以詞言志，風格豪壯。理學（又稱道學、宋明理學）是宋代最重要的思想成就——周敦頤、張載、程顥、程頤為理學的奠基者，朱熹（1130–1200）集理學之大成，構建了以「理」為核心的龐大哲學體系。陸九淵則提出了「心即理」的主張，與朱熹展開辯論（鵝湖之會，1175年），成為後來心學的思想淵源。\n\n• 宋詞的兩大流派：1）婉約派——題材多為男女愛情和離愁別緒，語言婉轉含蓄。代表人物：柳永（「今宵酒醒何處？楊柳岸，曉風殘月」——慢詞長調的開創者，其詞在當時「凡有井水處即能歌柳詞」）、李清照（「尋尋覓覓，冷冷清清，淒淒慘慘戚戚」——疊字運用出神入化）、秦觀、周邦彥；2）豪放派——題材廣泛、氣勢磅礡。代表人物：蘇軾（「大江東去，浪淘盡，千古風流人物」——以詩為詞，擴大了詞的題材範圍）、辛棄疾（「醉裡挑燈看劍，夢回吹角連營」——以詞言志，將家國情懷注入詞中）\n• 宋代四大書法家（宋四家）：蘇軾（豐腴跌宕、天真爛漫——《黃州寒食帖》為天下第三行書）、黃庭堅（長槍大戟、輻射式結構——江西詩派的創始人，也是書法大家）、米芾（「刷字」——運筆迅疾、八面出鋒，自稱「臣書刷字」）、蔡襄（端莊穩重、法度森嚴——四家中最接近傳統晉唐風格）\n• 宋代繪畫的成就：山水畫——范寬《谿山行旅圖》（北宋全景式山水巔峰）、郭熙《早春圖》（「三遠法」的實踐典範）、李唐《萬壑松風圖》（南宋山水畫轉折點）；人物風俗畫——張擇端《清明上河圖》（描繪汴京清明時節的繁華景象，長528.7厘米、高24.8厘米，畫中約有814人、60餘匹牲畜、28艘船、20餘輛車和170餘棵樹）"}]},{"id":"ca-yuan","title":"元朝（1271–1368）","content":"元朝由蒙古族建立，成吉思汗（鐵木真，1162–1227）統一蒙古各部後開始大規模對外征服。其孫忽必烈於1271年定國號為大元，1279年滅南宋（崖山海戰，陸秀夫背幼帝趙昺跳海殉國），統一了中國。元朝是中國歷史上疆域最遼闊的王朝——北至西伯利亞、南抵南海、東至朝鮮半島、西達東歐。忽必烈推行漢法、定都大都（今北京）、實行行省制度（至今仍是中國省級行政區的基礎）。元朝時期中外交流空前活躍——《馬可波羅遊記》（約1298年）向歐洲介紹了東方的繁榮，激發了歐洲人對東方的嚮往。元曲（散曲和雜劇）是這一時期最具代表性的文學形式——關漢卿的《竇娥冤》、王實甫的《西廂記》、馬致遠的《漢宮秋》都是不朽的經典。但元朝實行民族歧視政策（將人民分為蒙古人、色目人、漢人、南人四等），加上後期政治腐敗和水旱災害，最終被朱元璋領導的紅巾軍起義推翻。\n\n• 元朝的四等人制（民族歧視制度）：1）蒙古人（第一等——享有最高特權，包括政治、法律和軍事特權）；2）色目人（第二等——中亞和西亞各族人，包括畏兀兒、回回、波斯人等，多為蒙古統治的輔助力量）；3）漢人（第三等——原金朝境內的漢族、契丹、女真、高麗等）；4）南人（第四等——原南宋境內的漢族和其他民族，地位最低）。等級制度體現在科舉考試難度、法律懲罰力度和任官限制等各個方面\n• 元曲的兩種主要形式：1）散曲——短小的抒情詩歌，分為小令（單支曲子）和套數（多支同宮調的曲子連綴而成）。馬致遠《天淨沙·秋思》「枯藤老樹昏鴉，小橋流水人家，古道西風瘦馬。夕陽西下，斷腸人在天涯」是散曲的巔峰之作；2）雜劇——有完整劇情、角色分工（末、旦、淨、丑）和科白（動作指示和對話）的戲劇形式。關漢卿《竇娥冤》（感天動地的冤屈故事——竇娥臨刑前發下三樁誓願：血濺白練、六月飛雪、大旱三年）、王實甫《西廂記》（中國最著名的愛情戲劇）、白樸《梧桐雨》、馬致遠《漢宮秋》合稱「元曲四大家」"},{"id":"ca-ming","title":"明朝（1368–1644）","content":"朱元璋（明太祖）出身貧農，曾出家為僧，後參加紅巾軍起義並最終奪取天下，是中國歷史上出身最為寒微的皇帝。明朝初期實行嚴厲的集權統治——廢除丞相制度（胡惟庸案，1380年）、設立錦衣衛和東廠等特務機構。明成祖朱棣通過「靖難之役」（1399–1402）奪取皇位後遷都北京，修建了紫禁城（故宮，始建於1406年，1420年完工），並派鄭和七下西洋（1405–1433）——鄭和的寶船艦隊規模宏大（最大的寶船據載長約120米），最遠到達非洲東海岸和紅海沿岸，遠早於歐洲大航海時代的到來。明朝中後期商品經濟繁榮，出現了資本主義萌芽。王陽明（1472–1529）的心學思想影響深遠——他提出「心即理」、「知行合一」和「致良知」的學說，強調道德主體的內在自覺。但明朝中後期的嚴重問題——宦官專權（魏忠賢時期達到頂峰，東林黨人遭受殘酷打壓）、黨爭激烈、土地兼併和財政危機——最終導致了帝國的崩潰。1644年，李自成攻入北京，崇禎帝在煤山自縊，明朝滅亡。\n\n• 鄭和下西洋（1405–1433）的驚人規模：共七次遠航，每次艦隊約200–300艘船（最大的寶船據載長約120米、寬約50米——遠大於哥倫布的旗艦聖瑪利亞號（約25米）），船員約2.7–2.8萬人（包括水手、士兵、翻譯、醫生、天文學家、工匠等）。到達範圍：東南亞→印度→阿拉伯半島→東非海岸（最遠到達今肯亞的馬林迪和索馬里的摩加迪沙）——遠早於歐洲大航海時代（達·伽馬到達印度是1498年，比鄭和晚了約90年）\n• 王陽明心學的三個核心命題和「知行合一」：1）「心即理」——宇宙的終極真理（天理）不在外部世界也不在聖賢經典中，而在每個人的內心之中；2）「知行合一」——知和行不是兩個分離的階段（先知道然後去行動），而是同一過程的兩個方面——「知是行之始，行是知之成」，真正的知必然導致行動、不行動就不是真知；3）「致良知」——通過不斷的自我修養來恢復和擴充人人生而具有的良知良能。王陽明的學說深刻影響了東亞（特別是日本——陽明學在明治維新中發揮了重要作用）\n• 明朝滅亡的多重原因：1）財政崩潰——後期軍費開支巨大（對抗後金和農民起義），但江南富庶地區的士紳通過特權逃避賦稅，財政負擔壓在貧困農民身上；2）自然災害——1627–1644年間發生了全球性的小冰河期，中國北方持續乾旱和蝗災，農民無法生存；3）內外交困——東北的滿清（後金）不斷進攻、內部李自成和張獻忠的農民起義席捲全國；4）崇禎帝個人——勤奮但猜忌多疑，在位17年換了50個內閣首輔（平均每4個月換一次），殺掉了袁崇煥等關鍵將領"},{"id":"ca-qing","title":"清朝（1644–1912）","content":"清朝由滿族（女真後裔）建立。努爾哈赤統一女真各部後建立後金（1616年），其子皇太極改國號為大清（1636年）。1644年，吳三桂引清兵入關，清朝從李自成手中接管了北京，逐步征服全中國。","subsections":[{"id":"ca-qing-golden","title":"康雍乾盛世（1661–1796）","content":"康熙、雍正、乾隆三朝（共135年）是清朝的鼎盛時期，也是中國封建社會最後的輝煌。康熙帝平定三藩之亂、收復台灣（1683年，施琅攻台，鄭克塽投降）、驅逐沙俄（1689年《尼布楚條約》），奠定了清朝的疆域基礎。雍正帝大力整頓吏治、推行攤丁入畝（將人頭稅併入土地稅）等改革，充實了國庫。乾隆帝時期清朝疆域達到極盛（約1316萬平方公里），但好大喜功的「十全武功」耗盡了國庫，文字獄（如《四庫全書》編纂過程中對「違礙」書籍的大規模銷毀）造成了嚴重的文化摧殘。人口從康熙初年的約9000萬增長到乾隆末年的約3億，成為當時世界上人口最多的國家。但閉關鎖國政策（1757年乾隆下令僅限廣州一口通商）使中國逐漸與正在經歷工業革命的西方世界脫節。\n\n• 康雍乾三朝的時間線和關鍵事件：康熙（1661–1722在位）——平定三藩之亂（1673–1681）、收復台灣（1683年施琅攻台，鄭克塽投降，台灣正式納入清朝版圖）、簽訂《尼布楚條約》（1689年與俄羅斯劃定東部邊界，是中國與歐洲國家簽訂的第一個平等條約）；雍正（1722–1735在位）——大力整頓吏治（清查虧空、耗羨歸公、設立軍機處加強中央集權）、推行攤丁入畝（將人頭稅併入土地稅，無地貧民不再繳納人頭稅）；乾隆（1735–1796在位）——疆域達到極盛（約1316萬平方公里）、編纂《四庫全書》（1773–1782年，收書3461種、79309卷、約8億字，是古代世界最大的百科全書式叢書——但同時銷毀了約3000種「違礙」書籍，造成了巨大的文化損失）\n• 清朝的閉關鎖國政策演變：1684年康熙開放海禁（設立江浙閩粵四海關）→1717年康熙因擔心沿海居民接濟海盜和南洋華人聚集威脅統治而下令禁止與南洋貿易→1757年乾隆下令僅限廣州一口通商（外國商船只能在廣州進行貿易，且必須通過特許的「十三行」商行進行）——這一政策持續到1842年鴉片戰爭，使中國在此關鍵時期（工業革命時期）完全與世界脫節"},{"id":"ca-qing-decline","title":"晚清的衰落（1840–1912）","content":"鴉片戰爭（1840–1842）是中國近代屈辱史的開端。英國以林則徐虎門銷煙為藉口發動了侵略戰爭，清軍慘敗，被迫簽訂了《南京條約》（割讓香港島、開放五口通商、賠款2100萬銀元、協定關稅），中國的主權和領土完整遭到嚴重損害。此後，列強掀起了瓜分中國的狂潮：第二次鴉片戰爭（1856–1860）、中法戰爭（1884–1885）、甲午戰爭（1894–1895）和八國聯軍侵華（1900）接踵而至，中國一步步淪為半殖民地半封建社會。太平天國運動（1851–1864，洪秀全領導，定都南京稱天京）是中國歷史上規模最大的農民戰爭之一，傷亡人數可能高達2000–3000萬。洋務運動（1861–1895，曾國藩、李鴻章、張之洞等人推動，口號「師夷長技以制夷」）和戊戌變法（1898年，康有為、梁啟超推動）相繼失敗，說明在不觸動封建制度根本的前提下進行改革無法救中國。1911年10月10日武昌起義成功，各省紛紛響應。1912年2月12日，隆裕太后代宣統帝溥儀頒布退位詔書，延續兩千多年的封建帝制宣告終結。\n\n• 洋務運動的軍事工業體系：1）安慶內軍械所（1861年曾國藩創辦，製造中國第一艘蒸汽輪船「黃鵠號」）；2）江南製造總局（1865年李鴻章創辦於上海，下設槍炮廠、輪船廠、煉鋼廠、機器廠，翻譯館翻譯了約160種西方科技書籍）；3）福州船政局（1866年左宗棠創辦，附設船政學堂——中國第一所近代海軍學校）；4）天津機器局（1867年崇厚創辦，後由李鴻章擴建為北方最大的軍工廠）；5）湖北槍炮廠（1890年張之洞創辦於漢陽——「漢陽造」步槍生產了超過100萬支，是中國軍隊的主要武器長達半個世紀）\n• 甲午戰爭（1894–1895）的關鍵戰役：1）豐島海戰（1894年7月25日——日本不宣而戰，擊沉運兵船「高陞號」，約871名清軍溺亡）；2）平壤戰役（1894年9月15日——清軍統帥葉志超棄城逃跑，狂奔500里逃回中國境內）；3）黃海海戰（1894年9月17日——北洋水師損失5艘軍艦，致遠艦管帶鄧世昌在彈藥耗盡後下令撞擊敵艦吉野號、被魚雷擊中沉沒、全艦252人僅7人獲救）；4）威海衛之戰（1895年1–2月——北洋水師殘餘艦隊被日軍從陸地包圍在威海衛港內，提督丁汝昌拒絕投降後自殺，剩餘11艘軍艦被日軍俘虜——北洋水師全軍覆沒）\n• 《馬關條約》（1895年4月17日）的條款：1）中國承認朝鮮「獨立」（實為日本控制）；2）割讓台灣、澎湖列島和遼東半島給日本（後因俄德法三國干涉，日本歸還遼東半島但中國追加賠款3000萬兩白銀）；3）賠款白銀2億兩（約3.1億日元——相當於日本當時約4年的財政收入）；4）開放沙市、重慶、蘇州、杭州為通商口岸；5）允許日本在通商口岸設立工廠（其他國家根據最惠國待遇自動獲得同樣權利——從此外國資本可以合法在中國設廠剝削廉價勞動力）"}]}]}]},{"id":"china-modern","title":"中國近代史","category":"history","description":"從鴉片戰爭到改革開放，中國從封閉走向現代化的艱辛歷程","icon":"🏛️","sections":[{"id":"cm-opium-war","title":"鴉片戰爭與不平等條約體系（1840–1860）","content":"1840年英國以林則徐銷毀鴉片為藉口發動了第一次鴉片戰爭。清軍在武器裝備、戰術思想和動員能力上都遠遠落後於英軍。1842年簽訂的《南京條約》開啟了近代不平等條約的先例：割讓香港島、開放廣州、廈門、福州、寧波、上海五口通商、賠款2100萬銀元、協定關稅、領事裁判權。1844年，美國和法國又分別迫使清政府簽訂了《望廈條約》和《黃埔條約》，獲得了更多特權。1856–1860年的第二次鴉片戰爭（又稱亞羅號戰爭），英法聯軍攻入北京並洗劫和焚燒了圓明園（1860年10月），清政府被迫簽訂《天津條約》（1858年）和《北京條約》（1860年），進一步開放內河和內陸通商口岸，允許外國公使常駐北京，割讓九龍半島南部給英國。"},{"id":"cm-self-strengthening","title":"自強運動的失敗（1861–1895）","content":"洋務運動（又稱自強運動）是清政府在內憂外患下的自救嘗試，口號為「自強求富」。前期以軍事工業為重點：曾國藩和李鴻章創辦了安慶內軍械所（1861年，中國第一家近代軍工廠）和江南製造總局（1865年，中國最大的近代軍工企業）；左宗棠創辦了福州船政局（1866年，遠東最大的造船廠）。後期擴展到民用工業：輪船招商局（1872年）、開平礦務局（1878年）、上海機器織布局等。洋務派還建立了新式陸海軍，其中以北洋水師（1888年成軍）最為重要——擁有兩艘鐵甲艦（定遠、鎮遠）和數十艘巡洋艦及輔助艦隻。然而在甲午戰爭（1894–1895）中，北洋水師在黃海海戰和威海衛之戰中全軍覆沒，陸軍也在朝鮮和遼東戰場慘敗。《馬關條約》（1895年）的屈辱程度遠超此前任何條約：割讓台灣和澎湖列島給日本、賠款白銀2.3億兩、允許日本在華開設工廠。洋務運動的破產證明了「中學為體、西學為用」的改良路線無法挽救封建制度。"},{"id":"cm-revolution-era","title":"革命與共和（1895–1927）","content":"甲午戰敗後，康有為和梁啟超領導了戊戌變法（1898年6月11日至9月21日，僅103天），試圖通過君主立憲實現制度變革，但被慈禧太后發動戊戌政變鎮壓（戊戌六君子——譚嗣同、林旭、楊銳、劉光第、楊深秀、康廣仁被殺）。與此同時，孫中山在日本成立興中會（1894年，後改組為同盟會，1905年），提出「驅除韃虜，恢復中華，創立民國，平均地權」的革命綱領和三民主義（民族、民權、民生）。1911年10月10日，武昌起義打響了辛亥革命的第一槍，各省紛紛響應。1912年1月1日，孫中山在南京就任中華民國臨時大總統，亞洲第一個民主共和國就此誕生。然而革命果實很快被袁世凱竊取——1912年2月15日袁世凱被選為臨時大總統，1915年袁更冒天下之大不韙稱帝（僅83天即被迫取消）。袁死後中國陷入了軍閥割據的混亂局面。1915年，陳獨秀創辦《青年雜誌》（後改名《新青年》），高舉「民主」與「科學」兩面旗幟，掀起了新文化運動。魯迅的《狂人日記》（1918年，中國第一部現代白話小說）對封建禮教進行了深刻批判。1919年五四運動中，學生和工人聯合行動，反對巴黎和會將德國在山東的權益轉讓給日本，促進了馬克思主義在中國的傳播。1921年中國共產黨在上海成立。1924–1927年的國民革命（北伐戰爭）推翻了北洋軍閥，但1927年蔣介石發動「四一二」政變，國共合作破裂，中國進入了十年內戰時期（1927–1937）。"},{"id":"cm-anti-japanese","title":"抗日戰爭（1937–1945）","content":"1937年7月7日盧溝橋事變（七七事變）爆發，標誌著日本全面侵華戰爭的開始。中國軍民進行了艱苦卓絕的八年抗戰。1937年8–11月的淞滬會戰是抗戰中規模最大、最慘烈的戰役之一——中國投入約70萬兵力，粉碎了日本「三個月滅亡中國」的狂妄計劃。1937年12月13日南京陷落後，日軍進行了慘無人道的大屠殺，約30萬軍民遇害（南京大屠殺）。1938年的台兒莊大捷是抗戰初期中國軍隊取得的重大勝利。遷都重慶後，國民政府以西南大後方為基地堅持抗戰。1941年12月珍珠港事件後中國正式對日、德、義宣戰，抗日戰爭成為世界反法西斯戰爭的重要組成部分。1945年8月6日和9日美國在廣島和長崎投下原子彈，8月8日蘇聯對日宣戰出兵東北，8月15日日本天皇宣布無條件投降。中國人民為戰爭勝利付出了巨大的犧牲——約3500萬軍民傷亡、經濟損失無法估量——但也以巨大的民族犧牲贏得了世界各國的尊重，中國成為聯合國安理會五個常任理事國之一。"},{"id":"cm-civil-war-to-reform","title":"內戰與新政權（1945–1949）","content":"抗戰勝利後國共矛盾迅速激化，1946年全面內戰爆發。經過遼瀋戰役（1948年9–11月）、淮海戰役（1948年11月–1949年1月）和平津戰役（1948年11月–1949年1月）三大戰略決戰，國民黨主力部隊基本被消滅。1949年4月，解放軍發動渡江戰役，佔領南京。1949年10月1日，毛澤東在北京天安門城樓上宣布中華人民共和國成立。國民政府遷至台灣，兩岸從此分治至今。新政權初期進行了土地改革運動，徹底改變了延續兩千年的封建土地制度。"},{"id":"cm-reform-opening","title":"改革開放時期（1978至今）","content":"1978年12月中共十一屆三中全會確立了改革開放的基本國策，標誌著中國歷史的重大轉折。","subsections":[{"id":"cm-reform-early","title":"早期改革（1978–1992）","content":"農村改革率先突破：安徽省鳳陽縣小崗村的18位農民在1978年秘密簽訂「生死狀」，實行「包產到戶」，揭開了農村改革的序幕。家庭聯產承包責任制迅速推廣到全國，極大地釋放了農村生產力。城市改革以擴大企業自主權和發展鄉鎮企業為重點。1980年設立深圳、珠海、汕頭、廈門四個經濟特區，「時間就是金錢，效率就是生命」的深圳口號成為改革精神的象徵。1984年進一步開放14個沿海城市，1990年開發開放上海浦東新區，逐步形成了「經濟特區—沿海開放城市—沿海經濟開放區—內地」的全方位開放格局。"},{"id":"cm-reform-later","title":"深化改革與全球化（1992至今）","content":"1992年鄧小平南巡講話突破了計劃與市場的爭論，確立了社會主義市場經濟的改革方向。2001年中國加入世界貿易組織（WTO），從此深度融入全球經濟體系。此後中國經濟實現了長達二十多年的高速增長（年均約9–10%），2010年超越日本成為世界第二大經濟體。基礎設施建設取得驚人成就——高速鐵路網絡里程全球第一（超過4萬公里）、港口吞吐量全球領先。超過8億人口擺脫了絕對貧困（世界銀行標準）。當前中國經濟正處於從高速增長向高質量發展轉型的關鍵階段，面臨人口老齡化、房地產市場調整、核心技術自主創新和複雜的地緣政治環境等多重挑戰和機遇。"}]}]},{"id":"world-ancient","title":"世界古代文明","category":"history","description":"人類文明的搖籃——美索不達米亞、古埃及、古希臘、古羅馬等偉大文明的興衰","icon":"🏛️","sections":[{"id":"wa-mesopotamia","title":"美索不達米亞文明","content":"美索不達米亞（意為「兩河之間的土地」）位於底格里斯河和幼發拉底河流域（今伊拉克一帶），是人類已知最早的文明發源地之一。約公元前3500年，蘇美爾人在這裡建立了世界上最早的城市。","subsections":[{"id":"wa-sumer","title":"蘇美爾文明","content":"蘇美爾人建立了烏爾、烏魯克、拉格什等城邦。楔形文字是人類最早的書寫系統之一，將蘆葦筆壓入濕泥板留下楔形痕跡，主要用於記錄商業交易、法律條文和文學作品。蘇美爾人還發明了六十進位制——60可以被2、3、4、5、6、10、12、15、20、30整除，至今仍用於計量時間（60秒=1分鐘、60分鐘=1小時）和角度（360度）。《吉爾伽美什史詩》是人類最古老的文學作品之一，講述了烏魯克國王吉爾伽美什追尋永生的冒險故事，其中包含了大洪水的敘述（與聖經諾亞方舟故事有驚人的相似之處）。蘇美爾人建造了金字塔式的神廟——塔廟（Ziggurat），據信是人與神溝通的場所。"},{"id":"wa-babylon","title":"巴比倫與亞述","content":"漢謨拉比（約前1792–前1750在位）統一了美索不達米亞，建立了古巴比倫王國。其最著名的遺產是《漢謨拉比法典》——刻在一塊高2.25米的黑色玄武岩石柱上，包含282條法律條文，以嚴格的「同態復仇」原則（「以眼還眼，以牙還牙」）著稱。法典內容涵蓋刑法、民法、婚姻法和商業法等，是世界上保存最完整的早期成文法典之一。新巴比倫王國時期（前626–前539），尼布甲尼撒二世建造了傳說中的「空中花園」——據說是他為懷念故鄉山巒的米底妻子而建造的階梯式花園，被古希臘人列為世界七大奇蹟之一。亞述帝國（約前900–前612）則以殘暴的軍事征服聞名，建立了世界上最早的專業化常備軍之一，但其首都尼尼微的圖書館（亞述巴尼拔圖書館）保存了大量楔形文字泥板，為後世研究美索不達米亞文明提供了寶貴資料。"}]},{"id":"wa-egypt","title":"古埃及文明","content":"古埃及文明沿尼羅河流域發展了三千多年。尼羅河每年的定期泛濫帶來了肥沃的黑色淤泥，使埃及成為地中海世界的穀倉。","subsections":[{"id":"wa-eg-pyramids","title":"金字塔時代","content":"古王國時期（約前2686–前2181）是金字塔建築的黃金時代。法老左塞爾的階梯金字塔（位於薩卡拉，由建築師伊姆霍特普設計）是埃及最早的巨型石造建築。第四王朝的法老胡夫（希臘名為奇奧普斯）建造了吉薩大金字塔——原高146.5米（現約138.8米），底座每邊長約230米，總共使用了約230萬塊石頭，每塊平均重約2.5噸，據希羅多德記��動用了10萬勞工、花了20年時間建造。金字塔的精確程度令人難以置信——底座各邊長度的誤差小於25厘米，南北誤差僅約0.05度。古埃及人相信法老死後會成為神，金字塔是幫助法老升天的通道。獅身人面像（斯芬克斯，長約73米、高約20米）守護著吉薩金字塔群，可能是哈夫拉法老的面容。"},{"id":"wa-eg-new-kingdom","title":"新王國的輝煌與圖坦卡蒙","content":"新王國時期（約前1550–前1070），埃及成為橫跨西亞和北非的強大帝國。第十八王朝的法老哈特謝普蘇特（約前1479–前1458在位）是古埃及少數的女性法老，以男裝和假鬍鬚的形象出現在雕像中經常用假鬍鬚和男性裝束來呈現自己，在位期間大力發展貿易。圖特摩斯三世被稱為「古埃及的拿破崙」，進行了17次軍事遠征，將埃及的疆域擴展到最大。第十九王朝的拉美西斯二世（在位前1279–前1213）是埃及統治時間最長的法老之一（約66年），他與赫梯帝國在卡疊什戰役（約前1274年）打成平手後，簽訂了人類歷史上現存最早的和平條約（埃及-赫梯和平條約，其複製品懸掛在紐約聯合國總部）。然而，最令後人驚嘆的發現來自一位名不見經傳的少年法老——圖坦卡蒙。他的陵墓（帝王谷KV62號墓）於1922年由英國考古學家霍華德·卡特發現，是極少數未被盜掘的埃及王陵。墓中出土了超過5000件陪葬品，其中包括那件精美絕倫的黃金面具——重約11公斤的純金，鑲嵌青金石和彩色玻璃，成為古埃及文明的永恆象徵。"}]},{"id":"wa-greek","title":"古希臘文明","content":"古希臘文明是西方文明的搖籃。民主政治、哲學思辨、科學探索、戲劇藝術和奧林匹克競技——這些塑造了現代世界的基本元素都源自古希臘。","subsections":[{"id":"wa-gr-polis","title":"城邦時代","content":"古希臘沒有形成統一的國家，而是由數百個城邦（Polis）組成。雅典和斯巴達是兩個最具代表性的城邦。雅典被譽為民主的發源地——公元前508年克利斯提尼改革建立了公民大會、五百人議事會和陪審法庭等民主制度，所有成年男性公民都可以參與政治決策。伯里克利時代（前461–前429）是雅典民主的黃金時期，帕德嫩神廟（供奉雅典娜女神）於此期間建成，被認為是多立克式建築的巔峰之作。蘇格拉底（前470–前399）在雅典街頭以反詰法（又稱「蘇格拉底法」）不斷追問路人關於正義、勇氣、美德等問題——「我只知道自己一無所知」是他的名言。公元前399年他被雅典法庭以「不敬神」和「敗壞青年」的罪名判處死刑，飲下毒芹汁從容赴死。柏拉圖（前427–前347）和亞里士多德（前384–前322）——蘇格拉底的學生的學生——的著作奠定了整個西方哲學和科學的基礎。斯巴達則是一個極端的軍事化社會：男性公民從7歲起就要離開家庭，進入集體訓練（Agōgē），接受嚴酷的體能、戰鬥和忍耐力訓練，直到60歲才能退役。"},{"id":"wa-gr-wars","title":"波希戰爭與伯羅奔尼撒戰爭","content":"波希戰爭（前499–前449）：波斯帝國（當時世界最大的帝國）三次入侵希臘，但被希臘城邦聯軍擊退。公元前490年的馬拉松戰役中雅典以少勝多（據說希臘士兵菲迪皮德斯從馬拉松跑到雅典報捷後力竭而亡——馬拉松長跑由此得名）。公元前480年的溫泉關戰役中，斯巴達國王列奧尼達率300名斯巴達戰士（及約7000名盟軍）抵擋波斯大軍三天，最終全員戰死，其事蹟成為勇氣和犧牲的永恆象徵。同年發生的薩拉米斯海戰中，雅典海軍以少勝多，徹底扭轉了戰局。伯羅奔尼撒戰爭（前431–前404）：雅典和斯巴達為爭奪希臘霸權而進行的長達27年的戰爭，最終斯巴達在波斯支持下取勝，但這場戰爭極大地消耗了希臘各城邦的力量，為後來馬其頓王國的崛起創造了條件。歷史學家修昔底德記錄了這場戰爭，其《伯羅奔尼撒戰爭史》是歷史寫作的經典範例。"},{"id":"wa-gr-alexander","title":"亞歷山大大帝與希臘化時代","content":"馬其頓國王亞歷山大大帝（前356–前323），亞里士多德的學生，20歲繼位後僅用十年時間便征服了當時已知世界的大部分地區。公元前334年他率軍渡過赫勒斯滂海峽（今達達尼爾海峽），先後征服小亞細亞、敘利亞、埃及（在尼羅河口建立了亞歷山大城，後成為地中海世界最大的城市之一）、波斯帝國（高加米拉戰役，前331年），並繼續東進到印度河流域（海達斯佩斯河戰役，前326年，擊敗印度國王波羅斯）。亞歷山大在33歲時因熱病在巴比倫去世，他建立的帝國迅速分裂為幾個希臘化王國：托勒密王朝（埃及）、塞琉古王朝（西亞）、安提柯王朝（馬其頓和希臘）。希臘化時代（約前323–前30）促進了希臘文化與東方文化的大規模融合——亞歷山大城的圖書館是古代世界最大的知識中心（據說藏書達40–70萬卷），歐幾里得在此寫成了《幾何原本》，阿基米德在此學習。羅塞塔石碑（前196年，同時刻有古埃及象形文字、世俗體文字和希臘文，成為破解古埃及文字的關鍵）也是希臘化時代的產物。"}]},{"id":"wa-rome","title":"古羅馬文明","content":"古羅馬從台伯河畔的一個小城邦發展成為統治整個地中海世界的龐大帝國，其法律、語言、建築和制度影響了整個西方文明至今。","subsections":[{"id":"wa-rm-republic","title":"羅馬共和國（前509–前27）","content":"公元前509年羅馬人驅逐了最後一位國王，建立了共和政體。共和國的權力核心是元老院，由貴族（Patricians）組成，兩名執政官（Consul）由選舉產生，任期一年。平民（Plebeians）經過長期的抗爭（「撤離運動」），逐步獲得了政治權利——設立了保民官（Tribune），擁有否決權以保護平民利益。羅馬通過三次布匿戰爭（前264–前146）擊敗了其在地中海西部的最大競爭對手迦太基——第二次布匿戰爭中，迦太基統帥漢尼拔率軍（包括戰象）翻越阿爾卑斯山入侵義大利，連續擊敗羅馬軍隊（坎尼會戰，前216年，羅馬損失約5萬人），但最終被羅馬將領大西庇阿在扎馬戰役（前202年）中擊敗。第三次布匿戰爭中羅馬徹底摧毀了迦太基城，「迦太基必須毀滅」（Carthago delenda est）——老加圖的這句名言成為了羅馬無情軍事擴張的象徵。然而，隨著疆域擴大，羅馬共和制度面臨著嚴重的內部危機：貧富懸殊加劇（大量奴隸勞動使小農破產，土地集中在少數貴族手中）、政治腐敗、奴隸起義（斯巴達克斯起義，前73–前71，是古代世界最大規模的奴隸起義）。公元前60年凱撒、龐培和克拉蘇組成「前三頭同盟」（First Triumvirate），瓜分了羅馬的權力。凱撒在高盧戰爭（前58–前50）中征服了整個高盧（今法國及週邊地區），並以《高盧戰記》記錄了這場戰爭（其著名的開篇句「高盧全境分為三部分」）。公元前49年凱撒率軍渡過盧比孔河進入義大利（「骰子已經擲下」——Alea iacta est），內戰爆發。凱撒擊敗龐培後成為終身獨裁官，但於公元前44年3月15日（Ides of March）在元老院被布魯圖斯等貴族刺殺（據說凱撒臨終前對布魯圖斯說「你也在其中嗎，我的孩子？」——Et tu, Brute?）。"},{"id":"wa-rm-empire","title":"羅馬帝國（前27–476）","content":"凱撒的養子（也是其外甥孫）屋大維在擊敗了安東尼和埃及女王克麗奧佩脫拉（亞克興海戰，前31年）後，成為羅馬唯一的統治者。公元前27年元老院授予他「奧古斯都」（崇高者）的稱號，羅馬從共和國轉變為元首制下的帝國。奧古斯都的統治開啟了長達約200年的「羅馬和平」（Pax Romana）——地中海世界享受了前所未有的穩定和繁榮。帝國在圖拉真皇帝時期（98–117年在位）達到最大版圖，從不列顛到美索不達米亞、從萊茵河到撒哈拉。羅馬人修建了總長約8萬公里的道路網（「條條大路通羅馬」），建設了宏偉的引水渠（如法國加爾水道橋）、競技場（羅馬競技場，可容納約5萬觀眾）和公共浴場。羅馬法是羅馬對人類文明最重要的貢獻之一——《十二銅表法》（前450年）是羅馬成文法的開端，《查士丁尼法典》（529–534年，由東羅馬皇帝查士丁尼一世組織編纂）則集羅馬法之大成，成為後世歐洲大陸法系的基礎。公元1世紀，基督教在羅馬帝國的猶太行省誕生。基督徒因拒絕崇拜羅馬皇帝而遭受了數個世紀的迫害（最著名的是尼祿皇帝時期——傳說羅馬大火（64年）後他歸咎於基督徒並對其進行殘忍殺害）。但基督教仍然以驚人的速度傳播開來。313年君士坦丁大帝頒布米蘭敕令，給予基督教合法地位。380年狄奧多西一世宣布基督教為羅馬帝國國教。395年帝國正式分裂為東西兩部分。476年，西羅馬帝國末代皇帝羅慕路斯·奧古斯都被日耳曼僱傭軍首領奧多亞塞廢黜，西羅馬帝國滅亡——這一年被傳統上視為中世紀的開端。東羅馬帝國（拜占庭帝國）則繼續存在了將近一千年，直到1453年被奧斯曼帝國所滅。"}]}]},{"id":"world-modern","title":"世界近代史","category":"history","description":"從大航海時代到全球化時代——塑造現代世界的重大歷史事件與思想潮流","icon":"🌍","sections":[{"id":"wm-age-of-discovery","title":"大航海時代（15–17世紀）","content":"15世紀，奧斯曼帝國控制了東西方之間的傳統貿易路線，歐洲各國開始尋找通往東方的新航路。技術進步（卡拉維爾帆船、星盤、指南針）使遠洋航行成為可能。1415年葡萄牙佔領休達（北非），開始了歐洲海外殖民的先河。1488年迪亞士繞過好望角。1492年熱那亞人哥倫布在西班牙王室資助下向西航行，意外發現了美洲大陸（他至死仍認為自己到達的是亞洲的印度，因此將當地居民稱為「印第安人」）。1498年達·伽馬繞過好望角到達印度，開闢了歐洲直達亞洲的海上航線。1519–1522年麥哲倫船隊完成了人類歷史上的首次環球航行（麥哲倫本人於1521年在菲律賓被殺，但船隊中的「維多利亞號」在埃爾卡諾的指揮下最終於1522年返回西班牙）。大航海時代深刻改變了世界格局：歐洲國家建立了龐大的海外殖民帝國，哥倫布交換（新舊大陸之間的物種和疾病交換）改變了全球的農業和飲食結構（馬鈴薯、玉米、番茄、煙草傳入舊世界，小麥、馬匹、牛及天花、麻疹等疾病傳入新世界），但也導致了美洲原住民人口的災難性銳減（據估計，1492–1650年間美洲原住民人口減少了約90%），大西洋奴隸貿易（約1500–1866年間約有1200萬非洲人被強行運往美洲）成為人類歷史上最大的強迫遷移之一。"},{"id":"wm-scientific-revolution","title":"科學革命（16–17世紀）","content":"科學革命是人類認知方式的一次根本性轉變——從依賴古代權威（特別是亞里士多德）轉向基於實驗和數學分析的現代科學方法。1543年哥白尼發表了《天體運行論》，提出了日心說——太陽而非地球是宇宙的中心——挑戰了延續千年的托勒密地心體系。第谷·布拉赫積累了大量精確的天文觀測數據，其助手開普勒分析這些數據後提出了行星運動三定律——行星圍繞太陽運行的軌道是橢圓形而非正圓形。伽利略將望遠鏡對準天空（1609年），發現了木星的衛星、金星的相位變化和月球表面的坑洞，這些發現直接支持了哥白尼的日心說。他的《關於兩大世界體系的對話》（1632年）導致他被羅馬教會審判並軟禁終身。牛頓（1643–1727）集科學革命之大成，於1687年發表了《自然哲學的數學原理》，提出了運動三大定律和萬有引力定律，用同一套數學方程解釋了從落體到行星軌道的所有運動——這是人類智慧的巔峰成就之一。科學革命的方法論——通過實驗、觀察和數學推理來發現自然規律——從此成為現代科學的基石。"},{"id":"wm-enlightenment","title":"啟蒙運動（17–18世紀）","content":"啟蒙運動是17–18世紀在歐洲興起的思想解放運動。啟蒙思想家們高舉「理性」的旗幟，批判宗教迷信和專制王權，倡導自由、平等和進步的理念。約翰·洛克（1632–1704）提出了社會契約論和自然權利學說（生命、自由和財產），主張政府權力來自被統治者的同意，如果政府侵犯人民權利，人民有權推翻它——這些思想對美國獨立宣言產生了直接影響。孟德斯鳩（1689–1755）在《論法的精神》（1748年）中提出了三權分立（立法權、行政權、司法權互相制衡）的理論，成為現代憲政制度的核心理念。伏爾泰（1694–1778）是啟蒙運動最活躍的鬥士，以犀利的筆鋒批判教會和專制制度，提倡宗教寬容和言論自由。盧梭（1712–1778）在《社會契約論》（1762年）中以「人生而自由，但無往不在枷鎖之中」的名句開篇，提出了「公意」（General Will）和人民主權的概念。亞當·斯密（1723–1790）在《國富論》（1776年）中提出了自由市場的理論——「看不見的手」會引導個人的自利行為促進社會整體利益——奠定了現代經濟學的基礎。啟蒙運動為美國獨立戰爭和法國大革命提供了思想武器，深刻改變了人類對政治權力、個人權利和社會正義的理解。"},{"id":"wm-industrial","title":"工業革命（18–19世紀）","content":"工業革命是人類歷史上最重要的經濟社會變革之一，從此機器生產取代了手工勞動，人類社會從農業文明邁入工業文明。第一次工業革命（約1760–1840年）始於英國——紡織工業率先實現機械化（哈格里夫斯發明了珍妮紡紗機，1764年；阿克萊特建立了水力紡紗廠，1771年）。詹姆斯·瓦特改良了蒸汽機（1769年專利），使蒸汽機從礦井抽水的專用設備變成了通用的動力源，成為工業革命的標誌性發明。鐵路（斯托克頓—達靈頓鐵路，1825年，史蒂芬生的「火箭號」機車）和蒸汽輪船的出現徹底改變了交通運輸。工廠制度使大量農村人口湧入城市，城市化進程加速——曼徹斯特從1773年的約2.4萬人增長到1851年的約35萬人。第二次工業革命（約1870–1914年）以電力的廣泛應用（愛迪生發明實用化的白熾燈，1879年；特斯拉推動了交流電系統）、內燃機（戴姆勒和本茨）和化學工業的發展為標誌。福特汽車公司採用流水線生產方式（1913年）使T型車的生產時間從12小時縮短到約93分鐘，價格大幅下降，汽車從此走入普通家庭。工業革命帶來了空前的物質財富增長，但也造成了嚴重的社會問題——工人階級的貧困和惡劣的工作條件催生了社會主義運動和工會組織。馬克思和恩格斯於1848年發表了《共產黨宣言》，對資本主義進行了系統性的批判。"},{"id":"wm-french-rev","title":"法國大革命與拿破崙時代（1789–1815）","content":"1789年7月14日巴黎人民攻佔巴士底獄（象徵專制王權的國家監獄），法國大革命爆發。革命的根源在於法國舊制度（Ancien Régime）的深層矛盾：第一等級（教士）和第二等級（貴族）享有免稅特權，而佔人口約98%的第三等級（農民、工人和資產階級）承受了幾乎全部的稅收負���。1789年8月國民制憲議會通過了《人權和公民權利宣言》（人權宣言），宣告「人生來自由、權利平等」、「主權本質上屬於國民」和私有財產神聖不可侵犯的原則。1793年國王路易十六被送上斷頭台。激進的雅各賓派在羅伯斯庇爾的領導下實行了恐怖統治（1793–1794），約1.7萬人在革命法庭上被判處死刑，直到1794年7月熱月政變推翻了羅伯斯庇爾。1799年11月拿破崙·波拿巴發動霧月政變，掌握了政權，1804年更是加冕稱帝（從教皇手中奪過皇冠自行戴上，這一著名場景象徵著世俗權力對教會權威的超越）。拿破崙法典（1804年）整理了革命以來的法律成果，確立了法律面前人人平等、私有財產保護和世俗婚姻等原則，成為此後歐洲大陸多國民法典的範本。拿破崙戰爭（1803–1815）席捲了整個歐洲，他的大軍（Grande Armée）一度橫掃歐陸，但1812年的俄羅斯遠征（進入莫斯科時發現的是一座幾乎被撤離和焚毀的空城）和1813年的萊比錫戰役（民族會戰）徹底擊碎了他的帝國夢。1815年滑鐵盧戰役後拿破崙被流放到南大西洋的聖赫勒拿島，最終於1821年去世。法國大革命傳播了自由、民主和民族主義的理念，儘管王朝在1815年維也納會議後短暫復辟，但革命精神已經根植於歐洲和世界的政治土壤之中。"},{"id":"wm-world-wars","title":"兩次世界大戰（1914–1945）","content":"20世紀上半葉，人類經歷了兩次世界大戰，是整個人類歷史上規模最大、傷亡最慘重的武裝衝突。","subsections":[{"id":"wm-ww1","title":"第一次世界大戰（1914–1918）","content":"一戰的導火索是1914年6月28日奧匈帝國皇儲斐迪南大公在塞拉耶佛被塞爾維亞民族主義者普林西普刺殺。此前歐洲已通過複雜的同盟體系分化為兩大陣營：三國同盟（德國、奧匈帝國、義大利）和三國協約（英國、法國、俄羅斯）。德國實施施里芬計劃——經由中立的比利時迅速擊敗法國後再轉向俄羅斯——但在馬恩河戰役（1914年9月）中被法軍阻擊，從此西線陷入了長達四年的塹壕戰僵局。一戰是人類歷史上首次全球性的軍事衝突，也是工業化戰爭的恐怖展示——機關槍、毒氣（氯氣、芥子氣）、坦克（1916年索姆河戰役中首次使用）和飛機被大規模投入使用，造成了前所未有的傷亡。凡爾登戰役（1916年2–12月，法德之間長達10個月的消耗戰，雙方傷亡約70萬人）和索姆河戰役（1916年7–11月，英軍首日就傷亡約5.7萬人）是塹壕戰殘酷性的典型寫照。1917年4月美國以德國實施無限制潛艇戰為由參戰，同年俄國爆發二月革命和十月革命後退出戰爭。1918年11月11日德國簽署停戰協定，一戰結束。凡爾賽和約（1919年）將戰爭責任完全歸於德國，要求其割讓領土、限制軍備和支付巨額賠款（1320億金馬克），並重新劃定了歐洲地圖——奧匈帝國和奧斯曼帝國解體，波蘭復國，捷克斯洛伐克和南斯拉夫等新國家成立。這些嚴厲的懲罰條件在德國國內引發了強烈的仇恨和不滿，被納粹黨充分利用，為二戰埋下了禍根。一戰總共導致約900萬士兵和700萬平民死亡。"},{"id":"wm-ww2","title":"第二次世界大戰（1939–1945）","content":"二戰是人類歷史上傷亡最為慘重的戰爭。1933年希特勒上台後，德國逐步撕毀凡爾賽和約——重新武裝、進軍萊茵非軍事區、吞併奧地利（1938年德奧合併）和捷克斯洛伐克的蘇台德地區（1938年慕尼黑協定，英法採取綏靖政策）。1939年8月納粹德國和蘇聯簽訂了《莫洛托夫—里賓特洛甫條約》（互不侵犯條約及秘密附加協議瓜分波蘭）。1939年9月1日德國入侵波蘭，二戰全面爆發（英法於9月3日對德宣戰）。1940年德國以閃電戰迅速征服了丹麥、挪威、荷蘭、比利時和法國（六周之內法國投降），英國在邱吉爾的領導下孤軍抵抗（不列顛空戰，1940年7–10月，皇家空軍挫敗了德國空軍的進攻）。1941年6月22日德國發動巴巴羅薩行動入侵蘇聯——人類歷史上最大規模的陸地軍事行動（約300萬德軍及軸心國部隊參戰），初期德軍勢如破竹推進到莫斯科郊外，但蘇聯遼闊的國土、嚴酷的冬季和蘇聯軍民的頑強抵抗最終使德軍陷入了消耗戰的泥潭。1941年12月7日日本海軍偷襲珍珠港，美國正式參戰，太平洋戰爭爆發——日本的擴張在1942年6月的中途島海戰中被遏制，從此盟軍開始了漫長的跳島反攻。戰爭的轉折點：北非戰場——阿拉曼戰役（1942年10–11月，蒙哥馬利擊敗隆美爾）；東線——史達林格勒戰役（1942–1943年冬，約200萬人傷亡，德軍第六軍團全軍覆沒）；太平洋——中途島海戰。1944年6月6日，盟軍實施了諾曼第登陸（D-Day，霸王行動）——人類歷史上最大規模的兩棲登陸作戰（登陸日投入約15.6萬士兵），開闢了歐洲第二戰場。1945年4月30日希特勒在柏林自殺；5月8日德國無條件投降（歐戰勝利日）。1945年8月6日和9日，美國在日本的廣島和長崎投下原子彈（「小男孩」和「胖子」），造成約20萬人立即死亡。8月15日日本天皇宣布無條件投降（二戰結束）。二戰導致約7000–8500萬人死亡，其中蘇聯約2700萬、中國約1500–2000萬。納粹對猶太人的系統性種族滅絕（Holocaust大屠殺）造成了約600萬猶太人遇害。戰後成立了聯合國（1945年），並設立了紐倫堡審判（1945–1946）和東京審判（1946–1948）來追究戰爭罪行。"}]},{"id":"wm-cold-war","title":"冷戰時期（1947–1991）","content":"冷戰是二戰後以美國為首的資本主義陣營和以蘇聯為首的社會主義陣營之間長達44年的意識形態對抗。1946年邱吉爾在美國密蘇里州富爾頓發表「鐵幕演說」，宣稱「從波羅的海的斯德丁到亞得里亞海的的里雅斯特，一道鐵幕已經降落在歐洲大陸上」。1947年美國總統杜魯門提出杜魯門主義（承諾支持世界各國抵抗共產主義的顛覆），標誌著冷戰的正式開始。1948–1949年蘇聯封鎖西柏林（柏林的陸路通道），美國和盟國以柏林空運（約27.8萬架次飛行，空運約230萬噸物資）成功打破了封鎖。1949年北大西洋公約組織（NATO）成立，1955年華沙條約組織成立，歐洲在軍事上被一分為二。冷戰雖然沒有轉化為美蘇之間的直接大規模軍事衝突（主要因為核威懾——兩個超級大國各自擁有足以多次毀滅對方的核武庫），但通過代理人戰爭在全球各地展開了激烈較量：韓戰（1950–1953，朝鮮半島以三八線附近為界一分為二至今）、越南戰爭（1955–1975，美國深陷其中，最終北越統一全國）、蘇聯入侵阿富汗（1979–1989，被稱為「蘇聯的越南戰爭」，是導致蘇聯解體的因素之一）。1962年的古巴飛彈危機將世界推向了核戰爭的邊緣——蘇聯在古巴部署中程核飛彈，美國實施海上封鎖（肯尼迪總統），經過13天的緊張對峙後赫魯雪夫同意撤回飛彈。1985年戈巴契夫成為蘇聯領導人，推行改革（Perestroika，經濟體制改革）和公開性（Glasnost，政治言論開放）。1989年東歐劇變——波蘭團結工會運動、匈牙利開放邊境、柏林圍牆倒塌（1989年11月9日）。1991年12月26日蘇聯正式解體為15個獨立國家。冷戰的終結結束了二元對立的世界格局，但遺留的核武器、領土爭端和地緣矛盾至今仍在影響國際關係。"}]}]},{"id":"culture","title":"文化","icon":"🎨","color":"#8B5CF6","description":"探索藝術、音樂、服飾、體育等多元文化領域的精華","topics":[{"id":"art-styles","title":"藝術風格","category":"culture","description":"從古典到當代，世界各大藝術流派的演變、技法與代表作品","icon":"🖼️","sections":[{"id":"as-western","title":"西方藝術風格演變","content":"西方藝術從中世紀到現代經歷了巨大的變革——從服務於宗教的功能性裝飾，到文藝復興時期的科學化再現，再到現代的觀念和抽象表達。每一種藝術風格都反映了其時代的世界觀和審美取向。\n\n• 西方藝術史的七個主要時期簡表：1）古希臘/羅馬（約前800–476）——理想化人體、比例和諧；2）中世紀（約476–1400）——服務於宗教、象徵性而非寫實性、拜占庭馬賽克和哥德式建築；3）文藝復興（約1400–1600）——透視法和解剖學、人文主義、從宗教到世俗題材的轉變；4）巴洛克（約1600–1750）——戲劇性光影、動態構圖、反宗教改革的視覺武器；5）洛可可（約1730–1780）——纖巧優雅、貴族享樂生活、粉彩色調；6）新古典主義→浪漫主義→寫實主義（約1750–1900）——從理性回歸到情感表達再到社會現實；7）現代與當代（約1860至今）——印象派開啟的多元主義時代","subsections":[{"id":"as-renaissance","title":"文藝復興藝術（14–16世紀）","content":"文藝復興的核心是重新發現古典時代的人文主義精神和對人的價值的肯定。透視法（布魯內萊斯基，約1415年）、解剖學研究、明暗法（Chiaroscuro）的運用，使藝術家能夠在平面上創造出令人信服的三維空間和真實的人體。","subsections":[{"id":"as-italian-ren","title":"義大利文藝復興","content":"義大利文藝復興分為早期和盛期。早期代表人物波提切利的《春》（Primavera）和《維納斯的誕生》以優美的線條和神話主題為特色。盛期三傑將藝術推向了頂峰：達文西是文藝復興「全能人」的理想典範——畫家、雕塑家、建築師、科學家、發明家。《蒙娜麗莎》（約1503–1519）以其神秘的微笑、Sfumato（暈塗法，以極其細膩的光影過渡消除輪廓線）和大氣透視而聞名。《最後的晚餐》（1495–1498）則以其精確的透視構圖和對門徒在聽到耶穌預言背叛時不同反應的戲劇性呈現被認為是文藝復興藝術的至高傑作。米開朗基羅認為雕塑是最高藝術形式——大衛雕像（1501–1504）展現了理想化的人體美和英雄氣概；西斯廷教堂天頂壁畫《創世紀》（1508–1512）是單人完成的壁畫奇蹟，其中《創造亞當》中上帝與亞當手指相接的畫面成為西方藝術最著名的圖像之一。拉斐爾以和諧典雅的構圖和溫柔的人文主義精神著稱，《雅典學院》（1509–1511）以建築透視為框架，將古希臘不同時代的哲學家和科學家聚集在同一場景中，完美體現了文藝復興對古典文化的崇尚。\n\n• 透視法的三種類型：1）線性透視（Linear Perspective——布魯內萊斯基約1415年發明，所有平行線在畫面上匯聚於一個消失點）、2）大氣透視（Aerial Perspective——達文西研究，遠處物體因空氣散射而變得更模糊和偏藍）、3）色彩透視（Color Perspective——遠處物體飽和度降低）\n• 達文西的Sfumato技法：義大利語意為「如煙霧般消散」——以極薄的多層透明顏料反覆疊加使明暗之間沒有明顯邊界、形成極其柔和的光影過渡，《蒙娜麗莎》的眼角和嘴角應用了此技法達30層以上\n• 米開朗基羅的雕塑理念：「人體是靈魂的監獄」——他認為雕塑是從大理石中「釋放」出早已存在於其中的形象（「我只是去掉多餘的石頭」）\n• 拉斐爾《雅典學院》中的人物辨識：居中柏拉圖（手指天——理念世界）和亞里士多德（手指地——經驗世界）；台階上第歐根尼（犬儒學派——衣衫襤褸躺在台階上）；前景左畢達哥拉斯（在寫數學公式）、右歐幾里得（彎腰用圓規演示幾何）\n• 文藝復興三傑的師承關係：達文西師從韋羅基奧（Verrocchio）→達文西影響拉斐爾→米開朗基羅自學成才且與達文西互有競爭和敵意"},{"id":"as-northern-ren","title":"北歐文藝復興","content":"北歐文藝復興（尼德蘭和德意志地區）以對細節的極致追求而聞名。楊·凡·艾克被認為是油畫技法的完善者——油彩的慢乾特性使藝術家得以反覆修改和疊加透明色層，創造出前所未有的光澤感和精細度。《阿爾諾芬尼夫婦像》（1434年）的每個細節——吊燈、鏡子（反射出畫家本人的小像）、小狗、木鞋——都精緻入微，充滿了象徵意義。杜勒（德國，1471–1528）將義大利文藝復興對人體比例的科學研究帶入了北歐。他對自畫像的探索（從13歲到老年）是西方藝術史上最完整的自我形象記錄之一。他的版畫（《啟示錄四騎士》，1498年）通過新的印刷技術（木刻版畫和銅版畫）將藝術作品普及到更廣泛的受眾。\n\n• 楊·凡·艾克《阿爾諾芬尼夫婦像》中的隱藏象徵：吊燈上僅點燃一支蠟燭（象徵上帝的在場見證婚姻）、鏡子周圍的十個圓形裝飾描繪了基督受難的十個場景、小狗（象徵忠誠和婚姻的忠貞）、脫下的木鞋（暗示這是在聖地進行的神聖儀式）\n• 杜勒的藝術理論著作：《人體比例四書》（1528年出版）——系統研究不同體型（瘦、胖、中等、極端）的人體比例，是第一本以科學方法研究人體美學的著作\n• 北歐文藝復興油畫的技術優勢：使用亞麻仁油或核桃油作為顏料結合劑——乾燥慢、透明度高、可疊加多層透明色層（Glaze）創造出義大利蛋彩畫無法達到的光澤感和深度\n• 荷蘭風俗畫（Genre Painting）的興起：新教禁止宗教圖像→藝術市場轉向世俗題材→中產階級購買小幅繪畫裝飾家居→風俗畫、風景畫、靜物畫和肖像畫成為荷蘭黃金時代（17世紀）繪畫的四大支柱"}]},{"id":"as-baroque-rococo","title":"巴洛克與洛可可（17–18世紀）","content":"巴洛克藝術（約1600–1750）是天主教會反宗教改革運動的視覺武器，以戲劇性、動感、華麗和強烈的情感為特徵。卡拉瓦喬以極端的明暗對比（Tenebrism）將聖經故事從天堂拉回人間——畫中人物如同當時羅馬街頭的普通人。《聖馬太蒙召》（1599–1600）中一道強光照入黑暗的房間，照亮了稅吏馬太被耶穌呼召的那一刻。在荷蘭（新教國家），世俗題材取代宗教成為主流：林布蘭的《夜巡》（1642年）以複雜的光影安排和對人物個性的深刻描繪超越了傳統集體肖像的刻板模式；維梅爾的《戴珍珠耳環的少女》（約1665年）被稱為「北方的蒙娜麗莎」，以對光線的極致敏感捕捉了一個永恆的瞬間。洛可可（約1730–1770年代）則是法國貴族優雅享樂生活的折射：華托的「雅宴畫」（Fête Galante）描繪了貴族在田園詩般的環境中的浪漫聚會；布雪和弗拉戈納爾則以更為甜美和情色的風格聞名，《鞦韆》（弗拉戈納爾，1767年）中少女盪鞦韆時故意踢飛高跟鞋的輕佻姿態是洛可可精神的完美體現。\n\n• 巴洛克風格的核心特徵：1）動態構圖（對角線、螺旋線）、2）強烈明暗對比（Chiaroscuro → Tenebrism極端明暗）、3）戲劇性（彷彿舞台上的一幕被凝固）、4）華麗裝飾、5）多種藝術形式的融合（建築+雕塑+繪畫+燈光）\n• 卡拉瓦喬的寫實主義革命：直接以街頭平民作為聖經人物的模特——聖馬太是一個禿頂赤腳的老農民、聖母瑪利亞以一個淹死的妓女為模特——引發了巨大的爭議，但也使宗教繪畫具有前所未有的真實感和情感衝擊力\n• 林布蘭的光線哲學：光是精神的隱喻——光線不是均勻照亮整個畫面，而是有選擇性地聚焦在關鍵人物的面部和手部，其餘部分隱入半暗甚至全暗之中，這種「選擇性照明」成為他的標誌\n• 洛可可與巴洛克的區別：巴洛克是「宏大、莊嚴、男性化」（服務於教會和君主）、洛可可是「纖巧、優雅、女性化」（服務於貴族沙龍和閨房）；顏色從深沉的暗色調轉向粉彩和奶油色調"},{"id":"as-impressionism","title":"印象派與後印象派（19世紀後期）","content":"印象派（1860s–1880s）是現代藝術的開端。1874年，一群被巴黎沙龍拒之門外的年輕藝術家在攝影師納達爾的工作室舉辦了第一次獨立展覽，批評家路易·勒魯瓦以莫內的《印象·日出》為由稱他們為「印象主義者」。印象派藝術家走出畫室到戶外（En Plein Air）捕捉光線和色彩的瞬間印象——莫內在不同光線下反覆描繪同一對象（乾草堆系列、盧昂大教堂系列），以短小而分離的純色筆觸表現光線的變化本質；雷諾瓦擅長於描繪陽光下的人群和歡樂場景（《煎餅磨坊的舞會》，1876年）；德加則以獨特的視角（如從上方俯視）和對動態的捕捉記錄了芭蕾舞演員和賽馬場景。後印象派的三位巨匠各自走向了不同的方向：塞尚被稱為「現代藝術之父」，他以圓柱體、球體和圓錐體來理解和描繪自然界（「以圓柱體、球體和圓錐體處理自然」），其對物體結構的分析直接影響了立體主義的誕生；梵谷以火焰般的旋轉筆觸和強烈的情感色彩（向日葵的明黃、星夜的渦卷天空、麥田的群鴉）表達了一種痛苦的激情——他一生只賣出了一張畫，卻在身後成為世界上最有知名度的藝術家之一；高更放棄了巴黎的資產階級生活遠赴大溪地，以平塗的色彩和象徵性的主題（《我們從哪裡來？我們是什麼？我們到哪裡去？》）探索生命的原始和精神維度。\n\n• 印象派名字的由來：1874年第一次獨立展覽中莫內展出了《印象·日出》（Impression, soleil levant），批評家路易·勒魯瓦在《喧囂報》（Le Charivari）上以「印象主義者的展覽」為標題進行嘲諷——藝術家們索性接受了這個標籤\n• 印象派的技術創新：1）管狀顏料的發明（1841年）使戶外寫生成為可能；2）合成顏料的出現（化學合成的鮮豔顏色如鉻黃、鈷藍、翠綠遠比傳統天然顏料便宜和鮮豔）；3）日本浮世繪（特別是葛飾北齋和歌川廣重）的平面構圖和裁切式視角影響了莫內、德加和梵谷\n• 莫內的系列畫創作理念：同一主題在不同時間和光線下反覆繪畫——乾草堆系列（25幅）、盧昂大教堂系列（30+幅）、睡蓮系列（約250幅，晚年幾乎失明仍堅持創作）——捕捉的不是物體本身而是物體與光線之間的關係\n• 塞尚的幾何化宣言：「以圓柱體、球體和圓錐體處理自然」（Traitez la nature par le cylindre, la sphère, le cône）——將自然界的複雜形態簡化為基本幾何體，為立體主義和現代抽象藝術鋪平了道路"},{"id":"as-modern-contemporary","title":"現代與當代藝術（20–21世紀）","content":"20世紀是藝術史上最為激盪的時期，藝術的邊界被不斷突破和重新定義。\n\n• 抽象表現主義的兩種主要風格：1）行動繪畫（Action Painting——波洛克為代表，將畫布鋪在地上，以滴灑、潑濺和甩動的方式將顏料鋪滿畫面，身體的運動軌跡直接變成畫面的構成——「繪畫是一種行動而非結果」）；2）色域繪畫（Color Field——羅斯科為代表，大面積的彩色矩形漂浮在色域之上，追求一種冥想的、精神性的觀看體驗——羅斯科要求他的作品以較暗的燈光展示並讓觀者站在約45厘米的距離，讓色彩「包圍」觀者）\n• 普普藝術（Pop Art）的核心概念：將大眾消費文化的廉價圖像提升到藝術殿堂，模糊「高雅藝術」和「低俗文化」的界限。安迪·沃荷的坎貝爾湯罐頭系列（32幅、每幅對應一種口味）和瑪麗蓮·夢露絲網印刷系列質疑了原創性、機械複製和名人崇拜之間的關係——「在未來，每個人都能成名15分鐘」\n• 觀念藝術（Conceptual Art，1960s–）的核心理念：藝術的核心不是最終的物質作品（繪畫、雕塑），而是作品背後的「觀念」或「想法」——杜象的《噴泉》（1917年）被視為觀念藝術的鼻祖。約瑟夫·科蘇斯（Joseph Kosuth）的《一把和三把椅子》（One and Three Chairs，1965年）同時展示了一把真實的木椅、一張椅子的等身大照片和詞典中「椅子」的定義文字——質疑了物體、圖像和語言之間的關係","subsections":[{"id":"as-cubism","title":"立體主義與抽象先驅","content":"畢卡索和布拉克於1907–1914年創立了立體主義，徹底打破了自文藝復興以來主宰西方藝術的單點透視法則。分析立體主義將物體分解為多個視角的碎片化幾何形狀同時呈現在畫布上；綜合立體主義則將報紙、壁紙等現成物拼貼（Collage）到畫面上。畢卡索的《亞威農少女》（1907年）以非洲面具般的面孔和破碎的幾何形體震驚了藝術界，被視為現代藝術的開山之作。《格爾尼卡》（1937年）是畢卡索對納粹德國轟炸西班牙小鎮格爾尼卡（Guernica）的強烈抗議——黑白的色調、扭曲的形體、尖叫的母親和死去的嬰兒，以立體主義的視覺語言將戰爭的恐怖凝結為永恆的控訴。康丁斯基被認為是純抽象繪畫的開創者——他相信色彩和形狀本身就具有「內在的聲音」和精神力量，能夠繞過物質世界的再現而直接觸動觀者的靈魂。馬列維奇的至上主義（《白底上的黑色方塊》，1915年）則將藝術推向了純粹幾何抽象的極限。蒙德里安以垂直和水平線條、紅黃藍三原色和黑白構成的新造型主義（De Stijl風格派），追求一種普世的、客觀的和諧秩序。\n\n• 立體主義的兩個階段：1）分析立體主義（1907–1912）：將物體分解為多視角的碎片化幾何形狀、色彩限於灰棕褐色調；2）綜合立體主義（1912–1914）：將報紙、壁紙、樂譜等現成物拼貼（Collage）到畫面上，重新引入色彩\n• 畢卡索《格爾尼卡》的象徵符碼解讀：公牛（野蠻和黑暗——可能是法西斯主義或西班牙本身）、馬（無辜的受害者——被長矛刺穿痛苦嘶鳴）、母親抱著死去的嬰兒（Pietà聖母哀悼基督的現代變體）、燈泡（真相的刺眼光芒）、斷劍旁的花朵（絕望中的希望）\n• 畢卡索的驚人產量：一生創作約13500幅繪畫、100000幅版畫、34000幅書籍插圖、300件雕塑——是全球公認的20世紀最多產和最具影響力的藝術家\n• 康丁斯基的「內在必然性」原則（Inner Necessity）：藝術創作應來自藝術家內在精神的必然要求，而非對外部世界的模仿——他在1910年創作了被認為是第一幅純抽象水彩畫"},{"id":"as-dada-surrealism","title":"達達與超現實主義","content":"達達主義（1916–1920s）誕生於第一次世界大戰期間的中立國瑞士蘇黎世，是對戰爭所暴露的理性文明幻滅的虛無主義回應。杜象以《噴泉》（1917年，一個署名「R. Mutt」、倒置在基座上的小便斗）挑戰了藝術的本體論問題——什麼是藝術？如果藝術家選擇了一個現成品並賦予它一個名稱，它是否就變成了藝術？這件作品對整個20世紀後半葉的觀念藝術產生了深遠的影響。超現實主義（1920s–）受佛洛伊德潛意識理論的啟發，致力於釋放被理性壓抑的潛意識和夢境世界。達利以精確寫實的技法（他稱之為「手��的夢境照片」）描繪荒誕的夢境場景——軟塌塌的鐘錶（《記憶的永恆》，1931年）、燃燒的長頸鹿、從石榴中跳出的老虎和魚。馬格利特則以日常物品的悖論性組合（《形象的叛逆》中畫有一隻精緻的煙斗，卻寫著「Ceci n'est pas une pipe」——「這不是一個煙斗」）來挑戰語言與圖像、現實與再現之間的關係。\n\n• 達達主義的起源和核心精神：1916年第一次世界大戰期間，一群逃避兵役的藝術家和作家聚集在中立國瑞士蘇黎世的「伏爾泰酒館」（Cabaret Voltaire），以荒誕不經的表演、詩歌和視覺藝術來抗議導致戰爭的理性文明——「達達」（Dada）的名字據說是隨機從字典中翻到的法語詞（意為兒童玩具「木馬」），象徵著對一切傳統價值和意義的否定。達達的核心信條：反理性、反美學、反藝術——如果理性文明導致了世界大戰，那麼理性本身就不值得信任\n• 超現實主義的自動書寫（Automatic Writing）和 exquisite corpse：1）自動書寫——在沒有意識控制的情況下讓手自由地在紙上寫字或繪畫，試圖繞過理性的審查直接釋放潛意識；2）exquisite corpse（精緻的屍體）——多人協作的遊戲：第一個人寫一個名詞、折疊紙張隱藏後傳給下一人、下一人寫一個動詞再傳遞……最終展開紙張得到的荒誕句子被認為是集體潛意識的顯現\n• 馬格利特的視覺悖論：《形象的叛逆》（The Treachery of Images，1929年）——畫中精確地描繪了一隻煙斗，但下方寫著「這不是一個煙斗」（Ceci n'est pas une pipe）。馬格利特的論點：這不是一個煙斗——這是一幅煙斗的圖畫，你不能用它來裝煙草和點燃它。語言、圖像和現實之間存在著無法跨越的鴻溝——這一洞見對後現代哲學（傳柯、布希亞）產生了深遠影響"},{"id":"as-post-war","title":"戰後至當代","content":"二戰後藝術中心從巴黎轉移到紐約。抽象表現主義（又稱紐約畫派，1940s–1950s）以波洛克（滴畫法——將顏料以滴灑和潑濺的方式鋪滿鋪在地上的巨大畫布，身體的運動軌跡直接變成了畫面的構成）和羅斯科（大面積的彩色矩形漂浮在色域之上，追求一種冥想的、精神性的觀看體驗——觀者被鼓勵站在畫作近前，讓色彩「包圍」自己）為代表。普普藝術（1950s–1960s）將大眾消費文化的廉價圖像——可樂瓶、坎貝爾湯罐頭（安迪·沃荷）、漫畫（李奇登斯坦的Ben-Day點狀印刷效果）——提升到藝術殿堂，模糊了「高雅藝術」和「低俗文化」之間的界限。極簡主義（1960s–）以最簡化的幾何形式和工業材料（鋼板、霓虹燈管、磚塊）消除了藝術家個人情感的痕跡。當代藝術（1980s至今）進入了徹底多元化的時代——裝置藝術、行為藝術、錄像藝術、數位藝術、NFT藝術等層出不窮，任何媒介和主題都可以成為藝術的表達方式。艾未未的裝置作品以日常物品（葵花籽、自行車、背包）承載對歷史、政治和個人命運的深刻反思；草間彌生以無限鏡像空間和「波點」構建了一個跨越內在幻覺和外在宇宙的個人烏托邦。\n\n• 極簡主義（Minimalism）的核心原則：1）消除藝術家個人情感和手勢的痕跡（「What you see is what you see」——Frank Stella）；2）使用工業材料（鋼板、霓虹燈管、磚塊、鏡面）和工業製造方法（而非手工製作）；3）作品以最簡化的幾何形式呈現（立方體、矩形、網格），強調物體本身的「物性」（Objecthood）和作品與展示空間的關係——Donald Judd的金屬盒子系列、Dan Flavin的霓虹燈管裝置\n• 當代藝術市場的關鍵數據：全球藝術市場2023年總值約650億美元，其中當代藝術（戰後至今）約佔一半。拍賣史上最昂貴的藝術品：達文西《救世主》（Salvator Mundi）——2017年在紐約佳士得以約4.5億美元成交（買家據信為沙烏地阿拉伯王儲穆罕默德·本·薩勒曼）\n• 數位藝術和NFT的革命（2021年）：Beeple（Mike Winkelmann）的數位拼貼作品《Everydays: The First 5000 Days》於2021年3月在佳士得以約6900萬美元成交——這是大型拍賣行首次拍賣純數位藝術品並接受加密貨幣（以太幣）付款，標誌著數位藝術進入主流藝術市場的轉折點"}]}]},{"id":"as-chinese","title":"中國藝術風格","content":"中國藝術自成獨立的體系，以筆墨為核心語言，講究「氣韻生動」（謝赫六法論的第一要義），追求「外師造化，中得心源」的創作原則。\n\n• 中國書畫裝裱的形式分類：1）卷（手卷——從右向左逐段展開欣賞，如《清明上河圖》）；2）軸（立軸——垂直懸掛欣賞，適合山水畫）；3）冊頁（蝴蝶裝或推篷裝——如書頁般翻閱，適合小品和書法）；4）扇面（團扇或折扇——小幅精緻作品）；5）屏條（四條屏、八條屏——多幅聯成一組，如春夏秋冬四季山水）\n• 中國畫的筆墨技法分類：筆法——中鋒（筆尖在線條中央，圓潤有力）、側鋒（筆尖偏側，線條變化豐富）、逆鋒（逆向運筆，蒼勁老辣）；墨法——焦墨（極濃極乾的墨）、濃墨、重墨、淡墨、清墨（墨分五色），以及潑墨（大面積潑灑墨色）、破墨（以濃破淡或以淡破濃——先畫一種墨色再以另一種墨色在其上或旁邊疊加）","subsections":[{"id":"as-chinese-painting","title":"中國繪畫的發展脈絡","content":"中國畫分為人物畫（最早成熟）、山水畫（最高成就）和花鳥畫三大科。山水畫在魏晉時期開始獨立發展，但真正成熟是在五代和宋代。北宋時期的山水畫以全景式構圖為特徵：范寬的《谿山行旅圖》（約1000年，台北故宮博物院藏）以一座巨大的山峰佔據畫面的三分之二，山腳下渺小的騾馬商隊襯托出自然的崇高和人類的卑微——這幅畫是中國山水畫乃至世界繪畫史上最重要的作品之一。南宋時期馬遠和夏圭開創了「一角構圖」和「半邊構圖」——大面積留白暗示著無限的空間和水面，以有限的畫面引發觀者對無限的聯想。元代（1271–1368）因蒙古統治下漢族士人的政治疏離，山水畫轉向更加個人化和內省的表達：黃公望的《富春山居圖》（1350年）以瀟灑鬆動的筆墨描繪浙江富春江的山水景色，被譽為「畫中之蘭亭」。明代董其昌（1555–1636）提出了南北宗論——以禪宗的南頓北漸來類比中國繪畫的兩種傳統，「南宗」（王維為始祖，文人畫傳統）重視筆墨趣味和精神性表達，「北宗」（李思訓為始祖，院體畫傳統）重視技巧和裝飾性，這一理論深刻影響了此後三百年的中國畫批評和創作。近現代中國畫經歷了中西融合的變革：徐悲鴻將西方寫實主義融入中國畫（《愚公移山》）；齊白石以簡率天真的大寫意花鳥蟲魚聞名（「似與不似之間」是他的美學主張）；張大千晚年以潑墨潑彩技法在西方抽象表現主義和中國傳統之間找到了獨特的融合路徑。\n\n• 謝赫六法論（約公元5世紀，中國最早的系統繪畫理論）：1）氣韻生動（最高原則——作品要有生命力）、2）骨法用筆（筆觸要有力度和結構）、3）應物象形（描繪物體的真實形態）、4）隨類賦彩（根據物體的類別著色）、5）經營位置（構圖佈局）、6）傳移模寫（臨摹學習傳統）\n• 山水畫的「三遠法」（北宋郭熙《林泉高致》）：高遠（從山下仰望山巔——表現崇高）、深遠（從山前望向山後——表現縱深）、平遠（從近山望向遠山——表現遼闊）\n• 文人畫與院體畫的區別：文人畫（重視筆墨趣味、詩書畫印一體、表達個人情感和修養——「聊寫胸中逸氣」）vs 院體畫（重視精細描繪、服務於宮廷審美、注重技巧和裝飾性）\n• 中國畫的獨特工具——文房四寶：筆（以湖筆最著名——浙江湖州、羊毛或黃鼠狼毛製成）、墨（以徽墨最著名——安徽徽州、松煙或油煙製成）、紙（以宣紙最著名——安徽涇縣、青檀皮和稻草製成、潤墨性極佳）、硯（以端硯和歙硯最著名——廣東肇慶和安徽歙縣）"},{"id":"as-calligraphy","title":"中國書法藝術","content":"書法被譽為中國藝術之首，是基於漢字書寫而發展出來的獨特視覺藝術。書法的演變與漢字形體的演變同步：甲骨文（殷商）是已知最早的成熟漢字，刻寫於龜甲獸骨之上，以尖銳的刻劃線條為特徵。金文（鐘鼎文）鑄造或刻於青銅器上，筆劃渾厚圓潤。篆書分為大篆（籀文，秦統一前各國文字）和小篆——秦始皇統一文字後李斯以秦國文字為基礎創製的小篆，筆劃均勻、結構對稱。隸書是漢代（前206–220）的主流書體，由篆書簡化演變而來，其標誌性的「蠶頭燕尾」（起筆如蠶頭圓潤，收筆如燕尾上揚）使書寫速度大大加快。楷書（又稱真書、正書）在漢末形成，至唐代達到極盛——歐陽詢（歐體，險峻嚴謹）、顏真卿（顏體，雄渾寬博）、柳公權（柳體，骨力勁健）各創一體，影響至今。行書是介於楷書和草書之間的流暢書體。王羲之（303–361）被尊為「書聖」，其《蘭亭序》（353年，永和九年暮春之初於會稽山陰之蘭亭所書）被譽為「天下第一行書」——通篇324字，「之」字出現了21次，每個都寫法不同，體現了書法在規矩和自由之間的完美平衡。顏真卿的《祭姪文稿》則被譽為「天下第二行書」——在極度悲憤的情緒下（為祭奠在安史之亂中犧牲的姪子顏季明而作），不經意間寫出了書法史上前無古人的傑作，滿紙塗抹修改的痕跡反而真實記錄了書寫者情感的波動。草書是書寫速度和情感表達的極致：張旭（「顛張」）醉酒後狂奔呼喊而後落筆成書；懷素（「醉素」）自稱「忽然絕叫三五聲，滿壁縱橫千萬字」。他們的狂草突破了文字的可讀性限制，是漢字的純粹視覺抽象和情感的即興噴發。\n\n• 書法的「永字八法」——以「永」字為例練習八種基本筆劃：1）側（點）、2）勒（橫）、3）努（豎）、4）趯（鉤）、5）策（仰橫/挑）、6）掠（長撇）、7）啄（短撇）、8）磔（捺）——據說源自王羲之\n• 楷書四大家（楷書四體）：歐陽詢（歐體——險峻嚴謹、結構緊湊、筆劃剛勁）、顏真卿（顏體——雄渾寬博、筆力飽滿、氣勢磅礡）、柳公權（柳體——骨力勁健、結體嚴密、筆力挺拔）、趙孟頫（趙體——秀美圓潤、筆法流暢、結構勻稱）\n• 天下三大行書排名：第一——王羲之《蘭亭序》（353年、324字、21個「之」字各不同）、第二——顏真卿《祭姪文稿》（758年、塗抹修改的痕跡反而真實記錄了書寫者情感的波動）、第三——蘇軾《黃州寒食帖》（1082年、在貶謫中的壓抑情感化為筆墨）\n• 草書的兩種主要形式：章草（漢代形成、字字獨立、保留隸書波磔筆意）和今草（魏晉形成、字間可以連綿、筆勢更加流暢）——狂草是今草的極致化（張旭、懷素為代表）"}]}]},{"id":"music-genres","title":"音樂風格","category":"culture","description":"從古典交響樂到現代電子音樂——音樂風格的完整發展脈絡與鑑賞指南","icon":"🎵","sections":[{"id":"mg-western-classical","title":"西方古典音樂","content":"西方古典音樂是根基於歐洲文化傳統的「藝術音樂」，以其複雜的結構、豐富的和聲語言和系統化的記譜法為特徵。","subsections":[{"id":"mg-baroque","title":"巴洛克時期（1600–1750）","content":"巴洛克音樂以複調織體（多個獨立的旋律線同時進行的對位法）、數字低音（Basso Continuo——由低音旋律線和數字標記的和聲體系）為核心特徵。巴赫（1685–1750）是巴洛克音樂的集大成者，將對位法藝術推向了後人難以企及的高度——《布蘭登堡協奏曲》（6首，1721年）是協奏曲形式的典範；《馬太受難曲》（1727年）以雙合唱、雙樂隊和獨唱的形式講述耶穌受難的故事，被門德爾松在1829年重新發掘和演出後引發了巴赫音樂的全球復興；《平均律鋼琴曲集》（兩卷，各24首前奏曲與賦格，涵蓋全部24個大小調）證明了平均律調音體系的可行性（在平均律下，所有的調聽起來都一樣好），被譽為鋼琴音樂的「舊約聖經」。韓德爾（1685–1759）以歌劇和清唱劇聞名（《彌賽亞》，1741年，其中「哈利路亞」大合唱已成為西方音樂最著名的片段——英國國王喬治二世在首次聽到這段音樂時感動得站了起來，從此全場起立聆聽「哈利路亞」的傳統延續至今）。韋瓦第（1678–1741）的《四季》（1725年）是早期標題音樂（Program Music）的傑作——四首小提琴協奏曲分別以十四行詩描述春夏秋冬的景象（如「春」中的鳥鳴和小溪潺潺、「冬」中的牙齒打顫和爐邊取暖）。\n\n• 巴洛克音樂的核心體裁：1）協奏曲（Concerto——獨奏樂器與樂隊的對話和競賽，韋瓦第將其發展為快-慢-快三樂章標準結構）、2）賦格（Fugue——巴赫將其推到極致，《賦格的藝術》是最後未完成的傑作）、3）清唱劇（Oratorio——以宗教故事為主題、不帶舞台表演的大型聲樂作品）、4）歌劇（Opera——蒙特威爾第的《奧菲歐》（1607年）被認為是第一部真正意義上的歌劇）\n• 巴赫的個人生活：結過兩次婚、共生20個孩子（其中10個存活到成年）、幾個兒子（C.P.E. 巴赫、J.C. 巴赫）成為古典主義時期的重要作曲家——在當時兒子的名聲遠大於父親\n• 數字低音（Basso Continuo）的運作方式：低音聲部以數字標記來指示演奏者應即興添加的和弦——典型配置為大鍵琴/管風琴（演奏和聲）+ 大提琴/低音管（演奏低音旋律線）\n• 巴洛克時期的樂器製作巔峰：斯特拉迪瓦里（Stradivari，1644–1737）製作了約1100件弦樂器，現存約650件，其小提琴被認為擁有無法複製的完美音質——2022年一把斯特拉迪瓦里小提琴以約1500萬美元成交"},{"id":"mg-classical","title":"古典主義時期（1750–1820）","content":"古典主義音樂追求均衡、清晰、優雅的形式美。交響曲和弦樂四重奏在這一時期定型。海頓（1732–1809）被尊為「交響曲之父」和「弦樂四重奏之父」——他創作了104首交響曲和68首弦樂四重奏，奠定了這些體裁的經典結構。莫扎特（1756–1791）是音樂史上最令人驚嘆的神童——4歲開始作曲，6歲在歐洲巡迴演出，雖然僅活了35年，卻留下了626部作品。他的歌劇（《費加洛的婚禮》、《唐·喬望尼》、《魔笛》）將音樂和戲劇完美融合；他的鋼琴協奏曲（27首）是這一體裁的巔峰。《安魂曲》（K. 626，1791年）是莫扎特的最後一部作品——據傳一位匿名委託人（實際是一位伯爵想將作品冒充成自己的創作以悼念亡妻）委託莫扎特創作安魂曲，莫扎特在生命的最後日子裡（可能是腎衰竭或風濕熱）深信自己正在為自己的葬禮譜寫彌撒——作品未完成他便去世了，由他的學生弗朗茨·蘇斯邁爾續成。貝多芬（1770–1827）是連接古典主義和浪漫主義的橋樑。他在約30歲時開始逐漸失去聽力（可能由鉛中毒、佩吉特氏病或免疫系統疾病引起），到晚年完全失聰，但仍在內心「聽見」音樂並寫下了許多最偉大的作品。第三交響曲《英雄》（1803–1804）原題獻給拿破崙，但當拿破崙稱帝的消息傳來後，貝多芬憤怒地撕去了題獻頁，重新命名為「為紀念一位偉人而作」。第五交響曲《命運》（1804–1808）的開篇四音動機（短—短—短—長，dada-da-DAA）是音樂史上最著名的旋律片段之一。第九交響曲《合唱》（1824年）首次在交響曲的終樂章引入了人聲（席勒的詩《歡樂頌》），具有人類大同的博愛精神——1985年歐盟將其選定為歐盟盟歌。\n\n• 交響曲的標準四樂章結構：第一樂章——快板、奏鳴曲式（呈示部-發展部-再現部）；第二樂章——慢板、抒情性；第三樂章——小步舞曲或詼諧曲（貝多芬以詼諧曲Scherzo取代小步舞曲）；第四樂章——快板或急板、迴旋曲式或奏鳴曲式\n• 莫扎特的天才表現：據說他在聽過一遍複雜的多聲部合唱後便能默寫出全部樂譜（阿萊格里《求主垂憐》Miserere事件——梵蒂岡禁止抄寫此曲，14歲的莫扎特聽後憑記憶默寫出來）；他的音樂手稿幾乎沒有修改痕跡——彷彿音樂早已完整地存在於他的腦海中\n• 貝多芬的創作分期：早期（約1792–1802，受海頓和莫扎特影響——第一、二交響曲、早期鋼琴奏鳴曲如《悲愴》）；中期/英雄時期（約1803–1814，個人風格成熟——第三至八交響曲、《皇帝》鋼琴協奏曲）；晚期（約1815–1827，完全失聰後的深邃內省——第九交響曲、最後五首鋼琴奏鳴曲和晚期弦樂四重奏）\n• 奏鳴曲式（Sonata Form）的結構分析：呈示部（第一主題在主調、第二主題在屬調或關係調）→發展部（對主題材料進行動機分裂、轉調和展開）→再現部（第一和第二主題都回到主調、達到調性和解）→尾聲（Coda——總結和收束）"},{"id":"mg-romantic","title":"浪漫主義時期（1820–1900）","content":"浪漫主義音樂強調個人情感的表現、對自然的熱愛和對超自然題材的迷戀。舒伯特（1797–1828）被譽為「藝術歌曲之王」，在短短31年的生命中創作了超過600首藝術歌曲（Lieder），以鋼琴和人聲的親密對話將德語詩歌的意境提升到了新的高度。《魔王》以疾速的鋼琴伴奏描繪父親策馬飛奔的場景，一人分飾敘事者、父親、兒子和魔王四個角色。白遼士的《幻想交響曲》（1830年）開創了固定樂思（Idée Fixe）的音樂敘事手法——一個代表「所愛之人」的旋律主題貫穿整部交響曲的各個樂章。蕭邦（1810–1849）幾乎畢生只為鋼琴作曲。他的夜曲（21首）以歌唱性的旋律（受義大利美聲歌劇的啟發）和精緻的裝飾音為特色；練習曲（27首）將技術練習的體裁提升到藝術傑作的地位（「革命練習曲」Op. 10 No. 12據說創作於俄羅斯鎮壓波蘭十一月起義的悲憤之中）。李斯特以其炫目的鋼琴技巧成為19世紀的超級明星——他的鋼琴獨奏會（他發明了「Recital」這個詞）引發了「李斯特狂熱」現象。柴可夫斯基（1840–1893）的芭蕾舞劇（《天鵝湖》、《睡美人》、《胡桃鉗》）至今仍是全球芭蕾舞團的核心劇目；《1812序曲》（1880年）以真實的加農炮和教堂鐘聲重現了俄羅斯抵禦拿破崙入侵的勝利。華格納（1813–1883）將歌劇改革為「樂劇」（Music Drama）——「總體藝術作品」（Gesamtkunstwerk）的理念要求音樂、詩歌、戲劇、舞台設計融為一體。《尼伯龍根的指環》（Der Ring des Nibelungen）四聯劇（《萊茵的黃金》、《女武神》、《齊格菲》、《諸神的黃昏》）歷時26年創作（1848–1874），演出時間總長約15小時，以主導動機（Leitmotif）貫穿整部作品——每個人物、物品或概念都有其特定的音樂主題。\n\n• 標題音樂（Program Music）vs 絕對音樂（Absolute Music）之爭：標題音樂（白遼士、李斯特、理查·施特勞斯——音樂應當描述故事、畫面或情感）vs 絕對音樂（布拉姆斯——音樂的意義在於音樂本身，不需要文字說明）——這是19世紀音樂美學的核心辯論\n• 蕭邦與李斯特的對比：蕭邦——內向、纖細、幾乎只在沙龍演奏、全部作品都涉及鋼琴、被稱為「鋼琴詩人」；李斯特——外向、炫技、在數千人面前演奏、鋼琴技巧達到前所未有的高度、晚年轉向宗教音樂\n• 柴可夫斯基與「俄羅斯五人組」的關係：五人組（巴拉基列夫、鮑羅定、庫宜、穆梭斯基、李姆斯基-高沙可夫）致力於創作純粹俄羅斯風格的音樂——柴可夫斯基被認為「過於西方化」而受到他們的批評，但實際上雙方都為俄羅斯音樂的黃金時代做出了巨大貢獻\n• 華格納的「主導動機」（Leitmotif）體系：《尼伯龍根的指環》四聯劇使用了超過80個主導動機——每個動機代表一個人物（齊格菲的英雄號角動機）、物品（指環的詛咒動機）、概念（命運動機）或情感（愛情動機）——動機隨著劇情發展而變形和交織"},{"id":"mg-20th-century","title":"20世紀古典音樂","content":"20世紀的古典音樂經歷了前所未有的多樣化發展。德布西的印象主義音樂以全音階和平行和弦營造朦朧的音響畫面（《牧神午後前奏曲》，1894年，被認為是現代音樂的開端）。斯特拉文斯基的《春之祭》（1913年）在巴黎首演時引發了音樂史上最著名的騷亂——不規則的重音、複調性的衝突和原始主義的暴力節奏徹底顛覆了傳統芭蕾音樂的審美。勳伯格在1920年代發明了十二音技法（廢除傳統調性中心的序列主義作曲法），影響了整個世紀的嚴肅音樂創作。極簡主義音樂（Minimalism，1960s–）以反覆的簡短音樂模式和漸進的變化為核心——菲利普·格拉斯的歌劇《愛因斯坦在海灘上》（1976年）以長時間的重複和微妙的變化挑戰了聽眾對時間和音樂結構的感知。\n\n• 勳伯格十二音技法的具體操作：將一個八度內的12個半音按照特定順序排列為一個「音列」（Tone Row），整部作品必須嚴格按照這個音列及其變體（逆行Retrograde——從後向前排列；倒影Inversion——每個音程的方向反轉；逆行倒影Retrograde Inversion）來組織——任何一個音在其他11個音都出現之前不得重複，從而徹底廢除了傳統調性體系中的「主音」中心。勳伯格的學生韋伯恩（Anton Webern）將十二音技法推向更極端的精簡——他的作品極其短小（有些不到一分鐘），每個音的音色、力度和發音方式都經過嚴格設計（音色旋律Klangfarbenmelodie）\n• 極簡主義音樂（Minimalism）的四大代表人物：1）拉·蒙特·揚（La Monte Young——以長時間的持續音和純律調音探索聲音的本質）；2）特里·萊利（Terry Riley——《In C》（1964年）被認為是極簡主義音樂的奠基作，由53個簡短音樂片段組成，演奏者可以自由決定每個片段重複多少次，每次演奏都不同）；3）史蒂夫·萊希（Steve Reich——相位轉移技術Phasing——兩個相同的音樂模式以略微不同的速度播放，逐漸產生錯位和複雜的節奏紋理）；4）菲利普·格拉斯（Philip Glass——以重複的琶音和附加節奏Additive Rhythm為特徵，歌劇《愛因斯坦在海灘上》（1976年）長約5小時、無中場休息、觀眾可以自由進出）"}]},{"id":"mg-popular","title":"流行音樂的發展","content":"20世紀以來流行音樂成為全球性的文化現象，以多元的風格、商業化的運作和大眾傳播的方式深刻地影響了人們的生活。\n\n• 藍調（Blues）對搖滾樂的深遠影響：藍調的12小節結構（I-I-I-I / IV-IV-I-I / V-IV-I-I）和藍調音階（在主音階的基礎上加入降三度、降五度和降七度的「藍音」Blue Notes）是搖滾樂的DNA。早期搖滾先驅——查克·貝里（Chuck Berry）將藍調節奏與鄉村音樂結合創造了搖滾吉他的基本語彙（「鴨步」Duck Walk舞台動作和標誌性的雙音推弦Licks）；小理查（Little Richard）以狂野的鋼琴演奏和尖叫式唱腔打破了種族和音樂的界限\n• 雷鬼（Reggae）的節奏特徵和文化意義：起源於1960年代末的牙買加，以「弱拍強奏」（Offbeat——吉他或鍵盤在第二和第四拍上彈奏短促的和弦，形成獨特的「反拍」節奏感Skank）和低音主導（Bass-heavy）為標誌。鮑勃·馬利（Bob Marley，1945–1981）將雷鬼和拉斯塔法里教（Rastafari）的精神信仰推向全球——「One Love」和「Redemption Song」超越了音樂成為和平與解放的全球頌歌","subsections":[{"id":"mg-jazz","title":"爵士樂（Jazz）","content":"爵士樂於20世紀初在新奧爾良誕生，是非洲節奏傳統與歐洲和聲體系在美洲土壤上的融合結晶。新奧爾良爵士（Dixieland）以集體即興為特色——小號、長號和單簧管同時即興演奏不同的旋律線。路易斯·阿姆斯壯（1901–1971）將爵士樂從集體即興轉向獨奏家的藝術——他獨特的小號演奏和沙啞的嗓音（以及他開創的「擬聲唱法」——Scat Singing，以「doo-bee-doo-bah」等無意義音節進行即興演唱）重新定義了爵士樂的可能。搖擺樂時代（Swing Era，1930s）以艾靈頓公爵和貝西伯爵的大樂隊為代表，是爵士樂作為大眾舞曲的黃金時代。Bebop革命（1940s）由查理·帕克和迪齊·吉萊斯皮等人發起——極快的速度、複雜的和聲替換和技巧性的即興將爵士樂從舞曲轉變為強調藝術性的聆聽音樂。邁爾士·戴維斯（1926–1991）是爵士樂不停革新的推動者——《Kind of Blue》（1959年）以調式爵士（基於音階而非和弦進行來即興）創造了爵士史上最暢銷的專輯，也是公認的傑作。約翰·柯川（1926–1967）的《A Love Supreme》（1965年）是爵士靈歌（Spiritual Jazz）的里程碑——四樂章的組曲記錄了柯川個人從迷失到靈性覺醒的旅程，將爵士樂提升到純粹的精神修行層面。\n\n• 爵士樂的節奏核心——搖擺感（Swing）：不是簡單的三連音，而是將每一拍不均勻地劃分——前半部分略長、後半部分略短，創造出一種向前推進的彈性節奏感（「It don\\'t mean a thing if it ain\\'t got that swing」——艾靈頓公爵）\n• 爵士樂的即興原則：在給定的和弦進行（Changes）框架內即興創作旋律——音樂家在獨奏時根據和弦的引導即時創造旋律線，每次演奏都是獨一無二的\n• 藍調（Blues）的12小節結構：I-I-I-I / IV-IV-I-I / V-IV-I-I——這簡單的12小節和三個和弦（I-IV-V）孕育了藍調、搖滾和大部分流行音樂的基礎\n• 約翰·柯川的《Giant Steps》（1960年）——和弦進行（Coltrane Changes）以大三度為循環快速轉調，被公認為爵士樂歷史上最具挑戰性的即興曲目之一"},{"id":"mg-rock","title":"搖滾樂（Rock）","content":"搖滾樂在1950年代誕生於美國，融合了節奏藍調、鄉村音樂和福音音樂。貓王艾維斯·普里斯萊（1935–1977）以充滿爭議的表演風格（旋轉的骨盆）和融合黑白音樂傳統的嗓音引爆了搖滾革命。1960年代披頭四（The Beatles）不僅是搖滾史上最成功的商業組合，更是將流行音樂提升到藝術形式的關鍵力量——從早期的流行搖滾（《Please Please Me》，1963年）轉向《Rubber Soul》（1965年，受大麻和鮑勃·迪倫的影響）、再到革命性的《Sgt. Pepper's Lonely Hearts Club Band》（1967年），這張專輯以概念專輯的形式、運用磁帶循環、倒放錄音和印度音樂元素等實驗技術，模糊了流行音樂和前衛藝術之間的界限。平克·佛洛伊德的《The Dark Side of the Moon》（1973年）以前衛搖滾的複雜結構、哲學性的歌詞和劃時代的錄音技術探索了現代生活中的壓力、瘋狂、死亡和時間流逝——這張專輯在Billboard專輯榜上連續停留了741週（超過14年），是唱片工業最驚人的長銷記錄之一。搖滾樂發展出的分支包括重金屬（Black Sabbath、Led Zeppelin）、龐克搖滾（Sex Pistols、The Clash，以三和弦和反體制的姿態對抗搖滾的「過度複雜化」）、另類搖滾（Nirvana的《Nevermind》1991年將Grunge音樂從西雅圖的地下場景推向全球主流）等。鮑勃·迪倫在2016年獲得了諾貝爾文學獎——「在偉大的美國歌曲傳統中創造了新的詩意表達」——證明了流行音樂的歌詞創作同樣可以達到文學的高度。\n\n• 披頭四錄音技術的革命性創新：1）多軌錄音（4軌→8軌錄音機的使用使樂器和人聲可以分開錄製再合成）、2）磁帶循環（Tape Loops——錄製一段聲音然後讓磁帶循環播放）、3）倒放錄音（Reverse Tape——將錄音倒著播放嵌入歌曲中，如《Tomorrow Never Knows》）、4）自動雙軌（ADT——Artificial Double Tracking，由錄音工程師Ken Townsend發明以解決John Lennon不喜歡反覆錄音的問題）\n• 鮑勃·迪倫「插電」事件（1965年紐波特民謠音樂節）：迪倫帶著電吉他上台演奏《Like a Rolling Stone》→被民謠純粹主義者噓聲→被認為是「背叛」民謠→實際上是一次音樂語言的革命性拓展\n• 《The Dark Side of the Moon》的概念連貫性：整張專輯圍繞現代生活的壓力——時間（《Time》）、金錢（《Money》）、死亡（《The Great Gig in the Sky》）、精神疾病（《Brain Damage》）——最後回到「所有的一切都在陽光下和諧統一」（《Eclipse》），形成了完整的概念循環"}]}]},{"id":"fashion","title":"服裝史與時尚","category":"culture","description":"從古代服飾到現代時裝設計——服裝文化的演變、經典品牌與時尚生態","icon":"👗","sections":[{"id":"fh-evolution","title":"服裝歷史演變","content":"服裝是人類文明最直觀的標誌之一，反映著��會制度、技術水平、審美觀念和身分認同的變遷。","subsections":[{"id":"fh-chinese","title":"中國傳統服飾體系","content":"中國服飾歷史悠久、體系完整。漢服是中國傳統服飾的總稱，其核心特徵為：交領右衽（衣領相交且右襟壓左襟）、寬袍大袖、繫帶隱扣，以平面裁剪為基本方式。主要形制包括衣裳制（上衣下裳，最古老的形制）、深衣制（上下連為一體，象徵「規矩」——上衣的四幅代表四季、下裳的十二幅代表十二月份）和袍服制。周代是服飾制度的奠基期——《周禮》詳細規定了天子、諸侯、大夫、士各等級在祭祀、朝會、喪葬等不同場合的穿戴，服飾成為禮制的重要組成部分。唐代是中國服飾最為華麗開放的時代——女裝出現了大膽的袒胸裝（「慢束羅裙半露胸」），胡服（來自西域和北方民族的服飾）流行，女性甚至可以穿男裝。宋代服飾轉向含蓄典雅——理學的「存天理滅人欲」觀念使服飾趨於保守素淨；褙子（一種長至膝下的直領對襟外套）是宋代最具代表性的女裝。明代恢復了漢族傳統，服飾制度最為完備——補服制度的設立（文官繡禽、武官繡獸，以補子上的圖案區分官階品級，如文官一品繡仙鶴、武官一品繡麒麟）。清代推行「剃髮易服」政策（「留頭不留髮，留髮不留頭」），男子的傳統漢服基本消失。滿族的長袍馬褂成為官定服飾。旗袍源自滿族女性的長袍，在民國時期經過改良（收腰、開衩、立領）後成為最具代表性的中國女性服飾。\n\n• 漢服的主要形制詳解：1）衣裳制（上衣下裳——最古老，冕服即此制、上衣玄色象天、下裳纁色象地）、2）深衣制（上下連為一體——「被體深邃」故名深衣、曲裾和直裾兩種繞襟方式）、3）袍服制（長度至腳踝的整幅布料製成的外衣——圓領袍在唐代最為流行）、4）襦裙制（短上衣配長裙——高腰襦裙在唐代最為流行）\n• 中國服飾的十二章紋（天子冕服上的十二種圖案）：日（紅色圓形中有三足烏鴉）、月（白色圓形中有玉兔搗藥）、星辰（三星）、山、龍（升龍和降龍）、華蟲（雉雞）、宗彝（祭祀用酒器、上繪虎和長尾猴）、藻（水草）、火、粉米（白米粒）、黼（黑白相間的斧形）、黻（黑青相間的亞形）——前六種繪於上衣、後六種繡於下裳\n• 唐代女性化妝步驟（七步驟）：1）敷鉛粉（打底）、2）抹胭脂（腮紅）、3）畫黛眉（以青黑色顏料畫眉——唐代流行粗短的「桂葉眉」和細長的「柳葉眉」）、4）貼花鈿（額頭上貼金箔或彩紙剪成的花形）、5）點面靨（酒窩處點兩點紅色）、6）描斜紅（眼角兩旁畫月牙形紅色）、7）塗唇脂（以紅色點染嘴唇——唐代流行「櫻桃小口」只塗嘴唇中央）"},{"id":"fh-western","title":"西方服飾演變","content":"古希臘的Chiton（一塊布料經由別針和腰帶固定而形成的簡約服裝）和古羅馬的Toga（長達5.5米的半圓形羊毛織物，以複雜的折疊方式纏繞於身體）是西方服飾的起點——這些服裝以垂墜感和身體的自然形態為美。中世紀服飾受宗教影響，保守而層次分明。文藝復興時期（15–16世紀）服飾開始展現人體美——男裝以寬肩（以填充物加寬肩部）和緊身褲強調V形體型；女裝以緊身胸衣和寬大的裙撐強調細腰和豐臀。17–18世紀的巴洛克和洛可可時期服飾極盡奢華——法國宮廷（特別是路易十四的凡爾賽宮）成為歐洲時尚的中心。假髮（路易十四因禿頭而開始戴假髮，貴族紛紛效仿，假髮越高地位越高）和鯨骨裙撐（Pannier，使裙子兩側擴張到可達1.5米的寬度）是這一時期的標誌。19世紀維多利亞時代（1837–1901），工業革命和大英帝國的全球擴張使維多利亞女王成為世界上最有權力、最有影響力的時尚指標。女性服飾趨於保守——層層疊疊的襯裙（Crinoline）、緊身的束腰（將腰圍勒至約45–50厘米，造成了無數的健康問題）。20世紀是女性服飾革命性解放的世紀：保羅·波烈（1879–1944）率先廢除了束腰。可可·香奈兒（1883–1971）則將男裝元素引入女裝設計——她以針織面料（Jersey，原來只用於男性內衣）製作舒適簡約的女性服裝，解放了女性的身體。1926年她推出了小黑裙（Little Black Dress）——黑色在此之前主要是喪服的顏色，香奈兒將其轉化為永恆優雅的象徵。1947年，克里斯汀·迪奧推出了「新風貌」（New Look）——圓潤的肩線、極度纖細的腰身和蓬大的長裙（有些裙子的面料用量超過20米），在戰後的物資短缺年代引發了爭議（有些女性在街上撕扯穿著Dior的女人，認為這種奢華是對物資匱乏時期的不尊重），但也重新喚起了女性對優雅和女性美的渴望。1960年代，瑪麗·匡特（Mary Quant）創造了迷你裙——長度在膝蓋以上約10厘米的裙子成為女性解放和青年文化的強烈宣言。伊夫·聖羅蘭（Yves Saint Laurent）在1966年推出了「吸煙裝」（Le Smoking）——女性穿西裝（此前被認為是男性的專屬）從此成為強勢、獨立和性感的象徵。\n\n• 古羅馬Toga的社會等級標誌：Toga Virilis（純白色——成年男性公民）、Toga Praetexta（鑲紫色邊——元老院議員和高級官員的未成年兒子）、Toga Pulla（深灰或黑色——喪服）、Toga Candida（以白堊粉漂白至極白——競選公職的候選人、candidate一詞源於此）、Toga Picta（全紫色並繡金——凱旋將軍和後來的皇帝專用）\n• 16–17世紀緊身胸衣（Corset/Stays）的社會影響：將腰圍勒至極限（據記載有些宮廷貴族的腰圍被勒至不足50厘米）→壓迫內臟（肝臟和胃被向上擠壓、肋骨變形）→呼吸困難→頻繁昏厥→但被視為「高貴的柔弱」\n• 裙撐（Hoop Skirt/Pannier/Crinoline）的演變：16世紀西班牙Farthingale（鐘形裙撐）→18世紀法國Pannier（兩側擴張可達1.5米寬，貴婦過門需側身）→19世紀Crinoline（以馬毛和鋼絲製成的籠式裙撐，比之前的裙撐輕便但仍極其龐大）→1870年代轉為後凸的Bustle（臀墊）形狀\n• 20世紀女性服飾解放的關鍵時間節點：1906年波烈廢除束腰→1910年代香奈兒引入針織面料→1920年代Flapper風格（無腰線直筒裙、短髮、膝蓋以上裙長——象徵女性獲得投票權和社會解放）→1947年迪奧New Look（回歸極致女性化——在戰後爭議中重新定義優雅）→1960年代迷你裙（女性身體自主權的宣言）→1966年聖羅蘭吸煙裝（女性穿西裝——挑戰性別規範）"}]},{"id":"fh-brands","title":"時尚品牌體系","content":"現代時尚產業以巴黎為中心，米蘭、倫敦、紐約為重要節點，形成了高級訂製（Haute Couture）、高級成衣（Prêt-à-Porter）和大眾市場三個層級的金字塔結構。\n\n• 時尚產業的全球市場規模（2023年）：全球奢侈品市場約3700億歐元（含個人奢侈品、豪華汽車、酒店和美食），其中個人奢侈品（時裝、皮具、珠寶、手錶、化妝品）約3620億歐元。LVMH集團（Louis Vuitton Moët Hennessy——旗下75個品牌包括Louis Vuitton、Dior、Givenchy、Fendi、Tiffany、Bulgari等）市值約4000億歐元，是全球最大的奢侈品集團和歐洲市值最高的公司之一\n• 時尚產業的可持續發展挑戰：時尚產業約佔全球碳排放的10%（比國際航運和航空的總和還多）、全球廢水的20%。快速時尚（Fast Fashion）模式——Zara每年推出約2萬款新品、Shein每天推出約6000款新品——以極低成本、極快速度和大量廢棄為特徵，對環境造成了巨大的壓力。可持續時尚的探索方向：循環時尚（Circular Fashion——回收舊衣物製造新面料）、植物基替代材料（蘑菇皮革Mylo、菠蘿纖維Piñatex、仙人掌皮革Desserto）、租賃和二手平台（Rent the Runway、The RealReal）","subsections":[{"id":"fh-haute-couture","title":"高級訂製（Haute Couture）","content":"「高級訂製」（Haute Couture）是一個受法國法律保護的專有名詞——只有獲得法國工業部認證並符合嚴格標準的品牌才能使用。這些標準包括：在巴黎擁有工作室（Atelier），至少僱用15名全職工匠，每季在巴黎展示至少25套原創設計，所有服裝均為手工製作並為客戶量身訂製。高級訂製是時尚工藝的巔峰——一件高級訂製禮服可能需要數百甚至數千小時的手工製作（包括刺繡、珠繡、羽毛處理、打褶等精細工藝，由Lesage刺繡工坊、Lemarié羽飾工坊等專業手工坊完成）。目前僅約有十餘個品牌持有一級高級訂製會員資格，包括Chanel、Dior、Givenchy、Jean Paul Gaultier、Maison Margiela等。高級訂製雖然只服務於全球約2000名客戶（其中相當部分來自中東和海灣地區），但它在時尚體系中扮演著創意燈塔的角色——最高級別的工藝和創意在訂製秀上展示，然後逐級影響高級成衣和大眾市場的設計方向。\n\n• 高級訂製的工藝分工（以Chanel為例）：Lesage刺繡工坊（創立於1858年，1996年被Chanel收購——刺繡樣品庫收藏超過7萬件刺繡樣本）、Lemarié羽飾和山茶花工坊（1880年創立——每朵Chanel山茶花由16片花瓣手工組合而成）、Massaro鞋履工坊（1894年創立——每雙高級訂製鞋需約30小時手工製作）、Michel帽飾工坊（1936年創立）\n• 高級訂製的經濟學：一件入門級高級訂製日裝約2–4萬歐元、一件高級訂製婚紗或晚禮服可達10–30萬歐元以上——全球客戶僅約2000人（其中活躍客戶約200–400人），每年兩季高級訂製時裝週的虧損由香水、化妝品和配件銷售來補貼——高級訂製本質上是品牌的「營銷燈塔」而非直接利潤來源"}]}]},{"id":"sports","title":"體育文化","category":"culture","description":"全球主要體育運動的歷史、規則演進與文化意義","icon":"⚽","sections":[{"id":"sports-football","title":"足球（Soccer/Football）","content":"現代足球規則於1863年在英國倫敦的共濟會酒館（Freemasons' Tavern）由英格蘭足球總會（The FA）正式確立，將足球與當時流行的欖球（Rugby，允許用手持球）明確區分開來——「足球」和「欖球」從此成為兩個不同的運動項目。國際足球協會（FIFA）於1904年在巴黎成立，最初只有7個會員國（法國、比利時、丹麥、荷蘭、西班牙、瑞典和瑞士），現已發展到211個會員協會，是世界上成員最多的國際體育組織。國際足聯世界盃自1930年（首屆在烏拉圭舉行，東道主奪冠）以來每四年舉辦一屆，是全球收視率最高、商業價值最大的單一體育賽事——2022年卡塔爾世界盃決賽全球觀眾人數約15億。巴西以5次奪冠位居榜首（1958、1962、1970、1994、2002）；「球王」比利（1940–2022）是唯一三次獲得世界盃冠軍（1958、1962、1970）的球員——1958年世界盃時他才17歲，在決賽中攻入了兩球。歐洲五大聯賽（英格蘭超級聯賽、西班牙甲級聯賽、德國甲級聯賽、義大利甲級聯賽、法國甲級聯賽）涵蓋了世界上最好的俱樂部和球星。歐洲冠軍聯賽（UEFA Champions League）是俱樂部層面的最高榮譽——皇家馬德里以15次奪冠位居榜首。美斯（Lionel Messi）和C朗（Cristiano Ronaldo）的雙雄競爭（2008–2022年左右）定義了一個時代——兩人共獲得13次金球獎（Ballon d'Or，美斯8次、C朗5次）。2022年美斯在世界盃決賽中帶領阿根廷擊敗法國奪冠（3–3平局後以12碼4–2獲勝），完成了其職業生涯最重要的一座獎盃的加冕。"},{"id":"sports-olympics","title":"奧林匹克運動會","content":"古希臘奧林匹克競技會始於公元前776年（這一年被認為是古希臘有可靠紀年的開始），每四年在伯羅奔尼撒半島的奧林匹亞聖地舉行，專門獻給眾神之王宙斯。競技會期間全希臘實行「神聖休戰」（Ekecheiria）——各城邦暫停一切戰爭，運動員和觀眾可以安全地往返奧林匹亞。古代奧運會的競賽項目包括賽跑、摔跤、拳擊、戰車賽和五項全能等。獲勝者的獎品是一個用橄欖枝編成的花環（來自宙斯神廟旁的神聖橄欖樹），但回到自己的城邦後他們會得到極大的榮譽和實際的獎勵（如終身免稅）。公元393年，羅馬皇帝狄奧多西一世（以基督教為國教的皇帝）以奧運會是異教節日為由下令禁止，延續了一千多年的古代奧運會從此終結。現代奧運會由法國教育家顧拜旦男爵（Pierre de Coubertin，1863–1937）發起復興——他認為體育教育是培養全面發展的公民的重要途徑，並將古希臘的奧林匹克精神與現代體育相結合。1896年，第一屆現代奧運會在雅典舉行（以向古希臘致敬），共有14個國家的241名運動員參賽。奧運五環（藍、黃、黑、綠、紅）象徵五大洲的團結——這五種顏色加上白色的旗底包括了全世界所有國家國旗的顏色。奧運格言「更快、更高、更強」（Citius, Altius, Fortius）由顧拜旦的朋友、神父迪東提出，2021年國際奧委會加入了「更團結」（Communiter）一詞。冬季奧運會（冬奧）自1924年開始舉辦（首屆在法國夏蒙尼），專門針對冰雪運動項目（滑雪、滑冰、冰球等）。帕拉林匹克運動會（殘奧會，Paralympic Games）自1960年起為身障運動員舉辦，與奧運會使用相同的場館。奧運會不僅是全球最高水平的綜合性體育賽事，更是國際文化交流、城市營銷和軟實力展示的超級平台。"}]}]},{"id":"philosophy","title":"哲學與社會科學","icon":"🧠","color":"#6D28D9","description":"探索人類思想的深層結構——哲學、政治、心理學、社會學、法律與宗教","topics":[{"id":"philosophy-main","title":"哲學","category":"philosophy","description":"東西方哲學思想的核心體系、發展脈絡與當代意義","icon":"💭","sections":[{"id":"phil-what","title":"什麼是哲學？","content":"哲學（Philosophy）一詞源自希臘語 φιλοσοφία（philosophia），由 φιλεῖν（philein，愛）和 σοφία（sophia，智慧）組成，意為「愛智慧」。哲學不同於經驗科學——它不通過實驗和觀察來獲取關於世界的知識，而是通過理性思辨、邏輯分析和概念澄清來追問那些最根本的問題：什麼是真實的？（形而上學/本體論）、我們如何知道？（認識論）、我們應該如何生活？（倫理學）、什麼是美？（美學）、什麼是正義？（政治哲學）、推理和論證的規則是什麼？（邏輯學）。哲學也許不能給出確定的答案（這正是它與科學的區別），但它在不停地提出更深刻的問題，挑戰和檢驗我們自以為理所當然的假設。蘇格拉底說「未經審視的人生不值得活」——這就是哲學的精神。\n\n• 哲學的三個核心分支（傳統分類）：1）形而上學（Metaphysics——研究「什麼是真實存在的？」：終極實在的本質是什麼？宇宙有開端嗎？自由意志存在嗎？上帝存在嗎？）；2）認識論（Epistemology——研究「我們如何知道？」：知識的來源和限度是什麼？什麼是真理？我們能確定地知道任何事情嗎？）；3）倫理學（Ethics——研究「我們應該如何生活？」：什麼是善？什麼是對的行為？道德判斷有客觀標準嗎？）\n• 邏輯學的三條基本定律：1）同一律（Law of Identity——A就是A，一個事物等於它自身）；2）矛盾律（Law of Non-Contradiction——一個命題和它的否定不能同時為真：不能同時說「這朵花是紅色的」和「這朵花不是紅色的」都為真）；3）排中律（Law of Excluded Middle——對於任何命題，要麼它為真要麼它的否定為真，沒有第三種可能：P或非P必有一真）"},{"id":"phil-western","title":"西方哲學","content":"西方哲學始於古希臘，歷經兩千多年的發展，形成了探索存在、知識、價值、理性和語言的系統化思考傳統。","subsections":[{"id":"phil-greek","title":"古希臘哲學","content":"所有西方哲學都是柏拉圖對話錄的註腳——懷海德（Alfred North Whitehead）的這句名言（雖然有些誇張）指出了古希臘哲學對整個西方思想傳統的決定性影響。\n\n• 古希臘哲學的三個時期劃分：1）前蘇格拉底時期（約前600–前400）——關注宇宙的本原（什麼是萬物的終極構成？）：泰勒斯（水）、阿那克西曼德（無定Apeiron）、赫拉克利特（火和流變）、巴門尼德（存在）、德謨克利特（原子）；2）古典時期（約前450–前322）——蘇格拉底→柏拉圖→亞里士多德的師徒傳承，從自然哲學轉向倫理和政治哲學；3）希臘化時期（約前322–前30）——斯多葛學派（接受命運、以理性克制情感——「不是事物本身而是我們對事物的看法困擾我們」Epictetus）、伊壁鳩魯學派（追求快樂——但快樂的定義不是感官享樂而是身體無痛苦和心靈無煩擾Ataraxia）、懷疑主義（懸擱判斷Epoché——既然確定性不可能，不如懸擱判斷以獲得內心平靜）","subsections":[{"id":"phil-socrates","title":"蘇格拉底（前470–前399）","content":"蘇格拉底是西方哲學的轉折點——西塞羅說他「把哲學從天上帶回人間」。他之前的哲學家（前蘇格拉底哲學家，包括泰勒斯（認為萬物源於水）、赫拉克利特（萬物流變、無物常駐——「人不能兩次踏入同一條河流」）、巴門尼德（區分了真實的存在和虛幻的變化）、德謨克利特（原子論——萬物由不可分割的原子和虛空構成）等）主要關注宇宙的本原和構成問題。蘇格拉底轉而追問倫理問題——什麼是正義？什麼是勇氣？什麼是美德？他以反詰法（Elenchus——又稱蘇格拉底法）不斷追問對話者，使其認識到自己原有觀念中的矛盾和無知。他著名地宣稱「我只知道自己一無所知」（這是人類智慧的最高形態——知道自己不知道）。蘇格拉底自己沒有留下任何著作——我們對他的認識主要來自其追隨者色諾芬的回憶錄和其學生柏拉圖的對話錄。前399年他被雅典法庭以「不敬城邦之神和敗壞青年」的罪名判處死刑。他的朋友安排他越獄逃往他鄉，但蘇格拉底拒絕了——他認為遵守法律（即使是不公正的判決）比逃避懲罰更重要，最終從容飲下毒芹汁赴死。他的犧牲成為西方文化中為真理和原則而殉道的最早和最崇高的象徵之一。\n\n• 蘇格拉底反詰法（Elenchus）的標準操作流程：1）提出一個定義性問題（「什麼是正義？」）→2）對話者給出一個定義→3）蘇格拉底通過提問揭示該定義的矛盾或反例→4）對話者修正定義→5）重複步驟2-4直到雙方認識到問題的複雜性→最終不給出確定答案（Aporia——「無解困境」）——目的不是傳授知識而是激發自我反思\n• 蘇格拉底之死的完整故事：被判死刑後，他的朋友克里同安排他越獄→蘇格拉底拒絕——他認為：1）逃跑是違法的、法律是公民與城邦之間的契約；2）即使判決不公、遵守法律也比破壞法律更為正義；3）他已經70歲、與其苟延殘喘不如從容赴死。他在獄中與弟子討論靈魂不滅（《斐多篇》中的最後對話），最後平靜地飲下毒芹汁——「克里同，我們欠阿斯克勒庇俄斯（醫神）一隻公雞，別忘了還」是他的遺言（暗示死亡是靈魂從身體的疾病中康復）\n• 前蘇格拉底哲學家的核心命題：泰勒斯（「萬物源於水」——被認為是西方哲學和科學的開端）、阿那克西曼德（「無定」Apeiron是萬物的本原——比水更抽象的起源概念）、畢達哥拉斯（「萬物皆數」——宇宙的本原是數學關係，創立了以數學和音樂為核心的半宗教團體）、赫拉克利特（「萬物流變」Panta rhei——「人不能兩次踏入同一條河流」）、巴門尼德（「存在存在、非存在不存在」——區分了永恆不變的真實存在和虛幻的變化世界，開創了形而上學的理性主義傳統）"},{"id":"phil-plato","title":"柏拉圖（前427–前347）","content":"柏拉圖深受蘇格拉底之死的震撼，放棄了從政的計劃，轉而投身哲學以探索正義和理想社會的可能。他於約前387年在雅典郊外創立了學園（Academy）——被認為是西方第一所高等教育機構，存在了約900年（直到529年被基督教皇帝查士丁尼一世關閉）。柏拉圖的兩個核心學說：1）理型論（Theory of Forms/Ideas）：我們通過感官感知的物質世界只是流變的、不完美的「影子」，真正的實在存在於永恆的、不變的、完美的「理型」或「形式」（Form/Idea）世界中。比如世間所有具體的馬都是對完美的「馬之理型」的不完美摹本；所有正義的行為都分享了「正義之理型」。在《理想國》（Republic）第七卷的洞穴寓言中，柏拉圖以一個極具想像力的比喻闡述了這一思想——人類就像自小被囚禁在洞穴中的囚徒，被鎖鏈束縛只能看到前方牆上由身後火光投射的影子，他們認為這些影子就是真實世界。哲學家就像是掙脫了鎖鏈、走出了洞穴的人——最初被陽光刺激得什麼也看不清，但逐漸適應後看到了真正的世界（太陽象徵著「善之理型」，一切知識和真理的源泉）。2）哲學家國王（Philosopher King）——在《理想國》中柏拉圖提出只有當哲學家成為國王（或國王變成哲學家）時，正義的社會才有可能實現。柏拉圖的著作幾乎全部以對話體寫成（蘇格拉底通常是主要發言者），這不是偶然的——他認為真理最好通過對話和辯證（而非獨白）來接近。\n\n• 柏拉圖理型論（Theory of Forms）的完整闡述：存在兩個世界——可感世界（Visible World，我們通過感官感知的物質世界，是不斷流變的、不完美的「影子」）和可知世界（Intelligible World，永恆不變的、完美的理型/形式所在的世界，只能通過理性而非感官來認知）。理型是完美的原型——世間所有的圓形物體都是對「圓之理型」的不完美摹本；所有正義的行為都「分有」了正義之理型\n• 洞穴寓言（Allegory of the Cave）的層層隱喻：洞穴=可感世界（人類日常感知的世界）、囚徒=普通人（被感官經驗束縛、把影子當作真實）、影子=物質世界的表象、鎖鏈=無知和慣性思維、掙脫鎖鏈的囚徒=哲學家（開始質疑和反思）、走出洞穴=哲學教育的過程、陽光=善之理型（一切真理和知識的最終源泉）、回到洞穴被嘲笑=哲學家向大眾傳播真理的困境（蘇格拉底之死的隱喻）\n• 柏拉圖的靈魂三分說（《理想國》第四卷）：理性（Logistikon，位於頭部——追求真理和智慧，對應統治者/哲學家國王階層）、激情（Thymoeides，位於胸部——追求榮譽和勇氣，對應衛士/軍人階層）、慾望（Epithymetikon，位於腹部——追求物質滿足和快樂，對應生產者/農工商階層）——正義的靈魂就是理性在激情的協助下統治慾望、三者各安其位\n• 柏拉圖的五種政體循環論（《理想國》第八至九卷）：貴族政體（Aristocracy——哲學家國王統治、理性的統治）→榮譽政體（Timocracy——軍人統治、追求榮譽）→寡頭政體（Oligarchy——富人統治、追求財富）→民主政體（Democracy——平民統治、追求自由、但過度自由導致混亂）→僭主政體（Tyranny——暴君統治、最壞的政體、以恐怖統治）"}]},{"id":"phil-modern","title":"近代哲學：理性主義與經驗主義之爭","content":"近代哲學（17–18世紀）的核心問題是認識論——人類知識的來源和限度是什麼？\n\n• 英國經驗主義的三位代表（洛克→柏克萊→休謨的發展）：1）洛克（1632–1704）——心靈是一張「白板」（Tabula Rasa），所有知識都來自經驗（感覺和反思），沒有先天的觀念；2）柏克萊（1685–1753）——從經驗主義出發得出了唯心主義結論：「存在即被感知」（Esse est percipi），物質實體不存在——所謂的「桌子」只是我們感知到的顏色、形狀、硬度的集合；3）休謨（1711–1776）——將經驗主義推向邏輯終點：因果關係只是我們觀察到的事件之間的「恆常聯結」（Constant Conjunction），我們永遠無法證明因果關係的必然性（明天太陽會升起嗎？我們只是基於過去的經驗有這個期待，但無法證明它必然會升起）——休謨的懷疑論「把康德從獨斷論的迷夢中喚醒」\n• 尼采（Friedrich Nietzsche，1844–1900）的核心思想：1）「上帝已死」——不是字面意義上的無神論宣告，而是對西方形而上學和基督教道德體系崩潰的診斷：當現代人不再真正相信上帝時，建立在上帝之上的道德體系（善惡的絕對標準）失去了根基；2）超人（Übermensch）——在傳統價值崩潰後，人必須自我超越、創造自己的價值體系，成為自己的立法者；3）權力意志（Will to Power）——所有生命體的根本驅力不是求生存（如達爾文所說）而是求權力——不斷擴張和超越自身；4）永恆輪迴（Eternal Recurrence）——如果一個惡魔告訴你，你的生命將完全一樣地無限重複，你是會詛咒還是會視為最偉大的肯定？——這是尼采對生命肯定的終極測試","subsections":[{"id":"phil-descartes","title":"笛卡兒與理性主義","content":"笛卡兒（René Descartes，1596–1650）被稱為「近代哲學之父」，原因是他在《第一哲學沉思集》（1641年）中進行了一個激進的思想實驗——普遍懷疑（Method of Doubt）：他設想有一個極其強大和狡猾的惡魔，可以使他對外部世界、自己的身體、甚至數學（2+3=5）都產生錯誤的信念。那麼還有什麼是確定的、不可懷疑的？在極端的懷疑中他發現：即使他在懷疑一切，「他在懷疑」這件事本身是無法被懷疑的。而懷疑是一種思維活動，因此「我思故我在」（Cogito, ergo sum / 法語 Je pense, donc je suis）成為了他哲學體系的不可動搖的基石。由此出發他推導出了上帝的存在和外部世界（包括他人心靈和物理物體）的真實性。但他同時建立了心物二元論——心靈（思維實體，Res Cogitans）和物質（廣延實體，Res Extensa）是兩種完全不同的實體，之間的互動（如意志如何使身體運動）成為了哲學上懸而未決的難題。斯賓諾莎（Baruch Spinoza，1632–1677）以幾何學的方式（定義、公理、命題、證明）撰寫了《倫理學》——從對實體（Substance）的定義出發，他嚴格推導出「神即自然」（Deus sive Natura）的一元論結論：只存在一個實體（上帝/自然），心靈和物質只是這唯一實體的兩種屬性（不是兩種不同的實體），萬事萬物（包括人類的思考和行動）都按照嚴格的因果必���性發生——因此自由意志只是一種幻覺。萊布尼茲（Gottfried Wilhelm Leibniz，1646–1716）以單子論（Monadology）聞名——宇宙由無限多個沒有窗戶的、不可分割精神實體「單子」（Monad）組成，每個單子都反映了整個宇宙。他著名的樂觀主義命題——「我們生活在所有可能世界中最好的一個」（被伏爾泰在小說《憨第德》（Candide）中狠狠地諷刺了一番（以里斯本大地震為背景）。\n\n• 笛卡兒《方法論》（1637年）的四條規則：1）只接受清晰明確地呈現給心靈、無可懷疑的東西為真；2）將每個難題分解為盡可能小的部分；3）從最簡單的對象開始逐步上升到更複雜的對象；4）進行全面的列舉和審查以確保無遺漏——這些規則奠定了現代科學方法論的基礎\n• 笛卡兒心物二元論（Mind-Body Dualism）的後續難題：如果心靈（思維實體、無廣延）和物質（廣延實體、無思維）是完全不同的實體，它們如何互動？——笛卡兒提出松果腺（Pineal Gland）是心靈和身體互動的場所（因為松果腺是大腦中唯一不對稱的結構），但這個解釋被普遍認為不成功——「心物互動問題」至今仍是心靈哲學的核心難題\n• 斯賓諾莎的《倫理學》結構：以幾何學方式撰寫——分為五部分（論神、論心靈的本性和起源、論情感的起源和本性、論人的奴役或情感的力量、論理智的力量或人的自由），從定義和公理出發嚴格推導出命題和證明——這種寫作方式本身就是一種哲學宣言：倫理學可以像幾何學一樣精確"},{"id":"phil-kant","title":"康德與德國觀念論","content":"康德（Immanuel Kant，1724–1804）堪稱近代哲學的分水嶺。他以「批判哲學」試圖調和理性主義和經驗主義的矛盾。他在《純粹理性批判》（1781年，被普遍認為是現代哲學最重要的一部著作——即使對於專業讀者來說，將其從頭讀到尾也是巨大的挑戰）中提出了著名的「哥白尼式革命」命題：我們的認知不是被動地反映外部世界的結構（如鏡子反射），而是人類心靈的先天認知結構（時間和空間是「感性直觀的純形式」、因果關係等十二
