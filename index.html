個範疇是「知性的純概念」）主動地組織和構造了我們感知的經驗世界。因此我們能夠認識的永遠只是現象（Phenomena——已被主觀認知結構組織過的經驗世界），而物自身（Noumena/Ding an sich——事物獨立於人類認知的真實存在）是永遠不可認識的。這是一個令人沮喪又令人釋然的結論：人類理性的能力有邊界——形而上學的論斷（如上帝存在與否、靈魂是否不滅、宇宙是否有開端）超出了人類認知能力，不可能獲得確定性的知識。在道德哲學領域康德提出了自律倫理學——道德法則的權威不是來自外部（如上帝或社會習俗），而是來自理性個體的自律（自我立法）。「定言命令」（Categorical Imperative）的第一表述：「只按照你同時可以意願讓這條準則成為普遍法則的準則去行動」——如果說謊總是錯的，那是因為如果你的行動準則「當符合我的利益時我可以說謊」變成普遍法則，那麼「說謊」這個概念本身就失去了意義（因為沒有人會相信謊言了）。第三表述：「要把人（包括你自己和他人）在任何時候同時當作目的，而不僅僅是手段」——這是對人的尊嚴的強烈肯定。黑格爾（G.W.F. Hegel，1770–1831）的辯證法（正題→反題→合題，合題成為新的正題，推動歷史不斷向前發展）影響了包括馬克思在內的整個後續哲學。他將整個歷史（包括藝術史、宗教史和哲學史）解釋為「絕對精神」逐步實現自我意識的宏大過程。他的《精神現象學》（1807年）的主奴辯證法（主人—奴隸關係的內在矛盾和最終的倒轉）對馬克思的階級分析、女性主義理論和後殖民理論都產生了深遠影響。\n\n• 康德《純粹理性批判》的核心問題：「先天綜合判斷如何可能？」——先天（a priori，獨立於經驗、具有普遍必然性）、綜合（predicate增加了subject中沒有包含的新信息）——數學（如7+5=12）和自然科學（如「一切變化都有原因」）都包含先天綜合判斷，但這類判斷如何可能？康德的答案是「哥白尼式革命」：不是我們的認知必須符合對象，而是對象必須符合我們的認知方式\n• 康德的十二範疇（Categories of Understanding）：量（統一性、多樣性、總體性）、質（實在性、否定性、限制性）、關係（實體與偶性、原因與結果、交互作用）、模態（可能性與不可能性、存在與非存在、必然性與偶然性）——這些是人類知性的先天概念框架，經驗世界必須通過這些範疇被組織和認知\n• 康德的道德哲學三條定言命令公式（Categorical Imperative）：1）普遍法則公式（Formula of Universal Law）——「只按照你同時可以意願讓這條準則成為普遍法則的準則去行動」；2）人性公式（Formula of Humanity）——「要把人（包括你自己和他人）在任何時候同時當作目的，而不僅僅是手段」；3）自律公式（Formula of Autonomy）——「每一個理性存在者的意志都是制定普遍法則的意志」\n• 黑格爾的辯證法（Dialectic）三階段：正題（Thesis——一個命題或歷史階段）→反題（Antithesis——對正題的否定或對立力量）→合題（Synthesis——對正反題的更高層次的統一和超越）——合題成為新的正題，推動歷史和思想不斷向前發展。黑格爾將整個歷史理解為「絕對精神」（Absolute Spirit）逐步實現自我意識的宏大過程——藝術（感性形式表達絕對精神）→宗教（表象形式表達絕對精神）→哲學（概念形式表達絕對精神，是最高的自我認識形式）"}]}]}]},{"id":"psychology","title":"心理學","category":"philosophy","description":"人類行為和心理過程的科學研究——從潛意識到認知神經科學","icon":"🧩","sections":[{"id":"psy-schools","title":"心理學主要流派","content":"心理學作為一門科學，自1879年馮特（Wilhelm Wundt）在德國萊比錫大學建立了世界上第一個心理學實驗室（將心理學從哲學中分離出來成為獨立的實驗科學）以來，形成了多個重要的理論流派。\n\n• 心理學的主要研究方法和各自的局限：1）實驗法（在控制條件下操縱變量——因果推斷最強但可能缺乏生態效度——實驗室環境與真實生活有差距）；2）相關法（測量兩個或多個變量之間的關係——可以研究無法操縱的變量（如性別、性格）但不能確定因果關係）；3）個案研究（對單一個體或小群體進行深入分析——提供豐富的細節但難以推廣到一般人群）；4）問卷調查（大規模收集數據——快速且成本低但依賴於自我報告的誠實性和準確性）；5）自然觀察（在自然環境中觀察行為——生態效度高但無法控制變量和推斷因果）","subsections":[{"id":"psy-freud","title":"精神分析學派","content":"佛洛伊德（Sigmund Freud，1856–1939）是心理學史上最具爭議性也最具影響力的人物之一。他的核心貢獻是發現（或創造）了「潛意識」（Unconscious）這一概念——人的行為並不是由理性意識完全控制的，潛意識中壓抑的慾望、衝突和童年創傷在很大程度上（甚至根本性地）決定了人的思想、情感和行為。佛洛伊德將人格結構分為三個層次：本我（Id）——本能驅力的儲存庫，遵循「快樂原則」（Pleasure Principle），追求即時的滿足（如嬰兒的無節制需求）；自我（Ego）——人格的執行者，遵循「現實原則」（Reality Principle），在本我的衝動和外部世界的限制之間尋求妥協；超我（Superego）——內化了的父母和社會的道德規範和理想標準（良心和理想自我），以罪惡感和羞恥感來約束行為。精神分析的核心治療技術包括：自由聯想（Free Association，患者躺在沙發上說出腦海中浮現的任何想法，不加審查和編輯——這是通往潛意識的「皇家大道」）、夢的解析（Dream Interpretation，《夢的解析》，1899/1900年——佛洛伊德認為夢是潛意識願望的偽裝滿足，「夢是通往潛意識的皇家大道」）。佛洛伊德的許多具體理論（如俄狄浦斯情結——男孩對母親的性慾和對父親的嫉妒和恐懼、陰莖羨慕——女孩因沒有陰莖而產生的自卑感等）今天已不被主流心理學所接受（被批評為缺乏科學證據、過度泛化和性別主義），但他關於潛意識心理過程、童年經驗對成年人格的深遠影響、以及談話治療（Talking Cure，簡單的傾訴可以緩解心理痛苦）等開創性洞見至今仍在影響著心理學和精神醫學。\n\n• 佛洛伊德的心理性發展五階段：1）口腔期（0–1歲——快感來自口腔活動，固著可能導致成年後的吸煙、暴飲暴食或過度依賴）；2）肛門期（1–3歲——快感來自排便和控制，固著可能導致強迫性整潔或雜亂無序）；3）性器期（3–6歲——俄狄浦斯情結/厄勒克特拉情結，對異性父母產生依戀和對同性父母的競爭感）；4）潛伏期（6歲–青春期——性衝動被壓抑，注意力轉向學習和同伴關係）；5）生殖期（青春期以後——成熟的性慾和親密關係的建立）\n• 佛洛伊德的防衛機制（Defense Mechanisms）：壓抑（Repression——將無法接受的慾望和記憶驅逐到潛意識中）、否認（Denial——拒絕承認現實中令人痛苦的事實）、投射（Projection——將自己不願承認的感受歸因於他人）、轉移（Displacement——將情感從危險的對象轉移到安全的對象）、合理化（Rationalization——為不可接受的行為找到「合理」的解釋）、反向形成（Reaction Formation——以相反的行為來對抗潛意識慾望）、昇華（Sublimation——將原始的性慾和攻擊衝動轉化為社會接受的創造性活動——佛洛伊德認為這是文明成就的心理基礎）\n• 佛洛伊德的後繼者與分裂：榮格（Carl Jung——提出集體潛意識和原型理論，與佛洛伊德決裂於1913年）、阿德勒（Alfred Adler——提出個體心理學和「自卑與超越」，1911年離開佛洛伊德陣營）、安娜·佛洛伊德（Anna Freud——佛洛伊德的女兒，專注於兒童精神分析和自我防衛機制的研究）"},{"id":"psy-behaviorism","title":"行為主義與認知革命","content":"行為主義（1910s–1950s）是對精神分析主觀方法論的反叛——華生（John B. Watson，1878–1958）斷言心理學應該只研究可觀察和可測量的行為，而將一切關於「意識」、「心靈」和「潛意識」的主觀內省排除在科學心理學之外。他1913年的「行為主義宣言」（《行為主義者眼中的心理學》）徹底改變了美國心理學的方向。史金納（B.F. Skinner，1904–1990）通過對鴿子和老鼠的系統實驗提出了「操作性條件作用」（Operant Conditioning）理論——行為由其結果（後果）來塑造和維持：正強化（獎勵增加行為頻率，如老鼠按下槓桿後獲得食物）、負強化（移除厭惡刺激增加行為頻率，如老鼠按下槓桿後電擊停止）、正懲罰（施加厭惡刺激減少行為頻率，如不良行為後受到訓斥）和負懲罰（移除愉快刺激減少行為頻率，如超速後被吊銷駕照）。然而1950年代末的「認知革命」揭示了行為主義的局限——人類並非只是被動地對刺激做出反應的有機體，而是擁有複雜的內在心理表徵和信息處理能力的認知主體。喬姆斯基（Noam Chomsky，1928–）對史金納《言語行為》（1957年）的毀滅性批評（1959年評論）是認知革命的里程碑之一——他論證了兒童的語言習得不能僅以行為主義的刺激—反應聯結來解釋（兒童能創造性地產出他們從未聽過的新句子，這表明他們掌握了語言的內在語法規則而不僅僅是模仿）。現代認知心理學將人腦視為複雜的信息處理系統，研究注意、知覺、記憶（感覺記憶→短期/工作記憶→長期記憶的三階段模型）、語言和決策等心理過程，並與神經科學、人工智慧和語言學等領域深度融合。\n\n• 經典條件作用（巴夫洛夫）vs 操作性條件作用（史金納）的核心差異：經典條件作用——有機體被動地學會兩個刺激之間的關聯（鈴聲→食物→唾液分泌）；操作性條件作用——有機體主動操作環境，行為由其後果來塑造和維持（老鼠按下槓桿→獲得食物→按槓桿行為增加）\n• 史金納的強化程序（Schedules of Reinforcement）：連續強化（每次行為都獲得強化——學習最快但也最快消退）、固定比率（每N次行為後強化一次——高反應率）、可變比率（平均每N次強化一次——最難消退，賭博上癮的原理）、固定時距（每過T時間強化一次——反應率在強化臨近時上升）、可變時距（平均每T時間強化一次——穩定但中等反應率）\n• 班杜拉（Albert Bandura）的社會學習理論——波波玩偶實驗（1961年）：兒童觀看成人對充氣玩偶（Bobo Doll）進行攻擊（踢、打、用錘子敲）→當兒童被放到同一個房間時，他們模仿了觀察到的攻擊行為——證明了學習可以通過觀察而非直接強化來發生（觀察學習/建模）\n• 認知行為治療（CBT）的核心原則：心理困擾不是由事件本身引起，而是由對事件的解釋和信念引起（認知模型）——通過識別和挑戰不合理的自動思維（如「我必須完美無缺」、「如果被拒絕就太可怕了」）來改變情緒和行為"}]}]},{"id":"politics","title":"政治學","category":"philosophy","description":"政治體制、意識形態與國際關係的核心理論","icon":"🏛️","sections":[{"id":"pol-ideologies","title":"主要政治意識形態","content":"政治意識形態是關於人類社會應當如何組織的系統化信念體系。它們不僅是關於事實的描述，更是關於價值的規範性主張。\n\n• 政治意識形態的光譜（從左到右的簡化模型）：極左（共產主義——生產資料公有制、消滅階級和國家）→左翼（社會民主主義——資本主義+強大的福利國家和工會、高稅收高福利）→中間（自由主義——市場經濟+適度的社會安全網、個人自由和社會正義的平衡）→右翼（保守主義——自由市場、低稅收、傳統價值和社會秩序）→極右（法西斯主義——極端民族主義、獨裁統治、壓制反對派）\n• 20世紀三大政治意識形態的興衰：1）自由主義——二戰後成為西方民主國家的主流，經歷了凱恩斯主義（大政府干預經濟）→新自由主義（柴契爾和雷根的小政府和自由市場改革，1980s）→第三條路（布萊爾和克林頓的市場+社會正義折衷，1990s）的演變；2）共產主義——1917年俄國革命→1949年中國革命→1950–60年代全球影響力高峰→1989–1991年東歐劇變和蘇聯解體→中國改革開放後走向社會主義市場經濟；3）法西斯主義——1922年墨索里尼在義大利掌權→1933年希特勒在德國掌權→1945年二戰結束後作為主流意識形態消亡，但其思想殘餘（極端民族主義、強人政治）在21世紀有所復甦","subsections":[{"id":"pol-democracy","title":"民主理論","content":"現代民主制度並非單一模式。直接民主（公民對每一項法律和政策進行直接投票）在古代雅典曾短暫實行（伯里克利時代，前461–前429），但僅適用於小規模的城邦——雅典的公民大會理論上可以由約3萬名成年男性公民參加，實際出席者約為6000人。現代國家（數百萬至十幾億人口）無法實行直接民主，因而普遍採用代議民主——公民定期選舉代表來制定法律和管理國家。多數決民主（Majoritarian Democracy）的經典代表是英國的「西敏制」（Westminster System）——選舉採用單一選區相對多數制（First-Past-the-Post），獲勝政黨通常能獲得議會多數席位並單獨組成政府，決策效率高但少數人的意見容易被忽視。共識民主（Consensus Democracy）則通過比例代表制（Proportional Representation）和權力分享機制（如聯合政府）來確保各群體（即使是少數）的意見都得到代表——瑞士、比利時和荷蘭是典型例子，但這類體制可能導致決策低效和政府不穩定（如義大利二戰後平均每屆政府壽命僅約一年）。熊彼得（Joseph Schumpeter，1883–1950）在其經典著作《資本主義、社會主義與民主》（1942年）中提出了一個影響深遠的對民主的「極簡定義」——民主不是人民統治（因為「人民」不是一個單一的行為主體），而是一種制度安排，在這種制度中，個人通過競爭性的選舉獲得做出政治決策的權力。這一「精英競爭」民主理論深刻地影響了戰後政治學對民主的理解。達爾（Robert Dahl，1915–2014）提出了民主的八項制度保障（或「多頭政體」Polyarchy的標準）：選舉產生的官員、自由公平的選舉、普選權、競選公職的權利、言論自由、獲取多元信息的自由、結社自由和包容性的公民身分。\n\n• 民主的不同理論模型：1）多數決民主（Majoritarian）——英國西敏制為代表，單一選區相對多數制（FPTP）→兩黨制→一黨單獨組閣→決策高效但少數群體容易被忽略；2）共識民主（Consensus）——瑞士、比利時為代表，比例代表制（PR）→多黨制→聯合政府→權力分享和協商→更能代表多元利益但決策較慢；3）審議民主（Deliberative）——強調公民在決策前進行充分的公共討論和理性辯論（哈貝馬斯Jürgen Habermas的公共領域理論），而非僅僅投票\n• 達爾（Robert Dahl）的多頭政體（Polyarchy）七項制度保障：1）選舉產生的官員、2）自由和公平的選舉、3）包容性的普選權、4）競選公職的權利、5）言論自由、6）獲取多元信息（Alternative Information）的自由、7）結社（Association）自由——達爾認為沒有國家完全實現了這些理想，現實中的民主國家都是「多頭政體」而非完全民主\n• 民主的歷史演變：古希臘雅典直接民主（僅成年男性公民約3–6萬人可參與，奴隸、婦女和外邦人排除在外）→18世紀自由民主（代議制+保護個人權利）→19–20世紀普選權的逐步擴展（英國1832→1867→1884→1918（30歲以上女性）→1928（21歲以上男女平等普選），美國1870（種族）→1920（性別）→1965（投票權法案真正保障非裔投票權））→20世紀後半葉第三波民主化（南歐→拉丁美洲→東亞→東歐）"}]}]},{"id":"religion","title":"宗教","category":"philosophy","description":"世界主要宗教的教義、歷史、經典與文化影響","icon":"🕊️","sections":[{"id":"rel-world","title":"世界主要宗教","content":"宗教是人類文化最深層的根基之一。儘管現代化和世俗化的浪潮席捲全球，仍有約84%的世界人口認同於某一宗教。\n\n• 世界主要宗教的信徒人數（2023年估算）：1）基督教——約24億（31%），包括天主教（約13.6億）、新教（約9億）、東正教（約2.6億）；2）伊斯蘭教——約19億（25%），包括遜尼派（約85–90%）和什葉派（約10–15%）；3）無宗教/世俗/不可知論/無神論——約11–12億（16%）；4）印度教——約12億（15%）；5）佛教——約5.2億（7%）；6）民間宗教（包括中國民間宗教、非洲傳統宗教等）——約4.3億（6%）；7）其他（猶太教約1500萬、錫克教約3000萬、耆那教約600萬、巴哈伊教約800萬等）\n• 宗教社會學的世俗化命題和批評：世俗化命題（馬克斯·韋伯、彼得·伯格1960年代）——現代化（科學、理性化、多元化）必然導致宗教在社會和個人層面的衰退。但1990年代後彼得·伯格本人推翻了這個命題——他發現現代化並沒有導致宗教的全面衰退（美國的高度現代化和高度宗教性並存、伊斯蘭世界的宗教復興、全球範圍內五旬節派和福音派的爆炸性增長），而是導致了多元化和宗教形式的轉變而非消亡","subsections":[{"id":"rel-christianity","title":"基督教","content":"基督教是世界上信徒最多的宗教（約24億，約佔全球人口的31%）。基督教信仰的核心宣告是：拿撒勒人耶穌是上帝之子（Christ/Messiah——彌賽亞，受膏者/救世主），他的受難、死亡和復活為人類帶來了罪惡的赦免和永生的可能。聖經是基督教最重要的經典，分為舊約（與猶太教的希伯來聖經基本對應，記錄了創世、以色列民族的歷史、律法和先知書）和新約（記錄了耶穌的生平（馬太、馬可、路加、約翰四福音書）、使徒行傳（早期基督教會的發展）、書信（保羅和其他使徒寫給各地教會的信件）和啟示錄（關於末世的預言（啟示文學）），共27卷）。三位一體論（Trinity——聖父、聖子、聖靈三個位格同等同尊、同為永恆、同為上帝）是基督教神學的核心也是最難以用理性理解（甚至被認為是「奧秘」Mystery）的教義之一。基督教內部在1054年發生了東西教會大分裂——以羅馬為中心的天主教會（西方）和以君士坦丁堡為中心的東正教會（東方）正式決裂，分歧點包括：教宗的至高權威（西方堅持，東方否認）、聖靈的來源（Filioque——「和子」爭議，西方在尼西亞信經中加入了聖靈「從父和子」發出，東方僅接受「從父」發出）、在聖餐中使用無酵餅還是有酵餅等禮儀問題。16世紀馬丁·路德（Martin Luther，1483–1546）發起了宗教改革——1517年10月31日他將《九十五條論綱》釘在維滕貝格城堡教堂的大門上（學術辯論的傳統做法），抗議羅馬天主教會兜售「贖罪券」（Indulgences——以金錢換取靈魂在煉獄中懲罰的減免）的行為。宗教改革的核心原則包括「唯獨聖經」（Sola Scriptura——聖經而非教會傳統是信仰的最高權威）、「唯獨信心」（Sola Fide——人是因信稱義而非靠善功得救）和「信徒皆祭司」（Priesthood of All Believers——所有信徒都可以直接親近上帝，不需要通過神職人員的中介）。\n\n• 聖經的成書過程：舊約——希伯來聖經（Tanakh）約在前12–前2世紀陸續寫成，分為律法書（Torah——摩西五經）、先知書（Nevi\\'im——前先知書和後先知書）和聖卷（Ketuvim——詩篇、箴言、約伯記等）；新約——公元1世紀下半葉陸續寫成，最早的文獻可能是保羅的《帖撒羅尼迦前書》（約50–51年），最晚的可能是《彼得後書》（約120–130年）\n• 基督教的主要節期：將臨期（Advent——聖誕節前四個星期，預備迎接耶穌降生）→聖誕節（12月25日——耶穌降生）→顯現期（Epiphany——耶穌向外邦人顯現）→大齋期（Lent——復活節前40天，紀念耶穌在曠野禁食40天，信徒以齋戒和悔改預備心靈）→聖週（Holy Week——棕枝主日→設立聖餐日→受難日→復活節）→復活節（Easter——每年春分月圓後第一個星期日，紀念耶穌復活）→五旬節（Pentecost——復活節後第50天，紀念聖靈降臨和教會誕生）\n• 宗教改革的主要人物和分支：馬丁·路德（路德宗/信義宗——德國和北歐為主）、約翰·加爾文（改革宗/長老宗——瑞士、荷蘭、蘇格蘭為主，預定論為其核心教義）、烏利希·慈運理（瑞士蘇黎世改革——與路德在聖餐問題上分裂）、英國國教會（亨利八世因離婚問題與羅馬教廷決裂——教義上介於天主教和新教之間）"},{"id":"rel-islam","title":"伊斯蘭教","content":"伊斯蘭教是世界第二大宗教（約19億穆斯林）。「伊斯蘭」（Islam）一詞意為「順從」（順從真主的意志），穆斯林（Muslim）即「順從者」。穆斯林信仰唯一的真主（Allah——阿拉伯語中的「神/上帝」，與基督教和猶太教崇拜的是同一位獨一神）和先知穆罕默德（Muhammad，570–632）為「封印先知」（最後的先知，真主通過他完成了對人類的完整啟示）。古蘭經（Qur'an/Quran——意為「誦讀」）是伊斯蘭教最神聖的經典，據信是真主通過天使吉卜利勒（加百利）在約23年期間逐節向穆罕默德啟示的阿拉伯語經文。古蘭經共114章（蘇拉 Surah）、約6236節（阿亞 Ayah），按照長度遞減（而非時間順序）排列。伊斯蘭教的核心信仰和實踐被概括為「六信條」（Iman）和「五功」（Pillars of Islam）。六信條：信真主（Tawhid——認主獨一，這是伊斯蘭最核心的教義：除真主外別無神明）、信天使（包括吉卜利勒、米卡伊勒、伊斯拉菲勒等）、信經典（包括古蘭經以及之前降示的討拉特（摩西五經）、宰卜爾（大衛詩篇）和引支勒（福音書），但穆斯林認為這些經典後來被人類篡改，只有古蘭經保持了真主啟示的原貌）、信使者（從阿丹（亞當）、努哈（諾亞）、易卜拉欣（亞伯拉罕）、穆薩（摩西）、達伍德（大衛）、爾撒（耶穌）到穆罕默德——共25位先知在古蘭經中被提名）、信末日（復活日/審判日——所有亡者將復活接受真主的審判，善者入天園，惡者入火獄）、信前定（Qadr——真主預先規定了萬事萬物的命運，但人類仍然有自由意志並要為自己的選擇負責（這是伊斯蘭神學中的一個核心張力））。五功：念（Shahada——作證言：「我作證除真主外別無神明，穆罕默德是真主的使者」——這是成為穆斯林的基本門檻，一個人在兩個成年穆斯林見證下以真誠的信念用阿拉伯語誦讀此言即成為穆斯林）、禮（Salat——每日五次的固定禮拜：晨禮（Fajr，黎明前）、晌禮（Dhuhr，正午後）、晡禮（Asr，下午）、昏禮（Maghrib，日落後）、宵禮（Isha，夜晚），禮拜時必須朝向麥加的克爾白（天房Kaaba）方向——全世界所有穆斯林在禮拜時形成了圍繞麥加天房的同心圓陣列）、齋（Sawm——伊斯蘭曆第九月（萊麥丹月/齋月Ramadan，因伊斯蘭曆是純陰曆（每年約354天），齋月在公曆中每年提前約10–11天，因此每約33年就會循環到公曆中所有季節）期間從日出到日落禁止飲食、飲水、吸煙和性行為，但病人、旅行者、孕婦、哺乳期婦女和經期女性可以暫緩，日後補齋或繳納罰贖）、課（Zakat——天課，每個擁有超過一定最低標準（Nisab）財富的穆斯林每年必須將其財富的2.5%捐獻給貧困者等八類指定人群——這不是「慈善」而是宗教義務，是伊斯蘭經濟體系中的財富再分配機制）、朝（Hajj——朝覲，每個有經濟和身體能力的穆斯林一生中至少應去麥加朝覲一次，時間在伊斯蘭曆十二月（Dhul-Hijjah）的特定日期）。朝覲期間約200–300萬來自世界各地的穆斯林不分膚色、國籍和社會地位，全部穿著兩片簡單的白色布料（男性——Ihram朝覲受戒服），集體繞行克爾白天房七圈，在薩法和麥爾瓦兩山之間奔走七次（紀念易卜拉欣的妻子哈哲爾為兒子伊斯瑪儀尋找水源的故事），在阿拉法特平原站立祈禱（這是朝覲最重要的儀式——「朝覲就是阿拉法特」），這一刻全球的穆斯林（約19億人）在精神和心靈上最緊密地團結在一起。\n\n• 古蘭經的編纂過程：穆罕默德在世時經文由門徒口頭背誦和記錄在椰棗葉、石片、獸皮等材料上→第一任哈里發艾布·伯克爾（632–634在位）下令收集所有分散的記錄並彙編成冊→第三任哈里發奧斯曼（644–656在位）因發現各地穆斯林誦讀方式出現分歧，下令製作標準版本（「奧斯曼定本」）並將其他版本全部銷毀——至今全球所有古蘭經文本都是奧斯曼定本的複製\n• 伊斯蘭教法（Sharia）的四大法源（遜尼派）：1）古蘭經（Quran——真主的話語，最高權威）；2）聖訓（Sunnah/Hadith——先知的言行記錄，解釋和補充古蘭經）；3）公議（Ijma——伊斯蘭學者在某一問題上達成的一致意見）；4）類比（Qiyas——將古蘭經和聖訓中的規則通過類比推理應用於新情況）\n• 遜尼派和什葉派的分裂起源：632年穆罕默德去世後，關於繼承人（哈里發Khalifa）的爭議——遜尼派（約85–90%穆斯林）認為哈里發應由穆斯林社群選舉產生（接受艾布·伯克爾為第一任正統哈里發）；什葉派（約10–15%）認為領袖應由先知的家族血緣繼承——阿里（穆罕默德的堂弟和女婿）才是合法的繼承人（伊瑪目Imam），前三任哈里發是篡位者。680年卡爾巴拉戰役中阿里的兒子侯賽因被伍麥亞王朝軍隊殺害——這是什葉派最核心的創傷記憶和殉道敘事（阿舒拉節Ashura即紀念侯賽因的殉難）"}]}]}]},{"id":"science","title":"科學","icon":"🔬","color":"#5B21B6","description":"自然科學與形式科學七大領域——從量子世界��浩瀚星空的系統性知識","topics":[{"id":"biology","title":"生物學","category":"science","description":"生命科學——從分子機制到生態系統，理解生命現象的完整體系","icon":"🧬","sections":[{"id":"b1","title":"細胞：生命的基本單位","content":"細胞學說是生物學基石（1839年施萊登和施旺）：所有生物由細胞構成，細胞是生命最基本的結構與功能單位，所有細胞來自先前存在的細胞。真核細胞擁有膜包圍的細胞核和複雜內膜系統——細胞核儲存DNA，粒線體通過有氧呼吸產生ATP（約15億年前由被吞噬的需氧細菌演化而來，內共生理論），內質網和高基氏體負責蛋白質合成與運輸，溶酶體消化廢物，葉綠體（植物特有）進行光合作用。\n\n• 細胞膜結構——流體鑲嵌模型（Fluid Mosaic Model，Singer和Nicolson 1972年）：磷脂雙層形成膜的基礎框架（親水性頭部朝外、疏水性尾部朝內），蛋白質分子鑲嵌其中（跨膜蛋白穿越整個膜、外周蛋白附著在膜表面），膽固醇分子散佈在磷脂之間（調節膜的流動性——低溫時防止磷脂過於緊密排列、高溫時限制磷脂的過度運動）。膜是「流體」——磷脂和蛋白質可以在二維平面上自由移動（證實於1970年人鼠細胞融合實驗）\n• 有絲分裂（Mitosis）的四個階段：1）前期（Prophase——染色質濃縮為可見的染色體（每條由兩條姊妹染色單體Sister Chromatids組成，在著絲粒處連接）、核仁消失、紡錘體開始形成）；2）中期（Metaphase——染色體排列在細胞赤道板上、紡錘絲連接到每條染色體的著絲粒）；3）後期（Anaphase——姊妹染色單體分離、被紡錘絲拉向細胞的兩極）；4）末期（Telophase——核膜重新形成包圍兩組染色體、染色體解螺旋變回染色質）→胞質分裂（Cytokinesis——動物細胞形成分裂溝、植物細胞形成細胞板）","subs":[{"id":"b1a","title":"DNA雙螺旋與中心法則","content":"1953年華生和克里克提出DNA雙螺旋模型——兩條反向平行的多核苷酸鏈通過互補鹼基配對（A=T、G≡C）纏繞。中心法則（克里克1958年）：DNA→RNA（轉錄）→蛋白質（轉譯），信息不從蛋白質逆流。人類基因組包含約30億鹼基對，編碼約2萬個基因。CRISPR-Cas9基因編輯（2020年諾貝爾化學獎）將細菌免疫系統改造為精確編輯工具——在遺傳病治療和農業改良中潛力巨大，同時引發深刻倫理爭議（2018年賀建奎基因編輯嬰兒事件震驚全球科學界）。\n\n• DNA複製的酶系統：1）解旋酶（Helicase——解開雙螺旋，形成複製叉）→2）單鏈結合蛋白（SSB——穩定分開的單鏈，防止重新配對）→3）引子酶（Primase——合成RNA引子為DNA聚合酶提供起始點）→4）DNA聚合酶III（沿5\\'→3\\'方向合成新鏈——前導鏈連續合成、滯後鏈以岡崎片段方式不連續合成）→5）DNA聚合酶I（切除RNA引子並填補DNA）→6）DNA連接酶（Ligase——連接岡崎片段）\n• CRISPR-Cas9的三步驟機制：1）獲取（Adaptation——將入侵病毒的DNA片段整合到CRISPR陣列中作為「記憶」）→2）表達（Expression——CRISPR陣列被轉錄為嚮導RNA（gRNA））→3）干擾（Interference——Cas9蛋白在gRNA引導下精確識別和切割目標DNA的特定序列（PAM序列NGG為識別標誌），造成雙鏈斷裂→細胞的DNA修復機制（非同源末端連接NHEJ或同源重組HDR）被激活→在修復過程中引入所需的基因突變或插入新基因\n• 表觀遺傳學（Epigenetics）的三種主要機制：1）DNA甲基化（DNA Methylation——在胞嘧啶的5號碳上添加甲基，通常發生在CpG二核苷酸上，抑制基因轉錄）；2）組蛋白修飾（Histone Modification——組蛋白尾部可以被乙酰化、甲基化、磷酸化等化學修飾，改變染色質的鬆緊狀態→影響基因的可轉錄性）；3）非編碼RNA（如microRNA和lncRNA——通過與mRNA互補配對來降解目標mRNA或抑制其轉譯）"}]},{"id":"b2","title":"演化生物學","content":"達爾文《物種起源》（1859年）：個體間存在可遺傳變異→過度繁殖→資源有限→生存競爭→擁有有利特徵者更易存活繁殖（自然選擇）。加拉巴哥群島達爾文雀的不同喙形是最著名例證。現代演化綜合理論將達爾文學說與孟德爾遺傳學結合——突變提供原材料、自然選擇決定方向、遺傳漂變在小型種群中顯著。木村資生中性理論（1968年）論證分子層面大多數變異是選擇中性。古爾德間斷平衡理論（1972年）認為演化並非始終均勻——物種長期穩定後快速變化。\n\n• 達爾文自然選擇的四個前提和一個推論：前提1——個體間存在可遺傳的變異（同一物種的不同個體有差異且這些差異可以遺傳）；前提2——生物具有過度繁殖的傾向（所有物種都有產生比環境能支持的更多後代的潛力）；前提3——資源是有限的（食物、空間、配偶等資源無法滿足所有個體的需求）；前提4——存在生存競爭（因資源有限和過度繁殖導致個體間必須競爭資源）→推論：自然選擇——擁有有利變異的個體更可能生存和繁殖→有利變異在種群中積累→物種逐漸改變（演化）\n• 演化的證據來源：1）化石記錄（過渡型化石如始祖鳥——恐龍和鳥類之間的過渡、提塔利克魚——魚類和兩棲類之間的過渡）；2）比較解剖學（同源結構——不同物種具有相同胚胎起源的結構，如哺乳動物的前肢（人的手臂、鯨的鰭狀肢、蝙蝠的翅膀、馬的前腿）骨骼結構相同但功能不同）；3）分子生物學（所有生物使用相同的遺傳密碼（DNA→RNA→蛋白質），支持共同祖先假說）；4）生物地理學（島嶼物種的獨特演化，如加拉巴哥群島的達爾文雀——14種雀鳥源自一個共同祖先，因適應不同島嶼的食物來源（種子、昆蟲、仙人掌花）而演化出不同的喙形）\n• 演化生物學的現代爭論：自然選擇的層次是什麼？（基因→個體→群體？——道金斯《自私的基因》（1976年）認為基因是選擇的基本單位；古爾德和埃爾德里奇提出間斷平衡論——演化不是達爾文設想的漸進式勻速變化，而是長期穩定（Stasis）被短暫的快速變化（Punctuation）打斷）"},{"id":"b3","title":"生態學","content":"生態學研究生物與環境的相互關係。能量沿食物鏈單向流動（每營養級約10%傳遞效率），物質則循環利用。關鍵概念：生態位（物種在生態系統中的功能角色）、承載力（環境能持續支撐的最大種群）、生物多樣性（基因/物種/生態系統三層次）。當前人類活動導致的滅絕速率是自然背景的100–1000倍——地球可能正在經歷第六次大滅絕（上一次是6600萬年前白堊紀末恐龍滅絕）。\n\n• 生態系統的能量流動規律：太陽能→生產者（植物和藻類通過光合作用固定約1%的太陽能）→初級消費者（草食動物，約10%的能量傳遞效率——其餘90%以熱能和代謝廢物的形式損失）→次級消費者（肉食動物）→頂級消費者——這解釋了為什麼食物鏈通常不超過4–5個營養級（頂級的能量不足以支撐更高層級）\n• 物質循環的四大循環：1）碳循環——大氣CO₂→光合作用固定為有機碳→呼吸作用和分解作用釋放回大氣→化石燃料燃燒人為加速碳釋放；2）氮循環——大氣N₂→固氮作用（固氮細菌和閃電）→氨→硝化作用→硝酸鹽→植物吸收→動物食用→分解→脫氮作用返回大氣；3）磷循環——岩石風化釋放磷酸鹽→植物吸收→動物食用→排泄物和屍體分解→沉積為岩石（與碳氮循環不同，磷沒有大氣儲存庫）；4）水循環——海洋蒸發→大氣水蒸氣→降水→地表徑流和地下滲透→匯入海洋\n• 生物多樣性的價值分類：1）直接使用價值（食物、藥物——約25%的西藥來自植物、木材、纖維）；2）間接使用價值（生態系統服務——授粉（全球糧食產量的約35%依賴動物授粉）、水淨化、氣候調節、土壤形成）；3）存在價值（人類願意為保護物種而支付的金額——即使自己永遠不會看到它們）；4）選擇價值（保留未來可能發現的用途——如未來可能從某植物中提取出抗癌藥物）"}]},{"id":"physics","title":"物理學","category":"science","description":"從亞原子粒子到可觀測宇宙——探索物質、能量、空間與時間的基本規律","icon":"⚛️","sections":[{"id":"p1","title":"經典物理學：牛頓力學體系","content":"牛頓1687年《自然哲學的數學原理》以三大運動定律和萬有引力定律（F=Gm₁m₂/r²）用同一組方程解釋從落體到行星軌道的所有運動。海王星的發現（1846年勒維耶和亞當斯僅通過天王星軌道擾動計算出未知行星位置，柏林天文台當晚即找到）是牛頓力學最輝煌的勝利。\n\n• 牛頓三大運動定律的現代表述：第一定律（慣性定律）——在沒有外力作用（或合力為零）的情況下，物體保持靜止或勻速直線運動狀態。第二定律（加速度定律）——物體的加速度與所受合力成正比、與質量成反比：F = ma（更嚴格的表述：F = dp/dt，力等於動量的時間變化率——這包含了質量可變的情況如火箭）。第三定律（作用與反作用定律）——對於每一個作用力，都存在一個大小相等、方向相反的反作用力，作用力和反作用力作用在不同物體上\n• 波粒二象性（Wave-Particle Duality）的歷史：1670年代牛頓提出光的微粒說→1801年楊氏雙縫實驗證明光的波動性→1905年愛因斯坦以光子（光量子）解釋光電效應（E = hν）→1924年德布羅意提出物質波假說（λ = h/p，所有物質都具有波動性）→1927年戴維森-革末實驗和湯姆森實驗分別獨立證明了電子的波動性（電子衍射）——波粒二象性是量子力學最基本的特徵","subs":[{"id":"p1a","title":"熱力學四大定律","content":"第零定律確立溫度測量基礎。第一定律（ΔU=Q-W）：能量守恆——宣告第一類永動機不可能。第二定律（孤立系統熵永不減少ΔS≥0）：定義了時間的箭頭，揭示宏觀過程不可逆性。熵在統計力學中被理解為系統微觀狀態數的度量（S=k ln W，波茲曼熵公式）。第三定律：溫度趨近0K時完美晶體熵趨近零——永遠無法通過有限步驟達到絕對零度。\n\n• 熱力學第二定律的微觀解釋（統計力學）：熵（S）是系統微觀狀態數（Ω）的度量——S = k ln Ω（波茲曼熵公式）——孤立系統自發演化到微觀狀態數最大的宏觀狀態（即最混亂的狀態），因為該狀態出現的概率壓倒性地高。這解釋了為什麼氣體會從高壓區擴散到低壓區（均勻分佈對應的微觀狀態數遠大於集中分佈）、為什麼熱從高溫物體流向低溫物體（均勻溫度對應的微觀狀態數更大）\n• 麥克斯韋妖（Maxwell\\'s Demon）——挑戰熱力學第二定律的思想實驗：1871年麥克斯韋設想一個微觀的「妖」守在兩個氣室之間的門邊，只允許快速分子通過、阻擋慢速分子→氣室一側變熱、另一側變冷→熵減少→違反第二定律。解決方案（蘭道爾1961年）：妖必須記錄和刪除分子速度的信息，而刪除信息（不可逆的邏輯操作）必須消耗能量並增加環境的熵→第二定律得到維護——這揭示了信息和熱力學之間的深層聯繫\n• 相變與臨界現象：物質在特定溫度和壓力下從一種相轉變為另一種相——一級相變（First-order——伴隨潛熱和不連續的密度變化，如冰融化成水、水沸騰為蒸汽）vs 連續相變（Continuous/Critical——在臨界點附近無潛熱、物理量以冪律形式發散，如鐵磁體在居里溫度以上失去磁性）。臨界點附近的「臨界乳光」現象（Critical Opalescence——因密度漲落的尺度達到光的波長級別而使透明流體呈現乳白色）是相變物理的經典現象"}]},{"id":"p2","title":"相對論","content":"狹義相對論（1905年）：光速對所有慣性觀察者為常數→時間膨脹（運動時鐘變慢，μ子穿越大氣層壽命延長是最直接證據）、長度收縮、質能等價E=mc²。廣義相對論（1915年）核心革命：引力是時空彎曲的表現——物質告訴時空如何彎曲，彎曲的時空告訴物質如何運動。驗證：水星近日點進動（每百年43角秒異常進動精確解釋）、1919年愛丁頓日全食觀測星光彎曲、2015年LIGO首次探測重力波（2017年諾獎）、2019年EHT發布首張黑洞照片（M87中心65億倍太陽質量）。\n\n• 狹義相對論的兩個基本假設：1）物理定律在所有慣性參考系中具有相同形式（相對性原理——伽利略相對性原理的推廣）；2）真空中的光速（c ≈ 299,792,458 m/s）對所有慣性觀察者都是相同的常數，與光源和觀察者的相對運動無關（光速不變原理）\n• 廣義相對論的三個經典驗證：1）水星近日點進動——每百年約5600角秒的總進動中，牛頓力學只能解釋約5557角秒，剩餘約43角秒的異常進動被廣義相對論精確解釋；2）星光彎曲——1919年愛丁頓在日全食時觀測到星光經過太陽邊緣時彎曲約1.75角秒（牛頓引力預測值為0.875角秒），觀測結果支持愛因斯坦的預測；3）重力紅移——光線從強重力場中逃逸時頻率降低（波長變長），已在實驗室（哈佛塔實驗，1960年，龐德和雷布卡使用穆斯堡爾效應測量了22.5米高度差造成的重力紅移）和GPS衛星（衛星上的原子鐘每天快約38微秒，必須進行相對論校正否則GPS定位誤差每天累積約11公里）中得到驗證\n• 黑洞的「無毛定理」（No-Hair Theorem）：一個靜止的孤立黑洞只需三個參數就可以完全描述——質量（M）、角動量（J）、電荷（Q）——所有其他信息（形成黑洞的原始物質的化學成分、形狀等）都在塌縮過程中丟失或被隱藏在事件視界之後。這導致了「黑洞信息悖論」——量子力學要求信息守恆（么正性），但黑洞似乎會永久性地摧毀信息——霍金在1970年代提出此問題，經過數十年爭論，目前的主流觀點傾向於信息以某種方式保留在霍金輻射中（黑洞最終會蒸發，信息回到宇宙中）"},{"id":"p3","title":"量子力學","content":"普朗克1900年發現能量量子化（E=hν），開啟量子時代。海森堡測不準原理（ΔxΔp≥ħ/2）揭示自然界根本限制。貝爾不等式被實驗推翻（2022年諾獎）證明量子糾纏真實存在。量子力學的技術革命：晶體管（1947年）、激光（1960年）、集成電路、MRI、量子計算機。愛因斯坦終生難以接受量子力學的概率本質——「上帝不擲骰子」——與波爾長達數十年的著名辯論是物理學史上最精彩的智力對決。\n\n• 量子力學的標準數學表述（狄拉克符號）：量子態由希爾伯特空間中的態向量|ψ⟩（Ket向量）描述→物理可觀測量由作用在態向量上的厄米算符（Hermitian Operator）表示→測量結果是算符的本徵值（Eigenvalue）之一→測量後系統塌縮到對應的本徵態（Eigenstate）——測量過程的「波函數塌縮」是量子力學最令人困惑的特徵（薛丁格的貓思想實驗就是為了突顯這一問題的荒誕性）\n• 量子力學的四大解釋（對波函數塌縮和測量問題的不同理解）：1）哥本哈根解釋（波爾和海森堡——測量導致波函數塌縮，在測量之前談論粒子的位置和動量沒有意義）；2）多世界解釋（艾弗雷特1957年——沒有塌縮！每次量子測量時宇宙分裂為多個分支，每個可能的結果都在各自的分支中實現）；3）導航波理論（德布羅意1927年→玻姆1952年——粒子有確定的軌跡，由「導航波」引導，量子力學的概率性只是對底層確定性動力學的無知）；4）量子貝葉斯主義（QBism——量子態只是觀察者對測量結果的信念和賭注，不是客觀物理實在的描述）\n• 量子技術的三大前沿應用：1）量子計算——利用量子疊加（量子比特可以同時處於0和1的疊加態）和量子糾纏進行計算，對特定問題（大數分解——Shor算法威脅RSA加密、資料庫搜索——Grover算法、量子化學模擬）具有超越經典計算機的潛力；2）量子密碼學——利用量子不可克隆定理和測量塌縮原理（任何竊聽行為都會不可避免地留下可檢測的痕跡）實現理論上絕對安全的通信（量子密鑰分發QKD）；3）量子傳感——利用量子糾纏和疊加態對外部擾動的極端敏感性來進行超高精度的測量（重力儀、磁力計、原子鐘）"}]},{"id":"chemistry","title":"化學","category":"science","description":"研究物質組成、結構、性質與變化——從原子軌域到高分子聚合物","icon":"⚗️","sections":[{"id":"c1","title":"原子結構與化學鍵","content":"化學鍵決定物質的所有宏觀性質。離子鍵（正負離子靜電引力，如NaCl食鹽）、共價鍵（原子共享電子對，VSEPR理論決定分子三維形狀）、金屬鍵（電子海模型解釋金屬導電性和延展性）、氫鍵（解釋為什麼水在室溫是液體而氧氣是氣體，為什麼冰的密度小於水能在水面漂浮——這對水生生物冬季生存至關重要）。電負度（泡林標度）：氟3.98最高、銫0.79最低。"},{"id":"c2","title":"元素週期律","content":"門得列夫1869年按原子量排列63種已知元素，為未知元素留出空位並準確預測其性質——鎵（1875年）和鍺（1886年）的發現一一證實其預測，被譽為科學史上最輝煌預測之一。現代週期表按原子序數排列：18個族、7個週期。趨勢規律：原子半徑從左到右遞減（核電荷增加拉緊電子）、從上到下遞增（加入新電子殼層）；電離能從左到右遞增。稀土元素（鑭系和錒系）的4f和5f軌域賦予其獨特磁性和光學性質。"},{"id":"c3","title":"有機化學","content":"碳原子可形成四條共價鍵並連接成長鏈、支鏈和環狀結構，使有機化合物種類遠超所有無機化合物總和。有機化合作為生命物質（蛋白質、核酸、碳水化合物、脂質）和合成材料（塑膠、藥物、染料、纖維）的基礎。主要反應類型：取代、加成、消除、氧化還原、重排。酶催化下的有機反應構成生命體內複雜代謝網絡。高分子化學——聚乙烯、尼龍、聚酯等合成高分子徹底改變現代生活。"}]},{"id":"geography","title":"地理學","category":"science","description":"研究地球表層自然與人文現象的空間分佈、相互關係與演化規律","icon":"🌍","sections":[{"id":"g1","title":"自然地理：氣候系統","content":"科本氣候分類法（1884年）將全球氣候分為五大類：A熱帶（終年高溫多雨）、B乾燥（沙漠和草原）、C溫帶、D大陸性、E極地。氣候驅動力：太陽輻射緯度差異、大氣三圈環流（哈德里/費雷爾/極地環流）、洋流（墨西哥灣暖流使西歐比同緯度溫暖10–15°C）、地形（迎風坡降水、每上升1000米降溫約6.5°C）。全球氣候變化：工業革命以來CO₂從280ppm升至420ppm以上，全球均溫已升高約1.2°C。\n\n• 全球氣候變化的關鍵數據（IPCC第六次評估報告，2023年）：工業革命以來（1850–1900年均值為基準）全球平均地表溫度已升高約1.1°C（2023年已達約1.2°C）；大氣CO₂濃度從工業革命前的約280 ppm升至2023年的約420 ppm（增加約50%）；全球平均海平面自1900年以來上升了約20厘米（其中約一半發生在1990年以後——上升速率在加速）；北極海冰面積在夏季（9月）以每十年約13%的速率減少\n• 柯本氣候分類法的詳細標準：A（熱帶）——最冷月均溫≥18°C，分為Af（熱帶雨林——全年各月降水≥60mm）、Am（熱帶季風——有短暫乾季但足夠濕潤）和Aw/As（熱帶莽原——明顯的乾季）；B（乾燥）——蒸發量大於降水量，分為BW（沙漠）和BS（草原）；C（溫帶）——最冷月均溫在-3°C到18°C之間，分為Cfa/Cwa（副熱帶濕潤）、Cs（地中海——夏季乾燥、冬季多雨）和Cfb/Cfc（海洋性——全年均勻降水）；D（大陸性）——最冷月均溫≤-3°C，僅在北半球出現；E（極地）——最熱月均溫<10°C，分為ET（苔原）和EF（冰蓋）","subs":[{"id":"g1a","title":"板塊構造學說","content":"地球岩石圈劃分為約15個主要板塊，在地函對流驅動下以每年數厘米移動。三種邊界：發散（大西洋中洋脊，新洋殼形成）、聚合（俯衝帶→海溝和火山弧如環太平洋火山帶；大陸碰撞→褶皺山脈如喜馬拉雅，印度板塊至今仍以每年約5厘米擠入歐亞板塊）、轉形斷層（加州聖安德烈斯斷層）。板塊運動是地震和火山的主要原因——環太平洋火山帶集中了全球約75%的活火山和約90%的地震。\n\n• 板塊構造的驅動力——地函對流的三種模式：1）全地函對流（Whole-Mantle Convection——對流從核幔邊界到岩石圈底部貫穿整個地函）；2）雙層對流（Layered Convection——上下地函之間（約660公里不連續面）存在屏障，分別獨立對流）；3）混合模式（部分俯衝板塊穿透660公里不連續面進入下地函、部分在此堆積——地震層析成像支持這種混合模式）\n• 三種板塊邊界的詳細特徵：1）發散邊界（Divergent——洋中脊（大西洋中洋脊長約16000公里）和大陸裂谷（東非大裂谷——索馬里板塊正從非洲板塊分裂，數百萬年後東非可能成為一個獨立的大陸和海洋））；2）聚合邊界（Convergent——海洋-大陸（俯衝→安第斯山脈型火山弧）、海洋-海洋（俯衝→馬里亞納群島型火山島弧+深海溝）、大陸-大陸（碰撞→喜馬拉雅山脈型褶皺山脈，印度板塊至今仍以每年約5厘米向北推擠歐亞板塊→珠穆朗瑪峰每年仍升高約4毫米））；3）轉形斷層邊界（Transform——板塊水平滑動，如加州聖安德烈斯斷層（太平洋板塊以每年約5厘米向北滑過北美板塊），應力積累數十年至數百年後突然釋放引發地震）\n• 地震波的三種類型：1）P波（Primary Wave——縱波，速度最快約5–8 km/s，可在固體、液體和氣體中傳播，質點振動方向與波傳播方向一致）；2）S波（Secondary Wave——橫波，速度約3–5 km/s，僅在固體中傳播，質點振動方向垂直於波傳播方向）——S波無法穿過液態外核（這是地球外核為液態的關鍵證據）；3）表面波（Surface Wave——沿地球表面傳播，速度最慢但振幅最大、破壞力最強——洛夫波（Love Wave，水平剪切）和雷利波（Rayleigh Wave，橢圓形翻滾運動））"}]},{"id":"g2","title":"人文地理","content":"核心概念：區位論（馮·杜能農業同心圓模型、韋伯工業區位論——運輸成本/勞動力/集聚效應決定工業選址）、中心地理論（克里斯塔勒1933年——不同等級城市以六邊形格局提供不同層次商品和服務）、城市化（2023年全球56%人口居住城市，預計2050年達68%）、全球化與區域發展不平衡（核心—邊緣模型描述發達國家與發展中國家的經濟依賴關係）。\n\n• 全球城市化趨勢數據：2023年全球城市人口約佔總人口的56%（約44億人），預計2050年將達到68%（約66億人）。1950年全球僅有2個超過1000萬人口的巨型城市（Megacity——紐約和東京），2023年已增至約34個，其中東京（約3750萬人——全球最大都市區）、上海（約2900萬人）、雅加達（約3400萬人）位居前列。快速城市化面臨的挑戰：住房短缺（全球約10億人居住在貧民窟——UN-Habitat估計）、交通擁堵、空氣污染、基礎設施壓力、社會不平等\n• 全球化的四個維度：1）經濟全球化（國際貿易佔全球GDP約60%、跨國公司的供應鏈覆蓋全球、資本市場24小時運轉）；2）文化全球化（英語作為全球通用語言、好萊塢電影和Netflix的全球傳播、麥當勞和星巴克在100+國家運營、社交媒體連接全球）；3）政治全球化（聯合國、WTO、WHO等國際組織，歐盟等區域一體化，全球治理面臨的挑戰——氣候變化、疫情、難民危機需要全球協調）；4）技術全球化（互聯網連接全球約50億人、智能手機普及率持續增長、開源軟件的全球協作開發）"}]},{"id":"mathematics","title":"數學","category":"science","description":"形式科學之母——研究數量、結構、空間與變化的抽象體系","icon":"📐","sections":[{"id":"m1","title":"數學基礎：公理化與哥德爾不完備定理","content":"歐幾里得《幾何原本》（約前300年）從五條公設推導出465個命題，主導數學教育兩千年。19–20世紀數學基礎危機——羅素悖論（1901年）動搖樸素集合論。哥德爾不完備定理（1931年）：任何包含基本算術的一致形式系統必然存在無法在系統內部證明或證偽的命題——徹底粉碎希爾伯特計劃將數學完全形式化的夢想，被譽為20世紀邏輯學最深刻的發現。\n\n• 歐幾里得《幾何原本》的五條公設：1）從任意一點到任意另一點可以作一直線；2）一條有限直線可以無限延長；3）以任意點為圓心和任意距離可以作一圓；4）所有直角都相等；5）如果一條直線與兩條直線相交，且在同一側的兩個內角之和小於兩個直角（180°），那麼這兩條直線在該側無限延長後必定相交（這條就是著名的「平行公設」——第五公設）——對第五公設的質疑和證明嘗試持續了2000年，最終在19世紀催生了非歐幾里得幾何（羅巴切夫斯基幾何和黎曼幾何）\n• 數學中的七大千禧年大獎難題（Millennium Prize Problems，克萊數學研究所2000年提出，每個懸賞100萬美元）：1）P vs NP問題；2）霍奇猜想（Hodge Conjecture——代數幾何中代數循環與拓撲循環的關係）；3）龐加萊猜想（Poincaré Conjecture——2003年佩雷爾曼證明，唯一被解決的千禧年難題）；4）黎曼猜想（Riemann Hypothesis——素數分佈的規律，與ζ函數零點的位置有關）；5）楊-米爾斯存在性和質量間隙（Yang-Mills Existence and Mass Gap——量子場論的數學基礎）；6）納維-斯托克斯方程的存在性和光滑性（Navier-Stokes——流體力學的基本方程是否有光滑解）；7）伯奇和斯溫納頓-戴爾猜想（Birch and Swinnerton-Dyer Conjecture——橢圓曲線的有理點數量）","subs":[{"id":"m1a","title":"微積分與分析學","content":"牛頓和萊布尼茲17世紀獨立創立微積分——牛頓從物理問題（瞬時速度）出發發明「流數法」，萊布尼茲從幾何問題出發發明今天使用的dx/dy符號。微積分基本定理將微分和積分聯繫為互逆運算。後續發展：柯西和魏爾斯特拉斯以ε-δ語言為極限定義提供嚴格基礎、黎曼積分、勒貝格積分（1902年）、複分析（柯西積分定理、留數定理——複平面上奇異之美）。\n\n• 微積分基本定理（Fundamental Theorem of Calculus）的兩部分：第一部分——如果f在[a,b]上連續、F是f的一個反導數（F\\' = f），則∫ₐᵇ f(x)dx = F(b) - F(a)（定積分可以通過求原函數來計算）；第二部分——定義G(x) = ∫ₐˣ f(t)dt，則G\\'(x) = f(x)（積分上限函數的導數等於被積函數，即微分和積分是互逆運算）\n• ε-δ極限定義（柯西-魏爾斯特拉斯）：lim(x→a) f(x) = L 的嚴格定義——對於任意ε > 0（無論多小），存在δ > 0，使得當 0 < |x - a| < δ 時，|f(x) - L| < ε。這個定義將「極限」這個直觀概念轉化為精確的邏輯陳述，消除了早期微積分中依賴「無窮小」的模糊性\n• 複分析（Complex Analysis）的核心定理：柯西積分定理——如果f(z)在簡單閉合曲線C內部和C上解析（複可微），則∮_C f(z)dz = 0；柯西積分公式——f(a) = (1/2πi)∮_C f(z)/(z-a) dz——解析函數在曲線內部的值完全由其在邊界上的值決定（這是複分析中最令人驚嘆的結果之一）；留數定理——∮_C f(z)dz = 2πi Σ Res(f, zₖ)——將複雜的閉合曲線積分簡化為計算函數在各孤立奇點的留數之和"}]},{"id":"m2","title":"現代數學分支","content":"抽象代數：從伽羅瓦理論（1832年，21歲的伽羅瓦在決鬥前夜寫下群論奠基論文、次日死於決鬥）研究群/環/域等代數結構。拓撲學：研究連續變形下不變的性質——「拓撲學家分不清甜甜圈和咖啡杯」（兩者都是虧格1曲面）。龐加萊猜想（1904年提出，2003年佩雷爾曼證明，拒絕菲爾茲獎和百萬美元獎金）。概率論：貝葉斯定理P(A|B)=P(B|A)P(A)/P(B)是現代機器學習的理論基礎。\n\n• 群論（Group Theory）的公理體系：一個群（G, •）是一個集合G和一個二元運算•，滿足四條公理：1）封閉性（對任意a,b∈G，a•b∈G）；2）結合律（(a•b)•c = a•(b•c)）；3）單位元存在（存在e∈G使得e•a = a•e = a）；4）逆元存在（對任意a∈G，存在a⁻¹使得a•a⁻¹ = a⁻¹•a = e）——如果還滿足交換律（a•b = b•a）則為阿貝爾群。群論是現代數學的基礎語言——從晶體對稱性到基本粒子的分類（標準模型基於U(1)×SU(2)×SU(3)規範群）都使用群論\n• 拓撲學的經典命題：1）歐拉多面體公式——對任何凸多面體，頂點數V - 邊數E + 面數F = 2（推廣到任意曲面：V - E + F = 2 - 2g，其中g為虧格——曲面上「洞」的數量）；2）不動點定理（布勞威爾）——任何從閉球到自身的連續映射至少有一個不動點（保證了在攪拌咖啡時至少有一個分子停留在原來的位置）；3）毛球定理（Hairy Ball Theorem）——在偶數維球面上不存在無奇點的連續切向量場（通俗版：「你無法完美地梳理一個長滿毛的球——總會至少有一個旋或禿斑」）\n• 貝葉斯定理的應用深度：P(A|B) = P(B|A)·P(A) / P(B)——看似簡單的公式卻是現代機器學習、垃圾郵件過濾、醫學診斷和科學推理的理論基礎。例如醫學檢測：如果某疾病發病率為1%、檢測靈敏度為99%（患者檢測陽性的概率）、特異度為99%（健康人檢測陰性的概率），則檢測陽性的人實際患病的概率只有約50%（而非99%！）——因為假陽性的絕對人數（健康人中1%被誤檢為陽性×大量健康人群）遠多於真陽性的絕對人數"}]},{"id":"aerospace","title":"航天與天文學","category":"science","description":"從宇宙大爆炸到星際探索——人類對宇宙最前沿的認知與工程實踐","icon":"🚀","sections":[{"id":"a1","title":"宇宙學：從大爆炸到暗能量","content":"ΛCDM標準模型描述138億年宇宙演化：大爆炸→暴脹（10⁻³⁶秒內指數級膨脹至少10²⁶倍）→夸克和輕子形成→質子中子結合（3分鐘）→宇宙核合成（75%氫、25%氦）→復合時期（38萬年後，宇宙透明，CMB形成）→黑暗時代→第一批恆星點亮宇宙（約1–5億年後）。1998年通過Ia型超新星發現宇宙加速膨脹——暗能量（約佔宇宙總質能68%，本質至今未知，2011年諾獎）。暗物質（約27%，不與電磁力作用，僅通過引力效應被探測）。普通物質僅約5%。\n\n• 宇宙微波背景輻射（CMB）的發現故事：1964年貝爾實驗室的彭齊亞斯（Arno Penzias）和威爾遜（Robert Wilson）在使用號角天線進行無線電通訊實驗時，發現了一個無法消除的「背景噪音」——無論天線朝向哪個方向、無論白天還是黑夜，都存在一個均勻的約3.5K的微波信號。他們起初以為是天線上的鴿子糞便造成的干擾（清除了鴿糞後信號仍在）。與此同時，普林斯頓大學的物理學家迪克（Robert Dicke）團隊正在預測如果宇宙起源於大爆炸、那麼應該存在一個約10K的背景輻射——兩個團隊聯繫後確認彭齊亞斯和威爾遜探測到的正是宇宙微波背景輻射（1978年諾貝爾物理學獎）\n• 暗物質和暗能量的發現線索：暗物質——1933年茲威基（Fritz Zwicky）在觀測后髮座星系團（Coma Cluster）時發現星系運動速度過快、按可見物質的引力計算星系團應該早已飛散→推測存在大量不可見的「暗物質」提供額外引力。1970年代薇拉·魯賓（Vera Rubin）研究螺旋星系的旋轉曲線——按照牛頓引力理論，遠離星系中心的恆星旋轉速度應該下降（如太陽系中越遠的行星越慢），但觀測顯示旋轉速度保持恆定甚至上升→星系必須被一個巨大的暗物質暈包圍才能解釋。暗能量——1998年兩個獨立團隊（超新星宇宙學計劃和高紅移超新星搜索團隊）通過觀測遙遠的Ia型超新星發現宇宙的膨脹不是在減速而是在加速→必須存在一種「暗能量」驅動加速膨脹（2011年諾貝爾物理學獎）","subs":[{"id":"a1a","title":"恆星演化與黑洞","content":"恆星的生命循環：分子雲引力塌縮→原恆星→主序星（核心氫核聚變，太陽已在此階段約46億年，還將持續約50億年）→紅巨星→行星狀星雲+白矮星（太陽質量級恆星）或超新星爆發+中子星/黑洞（大質量恆星>8M☉）。白矮星的質量上限為1.44M☉（錢德拉塞卡極限）、中子星上限約3M☉（TOV極限）。黑洞的事件視界是連光也無法逃逸的邊界——史瓦西半徑R=2GM/c²。超大質量黑洞（數百萬至數十億M☉）存在於幾乎所有大型星系中心。\n\n• 恆星核合成的元素階梯（從氫到鐵）：1）氫燃燒（主序星階段——質子-質子鏈反應和CNO循環→氦）；2）氦燃燒（紅巨星階段——3α過程：三個氦-4核融合為碳-12）；3）碳燃燒→氖、鈉、鎂；4）氖燃燒→氧、鎂；5）氧燃燒→矽、硫；6）矽燃燒→鐵-56（核結合能的最高點——鐵-56的每個核子結合能最大，核聚變到鐵為止不再釋放能量）——比鐵更重的元素（銅、銀、金、鉛、鈾等）無法通過恆星核聚變產生，而是在超新星爆發和中子星合併等極端事件中通過中子捕獲過程（s-過程和r-過程）合成——所以「我們都是星塵」（卡爾·薩根語），我們體內的碳來自恆星內部的氦燃燒、血液中的鐵來自超新星爆發\n• 恆星的生命路徑取決於初始質量：1）小質量恆星（<0.5 M☉）——完全對流、燃燒全部氫→氦白矮星（不經過紅巨星階段，宇宙的年齡（138億年）還不足以讓任何此類恆星完成生命循環）；2）中等質量恆星（0.5–8 M☉，太陽在此範圍）——主序星（氫燃燒約100億年）→紅巨星（氦燃燒）→行星狀星雲+碳氧白矮星（質量上限1.44 M☉——錢德拉塞卡極限）；3）大質量恆星（>8 M☉）——主序星（僅數百萬至數千萬年，因高質量恆星燃燒速率極快）→超巨星→超新星爆發（核心塌縮超新星Type II/Ib/Ic）→中子星（1.44–約3 M☉）或黑洞（>約3 M☉）\n• 中子星的極端物理性質：質量約1.4–2倍太陽質量但直徑僅約10–20公里→密度約10¹⁷ kg/m³（一茶匙中子星物質重約10億噸，相當於一座山的質量）；表面重力約地球的10¹¹倍（逃逸速度約光速的50–60%）；磁場約10⁸–10¹⁵特斯拉（地球磁場約5×10⁻⁵特斯拉）——中子星是宇宙中最極端的物質形態之一（僅次於黑洞）"}]},{"id":"a2","title":"太空探索史","content":"1957年蘇聯Sputnik 1（首顆人造衛星）開啟太空時代→1961年加加林首次載人航天→1969年阿波羅11號阿姆斯壯登月（「一個人的一小步，人類的一大步」）。1970年代至今：太空探測器遍訪太陽系所有行星——航海家1號（1977年發射，2012年成為首個進入星際空間的人造物體）、好奇號/毅力號火星車尋找火星生命痕跡、韋伯太空望遠鏡（2022年開始運作，紅外波段觀測宇宙最深處）。國際太空站（ISS，1998年起運作，多國合作的最大太空項目）。商業航天的崛起：SpaceX實現火箭回收和再利用（2015年首次成功著陸），大幅降低發射成本。\n\n• 阿波羅計劃的關鍵數字：1961年5月甘迺迪宣布「在這個十年結束之前把人送上月球並安全返回」→8年後的1969年7月20日阿波羅11號登月成功。阿波羅計劃總共花費約254億美元（1973年美元，相當於2024年約1500–2000億美元），在高峰期僱用了約40萬人、涉及約2萬家企業和大學。共6次成功登月（阿波羅11、12、14、15、16、17），12名太空人在月球表面行走。阿波羅13號因服務艙氧氣罐爆炸（「休士頓，我們有麻煩了」）而中止任務，三位太空人在極度危險的條件下（電力不足、飲水短缺、二氧化碳濃度升高）利用月球模組作為「救生艇」繞月後安全返回地球\n• 國際太空站（ISS）的規模：質量約420噸、長約109米（相當於一個足球場）、太陽能電池陣展開後跨度約73米、內部加壓空間約900立方米（相當於一個五居室房屋）。在約400公里高的軌道上以約7.66公里/秒的速度運行（約90分鐘繞地球一圈）。自2000年11月以來持續有人居住，已有來自21個國家的超過270名太空人造訪\n• 太空探索的未來方向：1）阿爾忒彌斯計劃（Artemis——NASA，目標2020年代末重返月球並建立可持續的月球基地，為載人火星任務做技術準備）；2）火星樣本返回（NASA和ESA合作——毅力號已在火星表面收集樣本，後續任務將把樣本送回地球）；3）SpaceX星艦（Starship——完全可重複使用的超重型火箭，設計目標為載人登陸月球和火星，有效載荷約100–150噸到低地球軌道）；4）中國空間站（天宮——2022年建成，長期載人駐留，並計劃2030年前實現載人登月）；5）小行星探測和行星防禦（DART任務2022年成功撞擊小行星Dimorphos改變其軌道——人類首次主動改變天體的軌道）"}]},{"id":"computer-science","title":"計算機科學","category":"science","description":"從圖靈機到人工智能——計算理論、算法與技術革命的系統性學科","icon":"💻","sections":[{"id":"cs1","title":"計算理論基礎","content":"圖靈1936年提出圖靈機抽象模型——包含無限長紙帶和讀寫頭的簡單機器，卻能模擬任何算法的執行。邱奇-圖靈論題：任何在物理上可計算的函數都可以被圖靈機計算。圖靈還證明停機問題的不可判定性——不存在通用算法判斷任意程序是否會停止運行，揭示了計算能力的根本限制。複雜度理論：P類問題（多項式時間可解）、NP類問題（多項式時間可驗證解答）、NP完備問題（如旅行商問題——如果能在多項式時間解決任何一個NP完備問題，則P=NP，這是計算機科學最重要的未解難題之一，克萊數學研究所懸賞100萬美元）。\n\n• 圖靈機的定義和意義：一個圖靈機由以下部分組成：1）一條無限長的紙帶（Tape，劃分為單元格，每個單元格可以寫入一個符號（通常為0、1和空白））；2）一個讀寫頭（Head，可以讀取當前所在單元格的符號、寫入新符號、向左或向右移動一格）；3）一個有限狀態控制器（Finite State Control，根據當前狀態和讀取的符號來決定下一步操作——寫入什麼符號、向哪個方向移動、轉換到哪個狀態）；4）一個狀態寄存器（存儲當前狀態）。圖靈證明：存在一個「通用圖靈機」（Universal Turing Machine），它可以模擬任何其他圖靈機的運算——只要輸入對應的描述和輸入數據。通用圖靈機的概念就是現代可編程計算機的理論雛形——「軟件」（對機器的描述）和「硬件」（執行描述的機器）的分離\n• 計算複雜度的常見時間複雜度排序（從快到慢）：O(1)常數 < O(log n)對數 < O(n)線性 < O(n log n)線性對數 < O(n²)平方 < O(n³)立方 < O(2^n)指數 < O(n!)階乘。實際應用中，O(n log n)以下的算法對於大規模數據（n > 10⁶）仍然是可用的，而O(2^n)以上的算法在n > 30–40時就變得不可行（即使使用世界上最快的超級計算機）——這就是為什麼TSP（旅行商問題）在n=100時就無法精確求解（可能的排列數量為99! ≈ 9.3 × 10¹⁵⁵）","subs":[{"id":"cs1a","title":"算法與資料結構","content":"算法效率以時間複雜度（大O符號）衡量：O(1)常數、O(log n)對數（二分查找）、O(n)線性、O(n log n)（高效排序如MergeSort和QuickSort）、O(n²)平方（簡單排序）、O(2^n)指數。經典算法：Dijkstra最短路徑、動態規劃（將複雜問題分解為重疊子問題，如背包問題和編輯距離）、貪婪算法（每個步驟選擇當前最優，如最小生成樹）。核心資料結構：數組（隨機訪問O(1)）、鏈表、堆（二叉堆、斐波那契堆）、哈希表（期望查找O(1)）、紅黑樹（平衡二叉搜索樹，保證最壞O(log n)）、圖（鄰接矩陣vs鄰接表）。\n\n• 常見排序算法的比較（時間複雜度和空間複雜度）：1）冒泡排序（Bubble Sort——O(n²)時間、O(1)空間、穩定、簡單但極低效）；2）快速排序（Quick Sort——平均O(n log n)、最壞O(n²)、O(log n)空間（遞歸棧）、不穩定——選擇好的樞軸（Pivot）是關鍵（三數取中法））；3）合併排序（Merge Sort——始終O(n log n)、O(n)空間、穩定——適合外部排序）；4）堆排序（Heap Sort——O(n log n)、O(1)空間、不穩定——利用最大堆數據結構）；5）計數排序（Counting Sort——O(n + k)其中k為數據範圍、非比較排序——僅適用於整數且範圍有限的情況）\n• 動態規劃的兩個關鍵性質：1）最優子結構（Optimal Substructure——最優解包含其子問題的最優解，如最短路徑問題中，如果A→B→C→D是A到D的最短路徑，則A→B→C也是A到C的最短路徑）；2）重疊子問題（Overlapping Subproblems——相同的子問題在遞歸過程中反覆出現，因此可以將子問題的解存儲（Memoization/表格法）以避免重複計算——典型例子：斐波那契數列（樸素遞歸為O(2^n)，動態規劃優化為O(n)）\n• P vs NP問題的核心：P類（Polynomial Time——存在多項式時間算法來找到解的問題，如排序、最短路徑、最大公約數）vs NP類（Nondeterministic Polynomial Time——如果給出一個候選解，可以在多項式時間內驗證該解是否正確，如旅行商問題TSP——給定一條路線可以在O(n)時間內計算總距離來驗證是否小於某個閾值，但找到最優路線沒有已知的多項式時間算法）——「P是否等於NP？」是計算機科學最重要的未解難題，克萊數學研究所懸賞100萬美元。如果P=NP被證明，將徹底改變密碼學（RSA等公鑰加密系統的安全性依賴於某些問題（大數分解）被認為不在P中）"}]},{"id":"cs2","title":"計算機系統","content":"馮·諾伊曼架構（1945年）：存儲程序概念——指令和數據存儲在同一記憶體中，CPU從記憶體讀取指令執行。現代計算機的層次結構：晶體管→邏輯門→組合/時序電路→CPU（包含ALU算術邏輯單元、控制單元、寄存器、快取L1/L2/L3）→記憶體階層（寄存器>L1>L2>L3>主存RAM>SSD>HDD，速度和容量成反比）。操作系統管理硬件資源和提供抽象——進程管理（CPU調度）、內存管理（虛擬記憶體、分頁）、文件系統、設備驅動。網絡協議棧：TCP/IP五層模型（應用層HTTP/DNS→傳輸層TCP/UDP→網絡層IP→鏈路層Ethernet/WiFi→物理層）。\n\n• 計算機網絡的分層架構——TCP/IP五層模型詳解：1）物理層（Physical——傳輸原始的比特流：光纖（光脈衝）、銅纜（電信號）、無線電波，設備包括中繼器和集線器）；2）鏈路層（Link/Data Link——在相鄰節點之間可靠傳輸數據幀Frame：以太網Ethernet（MAC地址）、WiFi（802.11協議），設備包括交換機和橋接器）；3）網絡層（Network/Internet——在全球範圍內選擇路由傳輸數據包Packet：IP協議（IPv4 32位地址、IPv6 128位地址），設備包括路由器）；4）傳輸層（Transport——在進程之間可靠（TCP）或不可靠（UDP）地傳輸數據段Segment：TCP提供連接導向、流量控制、擁塞控制和可靠傳輸；UDP提供無連接、盡力而為的簡單傳輸）；5）應用層（Application——為應用程序提供網絡服務：HTTP/HTTPS（Web）、SMTP/IMAP（郵件）、DNS（域名解析）、FTP（文件傳輸））\n• 數據庫的ACID特性（事務處理的四個保證）：1）原子性（Atomicity——事務中的所有操作要麼全部完成、要麼全部不完成——如果中途失敗，所有已執行的操作必須回滾Rollback）；2）一致性（Consistency——事務完成後，數據庫必須從一個一致的狀態轉變到另一個一致的狀態，所有數據約束（主鍵、外鍵、Check約束等）必須滿足）；3）隔離性（Isolation——多個事務並發執行時，每個事務都應該如同獨佔數據庫一樣運行——不同隔離級別（讀未提交Read Uncommitted、讀已提交Read Committed、可重複讀Repeatable Read、可序列化Serializable）提供了不同程度的隔離和性能之間的權衡）；4）持久性（Durability——事務一旦提交成功，其結果就是永久性的——即使系統崩潰或斷電也不會丟失）"},{"id":"cs3","title":"人工智能","content":"AI從1956年達特茅斯會議誕生以來經歷多次寒冬與突破。深度學習三大驅動力：大數據（ImageNet 1400萬張圖片等海量標註數據）、算力（GPU並行計算革命，NVIDIA CUDA平台）、算法突破（CNN卷積神經網絡2012年AlexNet在ImageNet大賽大幅領先奪冠；Transformer架構2017年「Attention Is All You Need」論文完全基於注意力機制捨棄循環結構）。大語言模型（LLM）如GPT-4、Gemini、Claude能進行對話、編碼、翻譯和推理——但「幻覺」（生成看似可信但事實錯誤的內容）是其根本性缺陷。AI倫理：算法偏見（訓練數據的社會偏見被模型放大）、深度偽造（Deepfake製造虛假影音內容）、勞動力替代（白領工作可能面臨類似工業革命時期藍領的結構性失業風險）。歐盟AI Act（2024年）是全球首部全面監管AI的法律。\n\n• Transformer架構的核心——自注意力機制（Self-Attention）：每個輸入token生成三個向量——查詢（Query Q）、鍵（Key K）、值（Value V）。注意力權重計算公式：Attention(Q,K,V) = softmax(QK^T / √d_k) V ——每個token的查詢與所有token的鍵計算相似度（點積）→除以√d_k（縮放以防止點積過大導致softmax梯度消失）→通過softmax歸一化為概率分佈→以此概率分佈對所有值向量加權求和。多頭注意力（Multi-Head Attention）並行運行多個注意力機制（每個頭關注不同的關係模式——如句法關係、語義關係、共指關係），將結果拼接後線性變換\n• 深度學習的三大挑戰和解決方案：1）梯度消失/爆炸（Vanishing/Exploding Gradient——深層網絡中梯度在反向傳播時指數級衰減或增長）→解決方案：ReLU激活函數（而非Sigmoid/Tanh）、批歸一化（Batch Normalization——將每層的輸入歸一化為均值0方差1）、殘差連接（Residual Connection——允許梯度直接流過跳躍連接）；2）過擬合（Overfitting——模型記住了訓練數據的噪聲而非學到泛化規律）→解決方案：Dropout（隨機丟棄神經元）、數據增強（Data Augmentation——對訓練圖像進行隨機旋轉、裁剪、翻轉等）、早停（Early Stopping）；3）計算資源限制→解決方案：遷移學習（Transfer Learning——使用預訓練模型微調）、模型蒸餾（Knowledge Distillation——用大模型教小模型）、混合精度訓練（Mixed Precision——使用FP16和FP32混合精度加速訓練）\n• AI倫理的核心議題框架：1）公平性（Fairness——算法是否對不同群體（種族、性別、年齡等）產生不公平的差別影響？數據中的歷史偏見可能被模型放大）；2）可解釋性（Explainability——深度學習模型是「黑箱」，如何解釋其決策？SHAP、LIME等事後解釋方法提供局部近似解釋）；3）隱私（Privacy——訓練數據是否包含個人隱私信息？模型是否會洩露訓練數據？差分隱私（Differential Privacy）和聯邦學習（Federated Learning）是關鍵技術）；4）安全性（Safety——對抗樣本（Adversarial Examples——在輸入上添加人眼不可見的微小擾動可以誤導模型做出錯誤預測）、獎勵黑客（Reward Hacking——AI找到漏洞來最大化獎勵而非真正完成任務））；5）責任歸屬（Accountability——當AI系統造成損害時誰來負責？開發者、部署者還是使用者？）"}]}]},{"id":"industry","title":"行業","icon":"🏭","color":"#A78BFA","description":"全球經濟產業體系——八大領域從初級產業到高端服務業的全面剖析","topics":[{"id":"agriculture","title":"農業、林業及漁業","category":"industry","description":"人類最古老的生產活動，全球數十億人生計的基礎","icon":"🌾","sections":[{"id":"ag1","title":"農業革命與綠色革命","content":"約一萬年前新石器革命——從狩獵採集到定居農耕催生了村莊、城市和文明。農業在世界各地獨立起源：中東肥沃月灣（約前9500年，馴化小麥大麥）、中國長江流域（約前8000年，馴化水稻）、中美洲（約前7000年，馴化玉米）、安第斯山脈（約前5000年，馴化馬鈴薯——後來成為工業革命時期歐洲工人階級主要食物）。現代綠色革命（1943–1970年代）：諾曼·布勞格培育半矮稈高產小麥品種，使墨西哥和印度糧食產量倍增，挽救數億人免於饑荒（1970年諾貝爾和平獎）。在菲律賓IRRI培育的IR8「奇蹟稻」將部分地區稻米產量提高十倍。\n\n• 現代農業面臨的全球挑戰：1）糧食安全——全球約8.3億人面臨飢餓（2023年FAO數據），同時約20億人超重或肥胖——飢餓和營養不良的雙重負擔；2）土地退化——全球約33%的農田因侵蝕、鹽鹼化和沙漠化而退化，每年損失約1200萬公頃耕地（約一個英格蘭的面積）；3）水資源短缺——農業消耗全球約70%的淡水資源，許多地區的地下水正在以不可持續的速度被抽取；4）氣候變化——每升高1°C，小麥產量下降約6%、水稻約3%、玉米約7%，極端天氣（乾旱、洪水、熱浪）頻率和強度增加；5）生物多樣性喪失——全球約75%的作物遺傳多樣性在20世紀已經喪失，糧食生產越來越依賴少數幾個高產品種，增加了系統脆弱性","subs":[{"id":"ag1a","title":"現代農業前沿","content":"精準農業（GPS導航自動拖拉機、無人機遙感監測作物健康、可變速率施肥灌溉）；基因編輯作物（CRISPR編輯無需引入外源基因，如高油酸大豆和抗褐變蘑菇已在多國上市）；垂直農業（LED照明、水培/氣霧培的室內多層種植——產量為傳統農田數十倍至數百倍，用水減少90%以上，無需農藥）；植物基和細胞培養肉（Impossible Foods和Beyond Meat以豌豆蛋白等模仿動物肉質地；培養肉從動物提取細胞在生物反應器中生長——2020年新加坡率先批准培養雞肉商業銷售）。\n\n• 精準農業（Precision Agriculture）的技術棧：1）GPS導航自動拖拉機（RTK-GPS精度可達±2厘米，自動駕駛減少重疊耕作、節省燃料和種子約5–10%）；2）無人機多光譜遙感（以近紅外和紅邊波段監測作物健康——NDVI歸一化植被指數是衡量植物光合作用活性和生物量的標準指標）；3）可變速率技術（VRT——根據土壤和作物需求地圖精確控制每個位置的施肥、灌溉和農藥用量——比均勻施用節省約15–30%的投入）；4）物聯網傳感器（土壤濕度、溫度、pH、電導率實時監測）\n• 垂直農業的技術優勢與局限：優勢——產量為傳統農田的數十倍至數百倍（以單位面積計）、用水減少90–95%（水循環使用）、無需農藥（封閉環境）、全年生產不受季節和氣候影響、可建在城市中減少運輸里程。局限——高初始投資（LED照明和氣候控制系統成本高昂）、高能耗（人工光源取代免費陽光——雖然LED效率不斷提高但能源成本仍是主要挑戰）、目前僅適合高價值作物（綠葉蔬菜、香草、草莓等，小麥水稻等主糧作物在經濟上尚不可行）"}]},{"id":"ag2","title":"林業與漁業","content":"全球森林覆蓋率約31%，但熱帶地區每年大量森林被砍伐（主要為開墾農田和牧場）。可持續林業管理（FSC森林認證）旨在平衡木材生產與生態保護——森林是地球上最重要的碳匯之一。漁業方面，全球約30%的漁業資源被過度捕撈。水產養殖已超過野生捕撈成為人類食用水產品的主要來源——中國是全球最大的漁業生產國和水產養殖國。\n\n• 全球林業的關鍵數據：全球森林覆蓋面積約40.6億公頃（約佔陸地面積的31%），其中約54%分佈在五個國家——俄羅斯（約8.15億公頃，約20%）、巴西（約4.97億公頃，約12%）、加拿大（約3.47億公頃，約9%）、美國（約3.10億公頃，約8%）、中國（約2.20億公頃，約5%）。全球森林每年吸收約76億噸CO₂（約為人類排放量的1.5倍——但森林砍伐和火災又釋放了大量碳）\n• 全球漁業的現狀和挑戰：全球約33%的漁業資源被過度捕撈（在生物學不可持續的水平上），約60%已達最大可持續捕撈量，僅約7%未充分開發。水產養殖（Aquaculture）已超過野生捕撈成為人類食用水產品的主要來源——2023年全球水產養殖產量約1.3億噸（野生捕撈約9200萬噸）。中國是全球最大的水產養殖國（約佔全球60%），養殖品種包括鯉科魚類、羅非魚、蝦類、海帶和紫菜等"}]},{"id":"mining","title":"採礦及採石","category":"industry","description":"自然資源開採——現代工業文明的物質基礎","icon":"⛏️","sections":[{"id":"mn1","title":"礦產資源分類與開採方法","content":"礦產資源分為能源礦產（煤、石油、天然氣、鈾）、金屬礦產（鐵、銅、鋁、金、銀、鉑、稀土等）和非金屬礦產（砂石、石灰石、磷酸鹽、鉀鹽等）。開採方法：露天開採（適合淺層大型礦床，如銅礦和鐵礦——全球最大的露天礦之一是智利的丘基卡馬塔銅礦，深逾850米）和地下開採（適合深層高品位礦床，如金礦和鑽石礦——南非的Mponeng金礦深度超過4公里，是全球最深的礦井之一）。採礦業的環境和社會影響：棲息地破壞、酸性礦坑排水（硫化物礦物遇水和空氣產生硫酸）、水資源污染和社區遷移。"},{"id":"mn2","title":"關鍵礦產與地緣政治","content":"稀土元素（17種化學性質相似的鑭系元素加鈧和釔）是智能手機、風力發電機、電動車電池、導彈制導系統和光纖通訊等高科技產品的不可或缺原料。中國控制全球約60%的稀土產量和約85%的加工能力——2023年中國宣布對鍺和鎵（半導體和光纖通訊關鍵原料）實施出口管制，凸顯了關鍵礦產供應鏈的地緣政治敏感性。鋰（電動車電池核心原料）的需求在過去十年暴增——全球最大的鋰儲量集中在智利、澳洲和阿根廷的「鋰三角」地區。剛果民主共和國供應全球約70%的鈷（同樣是電池關鍵原料），其中大量來自非正式的手工採礦，伴隨著嚴重的童工和人權問題。"}]},{"id":"manufacturing","title":"製造業","category":"industry","description":"從工業革命到工業4.0——生產方式的四次躍遷","icon":"🏗️","sections":[{"id":"mf1","title":"四次工業革命","content":"第一次（18世紀末）：蒸汽機驅動機械化生產——瓦特1769年改良蒸汽機使工廠不再依賴水力，紡織業率先機械化。第二次（19世紀末20世紀初）：電力驅動大規模生產——福特1913年採用移動流水線使T型車生產時間從12小時縮短至約93分鐘，價格從850美元降至260美元。第三次（20世紀後半葉）：電子及信息技術實現自動化——PLC（可編程邏輯控制器）和工業機器人（1961年通用汽車安裝首台Unimate機器人）開始取代重複性人工勞動。第四次（工業4.0，21世紀）：物聯網（IoT）、雲計算、AI和數字孿生為核心的智能製造——機器和產品之間相互通訊，生產系統自主決策和優化。"},{"id":"mf2","title":"全球供應鏈","content":"一個iPhone的零部件在超過40個國家的約200家供應商生產，最終在中國組裝並發往全球市場——這種高度全球化的分工極大提高了效率並降低了成本。然而新冠疫情（2020–2022年）暴露了供應鏈的極端脆弱性——芯片短缺導致全球汽車產業2021年減產約1000萬輛。各國開始推動供應鏈「去風險化」和多元化布局——關鍵產品（特別是半導體和藥品）的自主生產能力成為國家安全議題。「再工業化」和「友岸外包」（Friendshoring——將供應鏈轉移到政治盟友國家）正在重塑全球製造業格局。"}]},{"id":"energy","title":"能源業","category":"industry","description":"化石能源時代與可再生能源革命——全球能源轉型","icon":"⚡","sections":[{"id":"en1","title":"化石能源","content":"煤、石油、天然氣至今約佔全球一次能源消費的80%。石油是現代交通的生命線——中東約佔全球48%已探明儲量。OPEC（1960年成立）和OPEC+通過協調產量影響國際油價——這是一種國家層面的合法卡特爾行為。天然氣是化石燃料中碳排放最低的（約為煤的一半），液化天然氣LNG（冷卻至-162°C變為液態、體積縮小至1/600）使天然氣可跨越大洋運輸，從根本上改變了全球天然氣市場格局。"},{"id":"en2","title":"可再生能源革命","content":"太陽能光伏成本過去15年下降約90%（從2010年約0.38美元/kWh降至2023年約0.03美元/kWh），在許多地區已是最便宜發電方式。中國生產全球約80%的太陽能多晶矽和約95%的矽片。風力發電機葉片長度可超100米，單台15MW離岸風機每年可為約2萬戶供電。核能的風險-收益極端不對稱：運行時近乎零碳，但車諾比（1986年）和福島（2011年）的災難性後果動搖了公眾信任。核廢料的半衰期可達數萬年——芬蘭Onkalo深層地質處置庫是全球首個獲得營運許可的最終處置設施（地下約450米，設計壽命10萬年）。\n\n• 太陽能電池的三代技術：1）第一代——晶體矽太陽能電池（單晶矽——效率最高約22–26%、成本較高；多晶矽——效率約18–22%、成本較低，目前佔市場約90%份額）；2）第二代——薄膜太陽能電池（碲化鎘CdTe、銅銦鎵硒CIGS、非晶矽a-Si——效率約10–22%但成本更低、可製成柔性組件、弱光性能好）；3）第三代——新興技術（鈣鈦礦太陽能電池Perovskite——效率從2009年的約3.8%飆升至2023年的約26.1%（單結）和約33.9%（矽-鈣鈦礦疊層），是光伏史上效率提升最快的材料；有機太陽能電池OPV——可印刷和柔性；量子點太陽能電池——理論效率上限更高）\n• 核能的優劣勢全面分析：優勢——運行時近乎零碳排放（生命週期碳排放約12g CO₂/kWh，與風力發電相當，遠低於天然氣的約490g和煤的約820g）、功率密度極高（1公斤鈾-235完全裂變釋放的能量相當於約2700噸煤）、基載電力（24/7穩定供電，不受天氣影響）。劣勢——核事故的災難性後果（車諾比1986年和福島2011年——雖然死亡人數遠低於公眾感知，但心理和社會影響巨大、大面積土地長期無法居住）、核廢料處置（高放射性廢料的半衰期可達數萬年至數十萬年——需要設計能夠在遠超人類文明時間尺度上保持安全的處置方案，這是前所未有的工程和倫理挑戰）、建設成本和時間極高（一座核電站建設通常需10–15年、成本100–200億美元）、核擴散風險（民用核技術和材料可能被轉用於製造核武器）"}]},{"id":"trade-retail","title":"貿易及零售","category":"industry","description":"國際貿易體系與新零售革命","icon":"🛒","sections":[{"id":"tr1","title":"國際貿易體系","content":"世界貿易組織WTO（1995年成立，前身為GATT關貿總協定）是國際貿易規則的基石。比較優勢理論（大衛·李嘉圖1817年）：即使一國在所有產品的生產上都具有絕對劣勢，仍可從專業化生產和貿易中獲益——自由貿易的理論基礎。中國2001年加入WTO後深度融入全球貿易體系，2013年超越美國成為全球最大貨物貿易國。自由貿易協定（FTA）和區域貿易協定如RCEP（2022年生效，涵蓋東盟十國加中日韓澳新共15國約30%全球GDP）正在重塑貿易格局。中美貿易摩擦（2018年起）暴露了全球化價值鏈的脆弱性——關稅壁壘和出口管制（特別是半導體技術）成為大國博弈工具。"},{"id":"tr2","title":"電子商務與新零售","content":"亞馬遜、阿里巴巴、京東建立了覆蓋倉儲、配送、支付和客服的完整線上購物生態。中國雙十一（11月11日）是全球最大的購物節——2023年天貓雙十一GMV約為數千億元人民幣規模。新零售概念（阿里巴巴提出）強調線上線下（O2O）深度融合，利用大數據和AI提供個性化購物體驗。直播電商（抖音、淘寶直播）是近年最大創新——將娛樂和購物融為一體，2023年中國直播電商市場規模已超4.9萬億元人民幣。跨境電商（SHEIN、Temu、TikTok Shop）以前所未有的速度和規模直接連接中國製造商與全球消費者。"}]},{"id":"hospitality","title":"住宿及膳食服務","category":"industry","description":"酒店、餐飲與旅遊業——全球最大的服務行業之一","icon":"🏨","sections":[{"id":"ho1","title":"酒店業","content":"全球酒店業涵蓋從豪華（Ritz-Carlton、Four Seasons、Aman）到經濟型（Ibis、Motel 6）的完整品牌譜系。共享經濟模式（Airbnb 2008年創立）深刻改變住宿生態——使個人房東能參與旅遊住宿供給，在某些城市已佔據超過20%的住宿市場。精品酒店（Boutique Hotel）強調獨特設計和個性化體驗。酒店業趨勢：可持續旅遊（減少一次性塑料、節能減碳）、智能化（手機辦理入住、房間語音控制）、體驗式住宿（樹屋、冰旅館等獨特概念）。"},{"id":"ho2","title":"餐飲業與旅遊業","content":"餐飲業涵蓋從街頭小吃到米其林三星餐廳的完整光譜。精緻餐飲（Fine Dining）注重新鮮食材、精緻烹飪、美學擺盤和專業服務。連鎖餐飲（麥當勞3.8萬+門店、星巴克3.5萬+門店）以標準化運營和全球品牌策略聞名。趨勢：可持續餐飲（從農場到餐桌、減少食物浪費）、植物基飲食（人造肉市場快速增長）、融合菜系、外送平台崛起（Uber Eats、美團、餓了麼等——疫情期間全球外送市場規模翻倍）。旅遊業是全球最大產業之一（疫情前約佔全球GDP的10.4%），但極度脆弱——2020年國際旅遊人數因疫情暴跌約74%。"}]},{"id":"ict","title":"資訊及通訊科技","category":"industry","description":"數位時代的基石——從晶片到雲端、從互聯網到AI","icon":"📡","sections":[{"id":"ic1","title":"半導體產業","content":"半導體（晶片）是現代數字經濟的基石。產業鏈：設計（NVIDIA、高通、AMD、蘋果——無晶圓廠Fabless模式主導）→製造/晶圓代工（台積電掌握全球約90%先進製程市場，三星是唯一有力競爭者）→封裝測試。建造一座3奈米晶圓廠成本超200億美元。3奈米製程的電晶體柵極寬度僅約幾十個原子大小——需使用EUV極紫外光刻（波長13.5nm）。一片晶圓需上千道工序耗時數月——任何微小灰塵（可能遠大於晶片特徵尺寸）都可能導致整片報廢（無塵室達ISO Class 1標準）。\n\n• 晶片製造的極紫外光刻（EUV）技術詳解：EUV使用波長13.5nm的極紫外光（傳統深紫外光DUV為193nm），由高功率二氧化碳激光轟擊錫液滴產生等離子體並發射EUV光→通過多層鉬/矽反射鏡（每層厚度僅約7nm，對13.5nm波長具有約70%的反射率——這已是工程奇蹟，因為EUV會被幾乎所有材料強烈吸收）→將光罩上的圖案以4倍縮小投影到矽晶圓上。ASML是全球唯一能生產EUV光刻機的公司（每台EUV光刻機重約180噸、包含超過10萬個組件、價格約1.5–2億美元、需要40個集裝箱運輸）\n• 摩爾定律的現狀與未來：戈登·摩爾1965年預測晶片上的電晶體數量每約兩年翻一番——這一規律維持了約50年但近年明顯放緩（從3nm到2nm的進展比預期慢）。物理極限挑戰：量子隧穿效應（當電晶體柵極縮小到幾個原子厚度時，電子可以直接「隧穿」通過柵極絕緣層→漏電流增加→功耗和發熱失控）。未來方向：1）3D堆疊晶片（垂直集成而非僅橫向縮小——如AMD的3D V-Cache技術）；2）新材料（二維材料如石墨烯和過渡金屬硫化物、自旋電子學）；3）新架構（神經形態計算——模仿人腦的脈衝神經網絡、光子計算——以光子而非電子進行計算）"},{"id":"ic2","title":"人工智能產業","content":"2012年深度學習爆發——AlexNet在ImageNet大賽大幅領先奪冠。Transformer架構（2017年）革命性改變NLP，催生GPT系列。2022年11月ChatGPT發布被譽為「AI的iPhone時刻」。當前AI前沿：通用人工智能（AGI——能完成任何人類能完成的智能任務的AI系統，何時實現仍存在激烈辯論）、多模態AI（同時處理文本/圖像/音頻/視頻）、AI Agent（能自主規劃和執行複雜任務的智能體）。歐盟AI Act（2024年）是全球首部全面監管AI的法律——按風險等級分類管理，禁止社會信用評分等不可接受風險的應用。\n\n• 大語言模型（LLM）的訓練三階段：1）預訓練（Pre-training——在海量文本語料（數萬億token）上進行自監督學習，使用下一個token預測任務（Causal Language Modeling），學習語言的統計規律和世界知識——GPT-4的訓練成本據估計約1億美元，使用約25000個A100 GPU訓練數月）；2）監督微調（Supervised Fine-Tuning SFT——使用高質量的人工標註對話數據（數萬至數十萬條）對預訓練模型進行指令微調，使其學會遵循人類指令）；3）人類反饋強化學習（RLHF——Reinforcement Learning from Human Feedback——人類標註者對模型的多個輸出進行偏好排序→訓練獎勵模型（Reward Model）來預測人類偏好→使用PPO（Proximal Policy Optimization）強化學習算法優化語言模型使其生成人類更偏好的輸出）\n• AI Agent（智能體）的四項核心能力：1）規劃（Planning——將複雜任務分解為子任務並制定執行步驟，如「規劃一個三天的紐約旅行」→分解為查詢航班、酒店、景點、天氣等子任務）；2）工具使用（Tool Use——調用外部API和工具，如搜索引擎、計算器、代碼解釋器、數據庫查詢等，以獲取模型訓練數據中不包含的實時或專業信息）；3）記憶（Memory——短期記憶（當前對話的上下文窗口）和長期記憶（跨會話的外部存儲，如向量數據庫））；4）反思（Reflection——對自己的輸出進行自我評估和修正，如「我剛才生成的代碼是否有語法錯誤？能否優化？」）"}]},{"id":"real-estate","title":"地產及建築業","category":"industry","description":"房地產開發、建築工程與城市規劃","icon":"🏢","sections":[{"id":"re1","title":"房地產市場","content":"房地產是全球最大的資產類別之一（全球住宅房地產總值2022年約為379.7萬億美元）。市場分為住宅、商業（辦公樓、零售物業）、工業（倉庫、物流中心、數據中心）等類型。中國房地產市場經歷二十多年高速增長後自2021年進入深度調整——恆大（總負債約3000億美元）的債務危機引發全球關注。2008年全球金融危機的導火索——美國次貸危機——深刻揭示了房地產泡沫對整個金融系統的破壞性。房地產金融工具（REITs房地產投資信託、MBS抵押貸款支持證券）是連接房地產和資本市場的關鍵機制。"},{"id":"re2","title":"建築與城市規劃","content":"現代建築的四位大師：萊特（有機建築——流水別墅）、柯比意（現代主義——「住宅是居住的機器」、馬賽公寓）、密斯·凡德羅（「少即是多」——玻璃和鋼的極簡主義）、蓋瑞（解構主義——畢爾巴鄂古根漢美術館）。超高層建築競賽：從帝國大廈（1931年，381米）到哈里發塔（2010年，828米，迪拜）。智慧城市概念：以物聯網傳感器、大數據分析和AI優化交通、能源、廢物處理和公共安全——新加坡、巴塞隆納和哥本哈根是領先實踐者。可持續建築：被動式設計（自然通風、充足日光、隔熱）、綠色建築認證（LEED、BREEAM）、淨零能耗建築。"}]}]},{"id":"countries","title":"國家概況","icon":"🌏","color":"#4C1D95","description":"按美洲、歐洲、亞洲三大地理區域——深入了解各國政治、經濟與文化","topics":[{"id":"asia","title":"亞洲","category":"countries","description":"東亞、東南亞與南亞——全球最具經濟活力的地區","icon":"🏯","sections":[{"id":"asia-china","title":"中國","content":"世界第二大經濟體（名義GDP），五千年文明古國的現代化進程。單一制社會主義共和國，人民代表大會制度，中共領導下的多黨合作和政治協商制度。改革開放（1978年至今）：安徽小崗村包產到戶→深圳等經濟特區→1992年社會主義市場經濟→2001年加入WTO→2010年超越日本成為第二大經濟體，超過8億人擺脫貧困。當前挑戰：人口老齡化（2022年首次人口負增長）、房地產市場調整、核心技術自主創新（半導體）。文化：儒釋道三教合一、漢字（3500年連續歷史）、八大菜系（川粵蘇閩浙湘徽魯）。\n\n• 中國經濟的關鍵數據（2023–2024）：名義GDP約17.7萬億美元（全球第二）、人均GDP約1.25萬美元、GDP增長率約5.2%（2023年）、三次產業結構——第一產業（農業）約7%、第二產業（工業和建築）約39%、第三產業（服務業）約54%\n• 中國人口趨勢：2022年首次出現人口負增長（出生率約6.77‰、死亡率約7.37‰），2023年繼續下降；60歲以上人口約2.97億（佔總人口約21%），預計2035年將突破4億——快速老齡化是未來最大的社會經濟挑戰之一\n• 中國的高鐵網絡：截至2024年運營里程超過4.5萬公里（全球第一，佔全球約三分之二），最高運營時速350公里/小時（京滬高鐵全長1318公里最快4小時18分鐘），「八縱八橫」主骨架已基本建成"},{"id":"asia-japan","title":"日本","content":"君主立憲制議會民主，天皇為國家象徵。戰後經濟奇蹟（1950–1973年GDP年均約9.5%）從廢墟中崛起為全球第二大經濟體。泡沫經濟1991年破裂後「失落的三十年」。65歲以上佔比超29%（全球最高之一），中位數年齡約49歲。汽車製造、電子產品和精密機械聞名於世。文化：茶道花道書道歌舞伎→動漫漫畫J-Pop任天堂吉卜力（宮崎駿）。和平憲法第九條放棄以武力解決國際爭端。\n\n• 日本經濟的結構性特徵：GDP約4.2萬億美元（全球第三，2023年被德國超越成為第四）、政府債務約GDP的260%（全球最高之一，但大部分由日本國內投資者持有）、長期通貨緊縮壓力（日本央行長期維持負利率和量化寬鬆——安倍經濟學的「三支箭」：大膽的貨幣寬鬆、靈活的財政政策、結構性改革）\n• 日本社會老齡化的極端數據：65歲以上人口佔比約29.3%（2023年，全球最高之一）、中位數年齡約49歲、總人口自2008年峰值（約1.28億）持續下降至約1.24億（2023年）、部分鄉村地區老齡化率超過50%——日本是「超老齡化社會」的全球先驅和實驗場\n• 日本文化的全球影響力：動漫產業年產值約2.7萬億日元（約180億美元）、全球約60%的動畫節目產自日本；全球約有130個國家和地區的超過400萬人在學習日語（日本國際交流基金會2021年調查）；日本料理（和食）於2013年被聯合國教科文組織列入非物質文化遺產"},{"id":"asia-korea","title":"韓國（大韓民國）","content":"總統制共和國，首都首爾（首都圈約2600萬人，佔全國人口約一半）。「漢江奇蹟」——從1960年代全球最貧困國家之一（人均GDP低於迦納）轉變為全球第10大經濟體和科技強國。四大財閥（三星、現代、SK、LG）主導經濟。韓流K-Wave席捲全球：韓劇（《魷魚遊戲》）到K-Pop（BTS、BLACKPINK）。南北韓分裂——北緯38度線DMZ非軍事區，技術上仍處戰爭狀態（1953年停戰協定無和平條約）。\n\n• 韓國的「漢江奇蹟」數據：人均GDP從1953年約67美元（低於當時的迦納和菲律賓）增長至2023年約3.3萬美元（全球第12大經濟體），僅用了兩代人的時間——從接受美國援助的戰後廢墟到OECD成員國和發展援助的捐助國\n• 韓國四大財閥（Chaebol）的經濟支配力：三星（Samsung——2023年營收約2.6萬億美元、業務涵蓋電子、重工、金融、生物醫藥等）、現代（Hyundai——汽車和重工，起亞為其子公司）、SK（SK Group——能源、化工、半導體SK Hynix為全球第二大存儲晶片製造商）、LG（LG——電子、化學、通訊）——四大財閥合計約佔韓國GDP的50%以上\n• 韓流（Hallyu/K-Wave）的經濟價值：2022年韓國文化內容產業出口額約124億美元（包括遊戲、音樂、影視、出版等），BTS（防彈少年團）單獨對韓國GDP的貢獻估計約50億美元（佔韓國GDP約0.3%）——韓流已從文化現象演變為韓國最重要的軟實力工具和經濟增長引擎"},{"id":"asia-taiwan","title":"台灣","content":"西太平洋島嶼，面積3.6萬平方公里，人口約2340萬。中華民國自1912年成立，1949年後實際管轄台澎金馬。總統制民主體制（1996年首次總統直選），活躍多黨政治。全球半導體供應鏈關鍵節點——台積電（TSMC）掌握全球約90%先進製程晶圓代工市場，是全球最具戰略重要性公司之一。鴻海/富士康為全球最大電子代工製造商。文化：夜市文化、珍珠奶茶（1980年代起源於台中）、華語流行音樂（周杰倫等）。\n\n• 台灣的半導體生態系統：台積電（TSMC）掌握全球約90%的先進製程（7nm及以下）晶圓代工市場——2023年營收約2.16萬億新台幣（約690億美元）、市值約5000–6000億美元（全球前十大公司之一）。台積電的商業模式——純晶圓代工（Pure-Play Foundry）：只為客戶製造晶片、不設計自己的晶片→不與客戶競爭→客戶（蘋果、NVIDIA、AMD、高通等）放心將最先進的設計交給台積電生產。台灣的半導體生態還包括：聯發科（MediaTek——全球第二大手機晶片設計公司，僅次於高通）、日月光（ASE——全球最大的半導體封裝和測試公司）、聯華電子（UMC——全球第三大晶圓代工廠）\n• 台灣的政治體制演變：1949年中華民國政府遷至台灣→1949–1987年戒嚴時期（長達38年的戒嚴是世界最長之一）→1987年解除戒嚴→1996年首次總統直選（李登輝當選）→2000年首次政黨輪替（民進黨陳水扁當選）→2008年二次政黨輪替（國民黨馬英九當選）→2016年三次政黨輪替（民進黨蔡英文當選）→2024年民進黨賴清德當選"},{"id":"asia-hongkong","title":"香港","content":"中華人民共和國特別行政區（1997年回歸，「一國兩制」），面積約1106平方公里，人口750萬。1842–1997年英國殖民地。全球三大金融中心之一（紐倫港——與紐約、倫敦並列全球金融中心指數前三）、全球最大離岸���民幣業務中心。低稅率、自由貿易、普通法獨立司法體系。1842年《南京條約》割讓香港島。維港夜景為世界三大夜景之一，天星小輪和叮叮車（1904年開始運行）為城市標誌。\n\n• 香港的金融中心地位：全球三大金融中心之一（紐倫港——與紐約和倫敦並列全球金融中心指數GFCI前三）。香港交易所（HKEX）是全球主要的IPO市場之一（多次蟬聯全球IPO集資額第一）。香港是全球最大離岸人民幣業務中心（處理約75%的全球離岸人民幣支付）。聯繫匯率制度——自1983年起港元與美元掛鉤（1美元=7.75–7.85港元），由香港金融管理局（HKMA）通過貨幣發行局制度維持\n• 香港的文化特色：1）茶餐廳文化——中西融合的平民飲食文化（絲襪奶茶、菠蘿油、蛋撻、叉燒飯），2014年被列入香港非物質文化遺產；2）霓虹燈招牌——曾是香港城市景觀的標誌，近年因安全條例大量拆除但仍是香港賽博朋克美學的核心元素；3）廣東歌（Cantopop）——1970–1990年代的黃金時代（許冠傑、張國榮、梅豔芳、Beyond），是全球華人流行文化的重要組成部分"},{"id":"asia-india","title":"印度","content":"聯邦制議會民主共和國，2023年超越中國成為世界人口第一大國（約14.4億人）。全球第五大經濟體和增長最快的主要經濟體之一。IT和軟件服務業最具國際競爭力（班加羅爾為「印度矽谷」——Infosys、TCS等為全球最大IT外包服務公司）。製藥業「世界藥房」——仿製藥產量全球領先，供應約60%的全球疫苗。太空計劃ISRO：2014年火星探測（成本僅約7400萬美元）、2023年成功登陸月球南極。22種官方語言、數百種方言。挑戰：基礎設施不足、貧富差距、空氣污染、性別不平等。\n\n• 印度的多樣性數據：22種官方語言（包括印地語Hindi約41%人口、孟加拉語Bengali、泰盧固語Telugu、馬拉地語Marathi、泰米爾語Tamil等）和數百種方言。宗教構成：印度教約80%、伊斯蘭教約14%（印度是全球第三大穆斯林人口國家，僅次於印尼和巴基斯坦）、基督教約2.3%、錫克教約1.7%、佛教約0.7%、耆那教約0.4%\n• 印度的經濟結構轉型：服務業約佔GDP的55%（IT和業務流程外包BPO是核心競爭力——班加羅爾、海德拉巴、浦那為主要IT中心），工業約佔25%，農業約佔20%（但農業仍僱用約42%的勞動力）。印度的「數字公共基礎設施」（Digital Public Infrastructure）——Aadhaar生物識別身份系統（覆蓋約13.5億人，全球最大的生物識別數據庫）、統一支付接口（UPI——月交易量超過100億筆，即時手機支付系統）被視為發展中國家數位轉型的典範"},{"id":"asia-sea","title":"東南亞國家","content":"東協核心成員國，全球最具經濟增長潛力的地區之一。","subs":[{"id":"sea-vietnam","title":"越南","content":"社會主義共和國，首都河內。1986年革新開放（Đổi Mới）後經濟快速增長——三星約一半智能手機在此組裝。年輕人口結構（中位數年齡約31歲），China+1策略的主要受益者。\n\n• 越南經濟的關鍵數據：2023年GDP約4300億美元（東南亞第五大經濟體），人均GDP約4300美元。1986年革新開放（Đổi Mới）以來經濟年均增長約6–7%。三星約一半的智能手機在越南組裝（北寧省和太原省的工廠），三星越南的出口額一度約佔越南總出口的20%——越南是「China+1」策略的最大受益者之一\n• 越戰（1955–1975）的遺產：約300萬越南人死亡（包括約200萬平民）、大量土地被橙劑（Agent Orange——美軍使用的落葉劑，含有二噁英Dioxin）污染至今仍在影響新生兒健康。1975年4月30日西貢陷落（越南稱「解放日」），越南統一為社會主義共和國"},{"id":"sea-thailand","title":"泰國","content":"君主立憲制，唯一未被歐洲殖民的東南亞國家。曼谷連續多年為全球接待國際遊客最多城市。以佛教文化（約95%人口信奉上座部佛教）、泰式按摩、泰拳和泰國料理（冬蔭功湯、綠咖哩）全球聞名。\n\n• 泰國旅遊業的經濟地位：疫情前（2019年）接待國際遊客約3980萬人次（全球第8位），旅遊業約佔GDP的18–20%。曼谷連續多年為全球接待國際遊客最多的城市（Mastercard全球目的地城市指數）。主要旅遊目的地：曼谷（大皇宮、臥佛寺、水上市場）、清邁（古城和寺廟、大象保護區）、普吉島和蘇梅島（海灘度假）、芭堤雅、大城府（世界文化遺產）\n• 泰國的君主制：卻克里王朝（Chakri Dynasty）自1782年延續至今，現任國王為拉瑪十世（瑪哈·哇集拉隆功，2016年即位）。泰國有嚴格的「冒犯君主罪」（Lèse-majesté法律——詆毀國王、王后或王室繼承人最高可判15年監禁），是當今世界上最嚴格的保護君主名譽的法律之一"},{"id":"sea-indonesia","title":"印度尼西亞","content":"世界最大群島國家（超17000島嶼）、最大穆斯林人口國家（約87%）。東南亞最大經濟體和G20成員國。全球最大鎳生產國之一（電動車電池關鍵原料）、最大動力煤出口國。旅遊勝地峇里島。首都正從雅加達遷往努山塔拉。"},{"id":"sea-malaysia","title":"馬來西亞","content":"聯邦制君主立憲國家。經濟從橡膠和錫礦轉向電子製造和服務業。雙子塔（452米，1998–2004年世界最高建築）為現代化標誌。多元種族：馬來人約70%、華裔約23%、印度裔約7%。"},{"id":"sea-philippines","title":"菲律賓","content":"約7641島嶼，亞洲最大天主教國家（約80%信奉天主教）。海外勞工匯款年超300億美元（約佔GDP10%）。英語普及率高，全球業務流程外包BPO行業中心之一。南中國海領土爭端為主要外交安全議題。"},{"id":"sea-singapore","title":"新加坡","content":"城邦，面積僅728.6平方公里。1965年被逐出馬來西亞被迫獨立。李光耀領導下從貧困漁村轉變為全球金融中心和航運樞紐——「新加坡奇蹟」。公積金CPF使約80%國民居住並擁有政府組屋。嚴格法治、極低腐敗率。"},{"id":"sea-cambodia","title":"柬埔寨","content":"君主立憲制，首都金邊。吳哥窟（12世紀世界最大宗教建築群）為世界文化遺產。1975–1979年紅色高棉統治造成約170–200萬人死亡（約佔當時人口四分之一）。經濟快速增長（年均約7%），以紡織成衣業和旅遊業為支柱。"}]}]},{"id":"europe","title":"歐洲","category":"countries","description":"從工業革命發源地到歐盟一體化——塑造現代世界的核心力量","icon":"🏰","sections":[{"id":"eu-germany","title":"德國","content":"聯邦制議會共和國，歐洲最大經濟體和全球第四大經濟體。德國模式三大支柱：強大製造業（汽車——福斯/BMW/賓士；化工——巴斯夫）、職業教育雙元制（學徒制度被認為是工業競爭力的秘密武器之一）、中小企業Mittelstand（「隱形冠軍」——在細分市場中全球領先的高度專業化家族企業）。能源轉型Energiewende——計劃2045年碳中和，2023年已關閉最後三座核電站。誕生了康德、黑格爾、尼采、歌德、巴赫、貝多芬等文化巨人。啤酒文化（慕尼黑啤酒節）和聖誕市場世界聞名。\n\n• 德國製造業的核心競爭力——「隱形冠軍」（Hidden Champions）：約有1300–1500家德國中小企業在全球特定利基市場中排名前三但公眾知名度極低。例如：Trodat（全球最大的印章製造商，約70%全球市場份額）、Jungbunzlauer（檸檬酸等生物基配料全球領先）、Koenig & Bauer（全球最古老的印刷機製造商，創立於1817年）——隱形冠軍通常為家族企業、高度專注於極窄的技術領域、持續投入研發、全球化銷售\n• 德國的能源轉型（Energiewende）路線圖：2011年福島核事故後梅克爾宣布2022年前關閉所有核電站（最終推遲至2023年4月）→可再生能源佔發電量比例從2000年的約6%提升至2023年的約52%→目標2045年實現碳中和。挑戰：1）可再生能源的間歇性（無風和陰天時需要備用電源）→天然氣發電站作為過渡方案→2022年俄烏戰爭後天然氣供應危機暴露了能源安全脆弱性；2）輸電網瓶頸（風力發電主要集中在北部、用電大戶在南部→南北輸電線路建設因居民反對而嚴重滯後）"},{"id":"eu-uk","title":"英國","content":"君主立憲制議會民主。君主（國王查爾斯三世）為國家元首。沒有成文憲法——由法律、慣例和司法判決構成。2020年正式脫歐（Brexit）結束47年歐盟成員國身分。全球第六大經濟體，倫敦與紐約並列兩大金融中心。文化軟實力極其強大：英語為全球通用語言、BBC、英超、披頭四到Adele的音樂影響全球。牛津、劍橋等頂尖大學在科研和高等教育實力雄厚。\n\n• 英國脫歐（Brexit）時間線：2016年6月23日公投（51.9%支持脫歐 vs 48.1%支持留歐）→2017年3月正式啟動《里斯本條約》第50條（退出程序）→經歷多次延期和協議被否決→2020年1月31日正式脫歐→2020年12月24日達成《英歐貿易與合作協議》（TCA）——從公投到正式脫歐歷時約3.5年\n• 英國的構成國（Countries of the UK）：英格蘭（England——約佔總人口84%，首都倫敦）、蘇格蘭（Scotland——2014年獨立公投以55%反對未能通過，但2022年蘇格蘭民族黨推動二次公投）、威爾斯（Wales——擁有自己的議會Senedd Cymru，威爾斯語是官方語言之一）、北愛爾蘭（Northern Ireland——1968–1998年長達30年的「北愛爾蘭問題」The Troubles導致約3500人死亡，1998年《貝爾法斯特協議》Good Friday Agreement結束了大規模暴力衝突）"},{"id":"eu-france","title":"法國","content":"法蘭西第五共和國（1958年至今），半總統制——總統擁有實權。與德國並稱歐盟一體化「雙引擎」。全球第七大經濟體。約70%電力來自核能、空中巴士總部設於圖盧茲、LVMH集團（市值超4000億歐元為歐洲最大公司）。全球接待國際遊客最多的國家（疫情前年約9000萬）。羅浮宮（世界最大博物館）、凡爾賽宮、法國美食（2010年非物質文化遺產）、米其林指南。哲學傳統：笛卡兒、盧梭、伏爾泰、沙特、傅柯。\n\n• 法國的核能政策：約70%的電力來自核能（全球核電佔比最高的國家之一），共有56座核反應堆（僅次於美國的約93座）。法國發展核能的歷史背景：1973年石油危機後法國認識到能源獨立的重要性——「在法國，我們沒有石油，但我們有思想」（梅斯默計劃Messmer Plan，1974年宣布大規模建設核電站）\n• 法國的農業實力：歐盟最大的農業生產國（約佔歐盟農業產值的18%），全球第二大農產品出口國（僅次於美國）。法國以原產地名稱保護制度（AOC——Appellation d'Origine Contrôlée，1935年創立）嚴格保護地方特色產品的品質和聲譽——只有產自香檳區且符合嚴格釀造標準的氣泡酒才能被稱為「香檳」（Champagne）"},{"id":"eu-italy","title":"義大利","content":"議會制共和國，二戰以來近70屆政府更迭。全球第八大經濟體。北部經濟發達、南部相對落後——長期南北差距。法拉利、藍寶堅尼、瑪莎拉蒂代表汽車工業極致。時尚品牌Gucci、Prada、Armani享譽全球。全球最多UNESCO世界遺產（59處）：羅馬競技場、佛羅倫斯烏菲茲美術館、威尼斯水城。梵蒂岡（世界最小國家）聖彼得大教堂。美食：披薩、義大利麵、Gelato冰淇淋、Espresso。\n\n• 義大利南北差距的歷史根源：義大利於1861年統一，此前北部（米蘭、威尼斯、佛羅倫斯）經歷了文藝復興和早期工業化的商業繁榮，而南部（那不勒斯王國和西西里王國）長期處於封建農業經濟。統一時北部的人均GDP約為南部的115–120%，到1911年差距擴大到約150%，至今北部（倫巴底、威尼托、艾米利亞-羅馬涅）的人均GDP仍為南部（卡拉布里亞、西西里、坎帕尼亞）的約1.8倍\n• 義大利美食的全球影響力：2017年那不勒斯披薩製作技藝（Pizzaiuolo）被聯合國教科文組織列入非物質文化遺產。義大利麵（Pasta）有超過350種不同的形狀（每種形狀與特定的醬汁搭配——長麵條Spaghetti適合番茄醬和Carbonara、管狀麵Penne適合厚重的肉醬Ragù、貝殼狀Conchiglie適合奶油醬）。Slow Food運動（1986年由卡洛·佩特里尼Carlo Petrini在義大利發起——反對速食文化、保護地方傳統食物和生物多樣性）已發展為全球性的食物運動"},{"id":"eu-russia","title":"俄羅斯","content":"聯邦制半總統制共和國。世界面積最大國家（約1709萬平方公里，橫跨11個時區）。聯合國安理會五常之一。高度依賴自然資源出口——石油天然氣和礦產約佔出口收入60%，擁有世界最大天然氣儲量。2022年對烏克蘭軍事行動引發冷戰以來西方最嚴厲經濟制裁。文化輝煌：普希金、托爾斯泰《戰爭與和平》、陀思妥耶夫斯基；柴可夫斯基音樂、波修瓦芭蕾。在太空技術和核能領域保持全球競爭力。\n\n• 俄羅斯的資源實力：擁有世界最大的天然氣儲量（約佔全球24%）、第二大煤炭儲量、第六大石油儲量。2022年俄烏戰爭前，俄羅斯是歐盟最大的天然氣供應國（約40%的歐盟天然氣來自俄羅斯）——2022年後歐盟急速削減對俄羅斯能源的依賴（從俄羅斯進口的天然氣佔比從約40%降至約8%）\n• 俄羅斯文學的「黃金時代」（19世紀）：普希金（1799–1837——「俄羅斯文學之父」，《葉甫蓋尼·奧涅金》以詩體小說形式創造了「多餘的人」原型）；托爾斯泰（1828–1910——《戰爭與和平》（1869年，約580個人物、跨越1805–1820年，被認為是世界文學最偉大的小說之一）和《安娜·卡列尼娜》（1877年，「幸福的家庭都是相似的，不幸的家庭各有各的不幸」）；陀思妥耶夫斯基（1821–1881——《罪與罰》（1866年）和《卡拉馬佐夫兄弟》（1880年），對人性深淵的探索影響了尼采、佛洛伊德和存在主義哲學）"}]},{"id":"americas","title":"美洲","category":"countries","description":"從北美超級大國到南美新興經濟體——西半球的多元力量","icon":"🗽","sections":[{"id":"am-usa","title":"美國","content":"聯邦制總統制共和國，1787年憲法為世界最古老仍運行的成文憲法。三權分立：總統（行政+三軍總司令）、國會（參議院100席+眾議院435席）、最高法院（9名終身大法官）。選舉人團制度（538票，贏者通吃）使候選人可能贏普選票卻輸選舉（2000年戈爾、2016年希拉蕊）。全球最大經濟體（名義GDP約27萬億美元）。矽谷為全球技術創新中心——史丹佛大學、紅杉資本等風投集中地、加州不執行競業限制促進人才流動。美元為世界主要儲備貨幣（約佔全球外匯儲備59%）。華爾街為全球最重要金融中心。全球排名前100大學中約30所在美國，諾貝爾獎獲得者約400人。\n\n• 美國的聯邦制結構：50個州+1個聯邦特區（華盛頓DC）+5個主要海外領地。聯邦政府和州政府之間的權力劃分——聯邦權力（憲法第一條第八款列舉的權力：宣戰、鑄幣、管理州際和國際貿易、建立郵政、頒發專利等）vs 州權力（第十修正案——憲法未授予聯邦也未禁止各州行使的權力保留給各州和人民，包括教育、警察、公共衛生、婚姻和家庭法等）\n• 矽谷生態系統的關鍵要素：1）頂尖研究型大學（史丹佛大學——直接促生了惠普、思科、谷歌、雅虎等公司；UC Berkeley——半導體和開源軟件的搖籃）；2）風險投資集中（沙丘路Sand Hill Road——全球風險投資最集中的一條街，紅杉資本Sequoia、凱鵬華盈Kleiner Perkins等頂級VC聚集）；3）人才自由流動（加州法律不執行競業限制Non-compete條款——員工可以自由跳槽甚至創立競爭公司，促進了知識溢出和創新）；4）失敗容忍文化（創業失敗不被污名化——「快速失敗、快速學習」的理念鼓勵風險承擔）\n• 美元作為全球儲備貨幣的特權和代價：約59%的全球外匯儲備以美元持有、約88%的全球外匯交易涉及美元、大多數大宗商品（石油、黃金、糧食）以美元計價——這使得美國可以以本國貨幣借貸（不需擔心貨幣錯配）、在危機時可以通過印鈔來緩解壓力（「囂張的特權」——法國財政部長德斯坦語）。代價：全球對美元資產的強勁需求推高美元匯率→美國出口競爭力下降→製造業就業流失（「美元過度高估」問題）；作為全球儲備貨幣發行國，美國的貨幣政策具有巨大的國際溢出效應（美聯儲加息→全球資本回流美國→新興市場貨幣貶值和債務危機風險上升）\",\n  },\n\n  // ═══════════ 生活品味 ═══════════\n  'w1': \"\n• 波爾多1855年分級的背景和影響：1855年巴黎世界博覽會前夕，拿破崙三世要求波爾多商會提供一份酒莊分級名單→波爾多葡萄酒經紀人根據當時酒莊的長期市場價格（反映了品質聲譽）將梅多克（Médoc）和格拉夫（Graves）的紅酒分為五個等級（一級至五級）、蘇玳（Sauternes）和巴薩克（Barsac）的甜白酒分為三個等級——這份臨時的展覽名單至今仍是全球葡萄酒市場最重要的定價參考。1973年木桐酒莊（Château Mouton Rothschild）在菲利普·羅斯柴爾德男爵長達數十年的遊說下從二級升為一級——這是分級設立170年來唯一一次級別調整\n• 布根地風土（Terroir/Climat）體系的獨特之處：布根地的分級以葡萄園地塊（Climat）而非酒莊為單位——同一塊特級園（Grand Cru）可能由數十家不同的酒莊共同擁有。33個特級園僅佔布根地葡萄園面積約2%卻生產了最昂貴的葡萄酒。2015年布根地的「Climat」被聯合國教科文組織列入世界文化遺產——這是對人類與自然千年互動形成的獨特農業文化景觀的認可\n• 葡萄酒品鑑的常見風味描述詞彙體系：水果（紅酒——黑醋栗、黑莓、櫻桃、李子、草莓；白酒——檸檬、青蘋果、梨、菠蘿、百香果）、花卉（紫羅蘭、玫瑰、金合歡、橙花）、香料（黑胡椒、肉桂、丁香、甘草、香草——後者通常來自橡木桶）、植物和礦物（青椒、薄荷、尤加利、打火石、濕石頭）、陳年風味（蘑菇、松露、皮革、煙草、雪松、蜂蜜、焦糖、汽油（陳年麗絲玲的典型特徵））\",\n\n  'w2': \"\n• WSET系統品鑑法（SAT Level 3）的詳細步驟：1）外觀（Appearance）——澄清度（清澈/渾濁）、色調強度（淺/中/深）、顏色（白酒：檸檬綠→金黃→琥珀→棕色；紅酒：紫紅→寶石紅→石榴紅→磚紅→棕色；粉紅酒：粉紅→橙粉→洋蔥皮色）；2）香氣（Nose）——乾淨度（乾淨/有缺陷（軟木塞污染TCA——濕紙板和霉味、氧化——雪莉酒樣氣味、揮發酸——醋味））、香氣強度（輕/中/濃）、香氣特徵（一類香氣（品種香——果香花香草本）、二類香氣（釀造香——橡木（香草烤麵包煙燻）、蘋果酸乳酸發酵（黃油奶油）、酒泥接觸（餅乾麵團））、三類香氣（陳年香——有意氧化（堅果焦糖）、瓶中陳年（蘑菇皮革蜂蜜汽油）））；3）味覺（Palate）——甜度（乾/半乾/半甜/甜）、酸度（低/中/高——使人流口水的程度）、單寧（低/中/高——澀感、質地是粗糙還是細膩如天鵝絨）、酒精度（低<11%/中11–13.9%/高≥14%）、酒體（輕盈/中等/豐滿——口中重量感）、風味強度和特徵（與香氣對應）、餘味長度（短/中/長——優質葡萄酒的餘味通常長於15秒）；4）結論——品質評估（有缺陷/差/可接受/好/很好/卓越——平衡性、餘味長度、風味強度和複雜性是關鍵指標）、適飲期評估（適合現在飲用/有陳年潛力/已過巔峰/太年輕）\",\n\n  'w3': \"\n• 威士忌的釀造流程五步驟：1）發芽（Malting——將大麥浸泡在水中使其發芽→產生澱粉酶將澱粉轉化為可發酵糖→以泥煤（Peat）或熱風烘乾停止發芽——使用泥煤烘乾的麥芽賦予蘇格蘭艾雷島威士忌標誌性的煙燻和藥水味）；2）糖化（Mashing——將研磨後的麥芽粉與熱水在糖化槽Mash Tun中混合→澱粉酶將澱粉轉化為可發酵糖→得到含糖液體「麥芽汁」Wort）；3）發酵（Fermentation——在發酵槽Washback中加入酵母→酵母將糖轉化為酒精→約2–3天後得到約7–10%酒精度的「發酵液」Wash）；4）蒸餾（Distillation——蘇格蘭單一麥芽威士忌通常使用壺式蒸餾器Pot Still進行兩次蒸餾：第一次蒸餾Wash→約20–25%酒精度的「低度酒」Low Wines→第二次蒸餾→取中間餾分（「酒心」Heart，約68–72%酒精度）、棄去頭（Foreshots，含甲醇等有害物質）和尾（Feints，含雜醇油）——蒸餾器的形狀（天鵝頸的高度和角度）顯著影響最終酒液的風格（高天鵝頸→更多回流→更輕盈優雅；短天鵝頸→更厚重濃烈））；5）陳年（Maturation——在橡木桶中陳年至少三年（蘇格蘭法律要求），最常使用曾用於陳年波本威士忌的美國白橡木桶和曾用於陳年雪莉酒的歐洲橡木桶——橡木桶貢獻了威士忌約60–80%的最終風味和全部顏色）\n• 世界五大威士忌產區：1）蘇格蘭威士忌（Scotch——必須在蘇格蘭蒸餾和陳年至少三年，五大產區風格各異）；2）愛爾蘭威士忌（Irish Whiskey——通常三次蒸餾（比蘇格蘭的兩次更輕柔）、可以使用未發芽大麥——以獨特的壺式蒸餾Single Pot Still威士忌聞名）；3）美國波本威士忌（Bourbon——必須使用至少51%的玉米、在新的燒烤過的美國白橡木桶中陳年、不添加任何顏色和風味——甜美的香草和焦糖風味）；4）加拿大威士忌（Canadian Whisky——通常以高比例玉米為基礎、輕盈順滑、常被稱為「棕色伏特加」——但近年優質黑麥威士忌的復興正在改變這一形象）；5）日本威士忌（Japanese Whisky——深受蘇格蘭傳統影響但發展出獨特的精緻和平衡風格，近年來山崎Yamazaki和響Hibiki在國際大賽中屢獲最高獎項）\",\n\n  't1': \"\n• 烏龍茶做青（搖青）工藝的生化原理：新鮮茶葉→萎凋（日光萎凋和室內萎凋，失去約20–30%水分，葉片變軟）→搖青（將茶葉放在竹篩中旋轉搖動→葉片邊緣相互碰撞摩擦→細胞破損→多酚氧化酶接觸兒茶素等多酚類物質→酶促氧化反應開始→葉片邊緣變紅（「綠葉紅鑲邊」的形成機理）→搖青和晾青交替進行4–6次、持續8–12小時→氧化程度控制在15–70%（輕發酵如包種茶→重發酵如鐵觀音和大紅袍）→殺青（高溫加熱終止酶活性、固定氧化程度）→揉捻→乾燥\n• 普洱茶的「越陳越香」科學原理：生普洱茶餅在適宜條件下（溫度約20–30°C、濕度約60–75%、通風、無異味）的長期儲存中發生三類變化：1）微生物後發酵（黑麴黴Aspergillus niger等有益微生物在茶葉中緩慢生長→分泌酶類分解茶葉中的大分子物質→產生新的風味物質）；2）化學氧化（茶多酚緩慢氧化聚合→茶湯苦澀感降低、醇厚度增加、顏色從黃綠轉為橙紅再轉為酒紅）；3）香氣轉化（從新茶的青草香和花香→經5–10年轉為果香和蜜香→經15–30年轉為樟香和藥香→經30年以上轉為陳香和參香）。優質古樹普洱茶在存放30–50年後可能價值數十萬甚至數百萬元人民幣一餅\n• 日本茶道（茶の湯）的完整流程：1）客人進入茶庭（露地Roji——象徵從世俗世界過渡到精神世界的路徑）→在手水缽清潔手口（身心淨化）→通過狹小的茶室入口（躙口Nijiriguchi——約70厘米見方，所有人無論身分高低都必須低頭彎腰進入，象徵平等和謙虛）；2）欣賞茶室中的掛軸（禪語或山水畫）和插花（茶花Chabana——簡單自然的花藝）→主人準備茶具→炭手前（添加木炭的儀式性動作）；3）懷石料理（輕食——非飽腹之餐而是為之後品茶做準備）；4）濃茶（Koicha——幾位客人共用一個茶碗、每人喝三口半後擦拭碗口遞給下一位——象徵共融和信任）；5）薄茶（Usucha——每人一碗、較為輕鬆的環節）；6）收拾和告別——整個過程約4小時，核心精神為千利休總結的「和敬清寂」\",\n\n  'co1': \"\n• 咖啡處理法（Processing Method）對風味的影響：1）日曬法（Natural/Dry Process——整顆咖啡果實直接曬乾（約2–4週）、果肉中的糖分和風味物質被豆子吸收→酒香、發酵味、莓果風味、醇厚度高——衣索比亞和巴西廣泛使用）；2）水洗法（Washed/Wet Process——去除果皮和果肉→在水中發酵12–36小時去除果膠層→清洗後曬乾→乾淨、明亮、酸度突出、風味純淨——哥倫比亞和中美洲主流）；3）蜜處理（Honey Process——去除果皮但保留部分或全部果膠層→帶膠曬乾→介於日曬和水洗之間，不同程度的果膠保留（黃蜜/紅蜜/黑蜜）對應不同程度的甜度和醇厚度——哥斯大黎加為代表）；4）厭氧發酵（Anaerobic Fermentation——在密閉無氧的不鏽鋼罐中進行控制發酵→獨特的熱帶水果和香料風味——近年精品咖啡的熱門趨勢）\n• 義式濃縮（Espresso）的萃取參數黃金標準：粉量（Dose）——單份約7–9克/雙份約14–18克；研磨度（Grind）——極細（比食鹽更細，約200–300微米）；水溫——約90–96°C（較淺烘焙需要較高溫度）；壓力——約9巴（大氣壓的9倍）；萃取時間——約25–30秒；萃取量——單份約25–30毫升/雙份約50–60毫升。萃取不足（Under-extraction——流速過快<20秒、顏色蒼白、酸澀）vs 過度萃取（Over-extraction——流速過慢>35秒、顏色深黑、苦澀焦味）——完美的Espresso應具有金黃色細膩持久的Crema（咖啡油脂泡沫）、平衡的酸甜苦和持久的餘韻\",\n\n  'co2': \"\n• 精品咖啡協會（SCA）的杯測評分系統：在10個維度上評分（每個維度6–10分，以0.25分為單位）：1）香氣（Fragrance/Aroma——乾香和濕香）；2）風味（Flavor——口腔中感知的主要味道）；3）餘韻（Aftertaste——吞嚥後留在口腔和喉嚨的風味持續時間和品質）；4）酸度（Acidity——明亮、活潑的酸質而非尖銳刺激的酸）；5）醇厚度（Body——口中的重量感和質感）；6）平衡度（Balance——各風味元素的和諧程度）；7）一致性（Uniformity——不同杯之間的風味一致性）；8）乾淨度（Clean Cup——無任何瑕疵和雜味）；9）甜度（Sweetness——天然的甜感而非添加糖）；10）總體評價（Overall）。總分≥80分為精品咖啡（Specialty Coffee）、≥85分為優秀、≥90分為卓越。杯測使用標準化沖煮參數：咖啡粉與水比例1:18、水溫93°C、浸泡4分鐘後破渣撈渣\n• 咖啡因的藥理學：咖啡因（C₈H₁₀N₄O₂）是中樞神經系統興奮劑——在肝臟被細胞色素P450酶（主要是CYP1A2）代謝，半衰期約3–5小時（因人而異，吸煙者代謝加快、孕婦和服用口服避孕藥者代謝減慢）。作用機制：咖啡因在結構上類似腺苷（Adenosine）→與大腦中的腺苷受體（A₁和A₂ₐ）競爭性結合→阻止腺苷的鎮靜和睡眠誘導作用→導致警覺性增加和疲勞感減輕。適量攝入（成人每日約300–400毫克，相當於約3–4杯咖啡）對健康人群是安全的，但過量可導致焦慮、失眠、心悸和消化不適\",\n\n  'f1a': \"\n• 可可·香奈兒的革命性設計理念：1）以黑色為優雅——1926年推出小黑裙（Little Black Dress），將原本僅用於喪服的黑色轉化為永恆優雅的象徵，《Vogue》將其比作「福特的T型車」——簡約、民主化、適合所有人；2）將男裝元素引入女裝——從情人的衣櫥中獲得靈感，以Jersey針織面料（此前僅用於男性內衣）製作舒適的女裝、以斜紋軟呢（Tweed，傳統蘇格蘭男裝面料）製作經典套裝；3）解放女性身體——廢除束腰（Corset）、提高裙擺（方便行走）、設計功能性口袋（此前女裝幾乎沒有口袋）；4）人造珠寶和服裝珠寶（Costume Jewelry）的推廣——將真寶石和假寶石混合佩戴以達到純粹的裝飾效果而非炫耀財富\n• 香奈兒N°5香水的傳奇故事：1921年可可·香奈兒委託調香師恩尼斯·鮑（Ernest Beaux）創造「聞起來像女人的香水，而不是像花束」。鮑提供了兩組樣品（第1–5號和第20–24號），香奈兒選擇了第5號樣品——據說因為她相信5是她的幸運數字。N°5是第一支大量使用合成醛（Aldehydes——脂肪族醛類化合物，賦予香水一種抽象的、類似香檳氣泡的明亮質感）的香水，徹底顛覆了當時香水必須模仿單一花香（玫瑰、茉莉、紫羅蘭等）的傳統——瑪麗蓮·夢露在被問到睡覺穿什麼時回答「只穿幾滴香奈兒N°5」\",\n\n  'f2': \"\n• 愛馬仕的標誌性皮革分類（按來源和特性）：1）Box小牛皮（Box Calf——表面光滑如鏡、硬挺有光澤、隨時間產生美麗的包漿Patina但極易刮傷）；2）Togo小牛皮（Togo Calf——柔軟、顆粒狀紋理、耐磨耐刮，是柏金包Birkin最受歡迎的皮革選擇）；3）Clemence小牛皮（Clemence Calf——比Togo更柔軟更垂墜、顆粒更大、適合較大尺寸的包袋）；4）Epsom小牛皮（Epsom Calf——壓紋牛皮、輕便、硬挺抗刮、價格較低——適合需要保持形狀的包款如凱莉包Kelly）；5）珍稀皮革——Porosus灣鱷（鱗片中央有氣孔——最昂貴和稀有）、Niloticus尼羅鱷（鱗片較大且均勻）、Alligator密西西比短吻鱷（鱗片較扁平）、蜥蜴皮（細小鱗片、僅用於小皮件）、鴕鳥皮（標誌性的毛囊凸起點——極其耐用和柔軟）\n• 路易威登Monogram帆布的技術秘密：1896年喬治·威登（路易·威登的兒子）為紀念去世的父親設計了Monogram圖案——交織的「LV」縮寫、花卉圖案（靈感來自日本紋樣）和四角星。Monogram帆布不是皮革，而是塗層帆布（Coated Canvas）——以棉布為基底、表面覆蓋多層PVC塗層→極其耐磨、防水、防刮、重量輕——這種材料選擇最初是為了防偽（比皮革更難仿造），卻意外創造了現代奢侈品中最為人知的圖案\",\n\n  'car1': \"\n• 勞斯萊斯幻影的極致工藝細節：車身漆面——5層手工噴塗（底漆→色漆→清漆→手工打磨→拋光），約45公斤油漆，耗時約7天完成，最終漆面深度和光澤是自動化噴塗無法達到的。皮革內飾——約8–10張阿爾卑斯山區高海拔牧場的公牛皮（高海拔=較少蚊蟲叮咬=幾乎無瑕疵），約18天鞣製和染色，全部手工切割和縫製。星光頂篷（Starlight Headliner）——工匠手工將約800–1600根光纖穿入皮革車頂內襯，可按照客戶指定的真實星空排列（如結婚日、生日當晚的星空）進行定制\n• 賓利（Bentley）與勞斯萊斯的關係演變：1919年沃爾特·歐文·賓利（W.O. Bentley）創立賓利汽車公司，以運動性能和勒芒24小時耐力賽的勝利（1924、1927、1928、1929、1930年五次奪冠）聞名。1931年賓利因經濟大蕭條破產，被勞斯萊斯收購→此後近70年賓利和勞斯萊斯共享技術平台（賓利定位為「運動版勞斯萊斯」）。1998年福斯集團（Volkswagen）收購賓利，BMW收購勞斯萊斯→兩個品牌從此完全分離，賓利回歸運動奢華的定位，勞斯萊斯繼續極致奢華路線\",\n\n  'car2': \"\n• 法拉利F1車隊的傳奇地位：法拉利是唯一參加了F1世界錦標賽自1950年創立以來全部賽季的車隊，獲得過16次車隊冠軍和15次車手冠軍（截至2024年）。法拉利的F1精神——恩佐·法拉利曾說「空氣動力學是為不會造引擎的人準備的」，反映了法拉利對引擎（特別是V12自然進氣引擎）的執著。法拉利F1的忠實全球粉絲群體——Tifosi（義大利語「狂熱粉絲」），在蒙扎賽道（義大利大獎賽）形成紅色海洋的景象是F1最壯觀的場面之一\n• 藍寶堅尼的標誌性車型演變：Miura（1966–1973——被認為是現代超級跑車的鼻祖，中置引擎、極低車身、橫向V12引擎）；Countach（1974–1990——以極具未來感的楔形設計和標誌性的鍘刀門Scissor Doors定義了1970–80年代的超跑美學，其名字Countach是義大利皮埃蒙特方言中的驚嘆詞——據說Nuccio Bertone（設計師）第一次看到原型車時脫口而出）；Aventador（2011–2022——標誌性V12自然進氣引擎、鍘刀門、成為全球最暢銷的V12超跑之一）；Revuelto（2023年推出——藍寶堅尼首款插電式混合動力V12超跑，標誌著品牌向電氣化的轉型）\",\n\n  'wa1': \"\n• 陀飛輪的技術細節：寶璣（Abraham-Louis Breguet）於1801年6月26日獲得陀飛輪專利。陀飛輪將整個擒縱機構（擒縱輪、擒縱叉、擺輪、遊絲）放置在一個不斷旋轉的框架中（通常每分鐘旋轉一圈），以抵消地心引力對擺輪和遊絲的誤差——當擒縱機構處於不同方位時，地心引力會使擺輪的重心偏移導致計時誤差，陀飛輪通過持續旋轉使方位誤差在一個週期內相互抵消。一個典型陀飛輪框架包含約40–70個組件，總重量不到1克，製作要求極高的微機械工藝——在20世紀初手錶普及後陀飛輪在實用上已非必要（腕錶佩戴在手腕上會不斷變換方位，自然抵消了引力誤差），但作為高級製錶工藝的終極展示，陀飛輪至今仍是最高級別複雜功能的象徵\n• 三問報時（Minute Repeater）的聲學藝術：推動滑桿後，機芯中的微型音錘（Hammers）敲擊環繞機芯的圓形音簧（Gongs）發出聲音——低音（通常由一個音錘敲擊較厚較長的音簧）代表小時、高-低交替音（兩個音錘交替敲擊兩個音簧）代表刻鐘（每15分鐘）、高音（另一個音錘敲擊較薄較短的音簧）代表分鐘。報時範例：2點49分→「叮-叮」（兩個低音=2小時）+「叮噹-叮噹-叮噹」（三次高低交替=3刻鐘=45分鐘）+「噹-噹-噹-噹」（四個高音=4分鐘）=2點49分。三問腕錶的聲學品質取決於音簧的材料（通常為特殊合金鋼）、長度、厚度、硬度、與錶殼的連接方式（音簧必須牢固固定在錶殼上以利用錶殼作為共振腔放大聲音）和音錘的大小和形狀——百達翡麗每一枚三問腕錶出廠前必須由總裁親自試聽確認音質\",\n\n  'wa2': \"\n• 百達翡麗的「十大價值」（Ten Values）：1996年百達翡麗發布的品牌廣告中提出了十條價值觀，其中最著名的是：「你並非完全擁有一枚百達翡麗，你只是替下一代保管它」（You never actually own a Patek Philippe. You merely look after it for the next generation.）。其他核心價值包括：獨立性（自1932年以來由斯登家族私有經營——是日內瓦最後一個仍由創始家族控制的主要製錶品牌）、創新（擁有超過100項專利，包括年曆機制、矽擒縱等）、傳統手工藝（每個零件——包括看不見的內部零件——都經過精細手工打磨修飾：倒角Anglage、日內瓦波紋Côtes de Genève、圓形打磨Perlage和黑色拋光Black Polish）——百達翡麗日內瓦印記（PP Seal，自2009年取代日內瓦印記）是業界最嚴格的品質標準之一，涵蓋整枚腕錶（而非僅機芯）的精度、工藝和可靠性\n• 愛彼皇家橡樹（Royal Oak）的革命性故事：1971年義大利經銷商向愛彼發出緊急請求——需要一款「前所未有的奢華不鏽鋼運動腕錶」在第二天早上之前交付設計稿。傳奇設計師杰拉德·尊達（Gérald Genta，還設計了百達翡麗的鸚鵡螺Nautilus和萬國工程師IWC Ingenieur）在一天內完成了設計——靈感來自老式潛水頭盔的八角形舷窗和暴露在外的螺絲（八顆六角形白金螺絲貫穿錶圈）。1972年皇家橡樹發布時的定價約3300瑞士法郎（比許多金錶還貴、是勞力士Submariner的約3–4倍），在當時引發了巨大爭議——不鏽鋼怎麼能賣得比金錶貴？但皇家橡樹以極致的工藝（錶圈和錶殼的精細拉絲和拋光交替處理——需要數十道手工工序）證明了奢華不在於材料價格而在於工藝水平——這一理念從此改變了整個高級製錶行業的產品格局\",\n\n  'jw1': \"\n• 鑽石的4C分級體系（GIA美國寶石學院創立）：1）克拉重量（Carat Weight——1克拉=0.2克=100分。注意：克拉重量與直徑不是線性關係——1克拉圓形鑽石直徑約6.5毫米、2克拉約8.2毫米而非13毫米）；2）淨度（Clarity——在10倍放大鏡下評估內含物Inclusions和外部特徵Blemishes：FL/IF（無瑕/內部無瑕）→VVS1/VVS2（極微瑕——專家在10倍放大鏡下極難發現）→VS1/VS2（微瑕——10倍放大鏡下較難發現）→SI1/SI2（小瑕——10倍放大鏡下容易發現，但肉眼通常看不見）→I1/I2/I3（有瑕——肉眼可見的瑕疵，影響亮度和透明度））；3）顏色（Color——從D（完全無色——最稀有和最昂貴）到Z（明顯的黃色或褐色）。D-E-F為無色級、G-H-I-J為近無色級——H色以上的鑽石在大多數鑲嵌中肉眼看來是無色的）；4）切工（Cut——決定了鑽石的亮度和火彩：比例（Proportion——桌面大小、冠部角度、亭部深度是否在理想範圍內）、對稱性（Symmetry——刻面是否均勻對稱）和拋光（Polish——表面是否光滑）。切工是4C中唯一受人為控制的因素，也是對鑽石美觀度影響最大的因素——一顆完美切工的鑽石可以讓光線從冠部進入後在內部全內反射後從冠部返回觀察者眼中（亮度和火彩），而切工不佳的鑽石會讓光線從亭部洩漏導致暗淡無光）\n• 彩色寶石的「三大寶石」：紅寶石（Ruby——剛玉家族、紅色來自鉻元素Cr³⁺、最珍稀的「鴿血紅」Pigeon\\'s Blood產自緬甸抹谷Mogok——在紫外線下發出強烈的紅色螢光使其在陽光下彷彿內部燃燒）、藍寶石（Sapphire——剛玉家族、藍色來自鐵Fe²⁺和鈦Ti⁴⁺之間的電荷轉移、最受追捧的「矢車菊藍」Cornflower Blue產自喀什米爾Kashmir——已於1930年代基本開採殆盡、目前市場上流通的喀什米爾藍寶石幾乎全部來自古董珠寶）、祖母綠（Emerald——綠柱石家族、綠色來自鉻Cr³⁺和釩V³⁺、最優質產自哥倫比亞——祖母綠幾乎總是含有肉眼可見的內含物（被浪漫地稱為Jardin「花園」），無瑕的祖母綠極其稀有且價格可能超越同等質量的鑽石）\",\n\n  'jw2': \"\n• 愛馬仕的鞍針縫法（Saddle Stitch）詳解：使用一根線和兩根針——第一針從皮革正面穿過到背面→在背面將線拉出一半→第二根針從背面穿過到正面（在相鄰的針孔）→將兩根針穿過同一個線環→拉緊→重複。這種縫法的優點在於：即使某一針的線被磨斷，整條縫線也不會全部散開（因為每一針都是獨立的環結）——這也是馬鞍縫法最初被設計用於馬鞍（需要承受極大張力）的原因。相比之下，機器縫線一旦斷裂就會整條散開\n• 戈雅（Goyard）的Goyardine帆布製作工藝：標誌性的人字紋（Chevron）三維立體圖案並非機器印刷或壓花——而是手工使用鏤空模板（Stencil）一層一層地在帆布上逐點繪製（Point by Point）。每個顏色的點都是分開的工序——三色Goyardine需要三層獨立的點繪。這種極其耗時的工藝使得每一塊Goyardine帆布都是獨一無二的，也是戈雅從不進行大規模廣告宣傳和線上銷售（直到近年才有限度開放）的原因——產能有限到根本不需要廣告來拉動需求\n• 戴爾沃（Delvaux）的歷史深度：創立於1829年（比比利時建國（1830年）還早一年、比愛馬仕（1837年）早8年、比路易威登（1854年）早25年），是全球最古老的奢華皮具品牌。1875年戴爾沃開始使用皮革（此前為旅行箱製造商），1883年成為比利時皇家供應商。標誌性手袋Le Brillant於1958年由建築師Paule Goethals設計——其建築感十足的馬鞍形扣環是對比利時超現實主義藝術傳統（馬格利特的家鄉）的致敬"},{"id":"am-canada","title":"加拿大","content":"聯邦制君主立憲議會民主，世界面積第二大國（約998萬平方公里）。官方雙語（英語和法語）——魁北克省以法語為主要語言。多元文化主義為國策——每年約接納40萬新移民，多倫多約50%人口出生於國外。豐富自然資源：石油（油砂儲量全球第三）、天然氣、礦產、木材。AI研究實力雄厚（多倫多大學Geoffrey Hinton被譽為深度學習之父之一，2018年圖靈獎）。全民醫療保健Medicare為社會福利核心。多倫多大學、麥基爾大學、UBC為全球頂尖研究型大學。\n\n• 加拿大的多元文化主義政策：1971年成為世界上第一個正式實行多元文化主義（Multiculturalism）為國策的國家，1988年通過《加拿大多元文化主義法案》。2023年加拿大約23%的人口出生於國外（G7國家中最高），每年接納約40–50萬新移民，多倫多約51%的人口出生於國外（全球最多元化的城市之一）\n• 加拿大的自然資源：石油儲量全球第三（約1700億桶，其中約97%以油砂Oil Sands形式存在於亞伯達省——開採成本高於傳統石油且碳排放強度更高）。淡水資源約佔全球可再生淡水供應的約20%（五大湖Great Lakes儲存了全球約21%的地表淡水）。森林覆蓋率約38%，林業是主要出口產業之一"},{"id":"am-brazil","title":"巴西","content":"聯邦制總統制共和國，拉丁美洲面積最大人口最多國家（約2.15億人）。首都巴西利亞（1960年從里約遷都至此的現代主義規劃城市）。金磚國家BRICS創始成員。全球最大咖啡、大豆、牛肉和糖出口國之一。足球王國——五次世界盃冠軍（全球最多），球王比利。里約狂歡節Carnival為世界最盛大節慶。亞馬遜雨林（約60%在巴西境內）被稱為「地球之肺」——面積約550萬平方公里。挑戰：收入不平等（基尼係數約0.53為全球最高之一）、森林砍伐。\n\n• 亞馬遜雨林的關鍵數據和生態價值：亞馬遜雨林面積約550萬平方公里（約60%在巴西境內），被稱為「地球之肺」——產生全球約6–9%的氧氣、儲存約1000億噸碳（相當於全球約10年的碳排放量）。亞馬遜是地球上生物多樣性最豐富的生態系統——棲息著約300萬種物種（包括約2500種魚類、約1300種鳥類、約430種哺乳動物和約40000種植物），其中許多物種尚未被科學記錄\n• 巴西足球的輝煌歷史：五次世界盃冠軍（1958、1962、1970、1994、2002年——全球最多），是唯一參加了所有22屆世界盃決賽圈的國家。球王比利（Pelé，1940–2022）是唯一三次獲得世界盃冠軍的球員（1958年17歲、1962年、1970年），職業生涯打入約1283球（包含友誼賽）。巴西足球的「Joga Bonito」（美麗足球）風格——以個人技巧、創造性、節奏和快樂為核心——深刻影響了全球足球文化"}]}]},{"id":"lifestyle","title":"日常品味","icon":"🍷","color":"#C4B5FD","description":"提升生活品質的品味修養——品酒、茗茶、咖啡鑑賞與世界精品品牌完全指南","topics":[{"id":"wine","title":"品酒","category":"lifestyle","description":"葡萄酒與威士忌的完整世界——產區、釀造工藝與專業品鑑體系","icon":"🍷","sections":[{"id":"w1","title":"法國經典產區","content":"波爾多：以紅酒為主（約89%產量）。左岸（梅多克、格拉夫）以卡本內蘇維濃為主——強勁單寧、黑醋栗和雪松風味。1855年分級將梅多克酒莊分為五級：拉菲、拉圖、瑪歌、木桐（1973年由二級升一級，是分級設立以來唯一一次級別調整）、侯伯王位列一級莊。右岸（聖艾美濃、波美侯）以梅洛為主，較柔和圓潤——波美侯的帕圖斯（Pétrus）雖無正式列級，卻因極度稀有和高昂價格被公認為波爾多乃至全球最頂尖酒款之一。布根地：以對風土Terroir（土壤、微氣候、坡度、日照和釀酒傳統的綜合體）的最極致推崇聞名——以葡萄園地塊Climat而非酒莊分級。33個特級園Grand Cru中，羅曼尼·康帝（Romanée-Conti，葡萄園僅1.81公頃，年產約450箱）被認為是世界最好和最昂貴的葡萄酒——一瓶超過2萬美元。核心品種：黑皮諾（全世界最難伺候的葡萄品種）和夏多內。","subs":[{"id":"w1a","title":"香檳區與其他重要產區","content":"香檳區以傳統法（瓶中二次發酵）釀造氣泡酒——酩悅Moët & Chandon、凱歌Veuve Clicquot、庫克Krug、水晶香檳Louis Roederer Cristal等品牌地位卓著。阿爾薩斯（Alsace）：以芳香型白葡萄品種（麗絲玲Riesling、瓊瑤漿Gewürztraminer）聞名。羅亞爾河谷（Loire Valley）：多樣風格——從Muscadet的清爽礦物感到Sancerre的白蘇維濃。隆河谷（Rhône Valley）：北隆以Syrah為主（如Côte-Rôtie和Hermitage），南隆以Grenache為主的混釀（如Châteauneuf-du-Pape）。"}]},{"id":"w2","title":"專業品鑑方法論","content":"WSET（葡萄酒與烈酒教育信託基金）系統性品鑑法SAT：視覺（傾斜45度觀察澄清度、色調——年輕紅酒紫紅轉寶石紅，陳年後石榴紅→磚紅→褐色；白酒從淺檸檬綠到琥珀色）、嗅覺（靜止→旋轉酒杯釋放香氣——一類品種香（果味）、二類發酵香（橡木桶的香草/烤麵包）、三類陳年香（蘑菇/皮革/蜂蜜/汽油（陳年麗絲玲典型特徵））、味覺（酸度/單寧澀感/酒體輕盈至豐滿/餘味持續時間——長於15秒為高品質標誌）、整體平衡感——優秀葡萄酒如同優秀交響樂，沒有元素過於突兀，所有聲音服務於整體和諧。"},{"id":"w3","title":"威士忌世界","content":"蘇格蘭威士忌法規定義嚴格：必須在蘇格蘭蒸餾、使用水和發芽大麥（可添加其他穀物）、在橡木桶中陳年至少三年、裝瓶酒精度不得低於40%。五大產區：斯貝賽Speyside（優雅甜美果香，麥卡倫為拍賣市場最昂貴威士忌瓶裝記錄保持者之一）、高地Highlands（風格多樣從北高地的石楠花蜜到南高地的水果蛋糕）、低地Lowlands（最輕柔，草香和花香）、艾雷島Islay（強烈泥煤煙燻——Ardbeg和Laphroaig可達40–55 ppm酚含量，碘/海藻風味，因當地以富含泥煤的火烘乾麥芽）、坎貝爾鎮Campbeltown（曾經30多家蒸餾廠的「世界威士忌之都」，今僅存三家，以Springbank雲頂最知名）。"}]},{"id":"tea","title":"品茶","category":"lifestyle","description":"中國六大茶類與日本茶道的完整鑑賞體系","icon":"🍵","sections":[{"id":"t1","title":"中國六大茶類","content":"按發酵程度從低到高：1）綠茶（不發酵——龍井（以80℃水沖泡，十大手工炒製手法）、碧螺春（康熙賜名）、黃山毛峰），保留最多天然物質、滋味鮮爽。2）白茶（微發酵5–10%——白毫銀針（僅採肥壯茶芽滿披白絨毛）、白牡丹），製作最簡單（萎凋→乾燥），越陳越香。3）黃茶（輕發酵——君山銀針，獨特的「悶黃」工藝），產量極稀少。4）烏龍茶/青茶（半發酵15–70%——大紅袍（武夷岩茶之王，母樹僅六株已有360餘年歷史，2006年起禁止採摘）、鐵觀音（福建安溪，「觀音韻」蘭花香）、凍頂烏龍（台灣南投），「綠葉紅鑲邊」形成於做青工序（搖青和晾青交替進行）。5）紅茶（全發酵——正山小種（約1568年明朝，世界紅茶鼻祖，無意中以松木明火烘乾創造了獨特煙燻風味Lapsang Souchong。）、祁門紅茶（三大高香紅茶之一，獨特的「祁門香」）。6）黑茶（後發酵——普洱茶，微生物（主要是黑麴黴Aspergillus niger）的渥堆發酵，生茶在適宜條件下陳化數十年價值可達數十萬至數百萬元）。"},{"id":"t2","title":"工夫茶藝與日本茶道","content":"工夫茶盛行於福建、廣東潮汕及台灣——紫砂壺/蓋碗、茶水比1:20–1:30、水溫因茶而異（綠茶80℃、烏龍100℃）、沖泡時間精確控制（第一泡約20秒，好的烏龍可泡7–10次）。品茶講究「觀色、聞香、品味」三步。日本茶道由千利休（1522–1591）集大成——核心理念「和敬清寂」：和（和睦）、敬（尊重）、清（清淨）、寂（靜寂）。茶道中的「一期一會」概念——每一次茶會都是獨一無二、不可重現的相遇——深刻影響了日本美學和人生哲學。\n\n• 日本茶道的美學原則（千利休總結的「七則」）：1）茶要點得合口（茶的味道要讓客人感到舒適）；2）炭要放得能使水燒開（實用性的美）；3）花要插得如在原野（茶花Chabana要呈現植物在自然中生長的狀態——不對稱、不完美、有生命感）；4）夏天要使人感到涼爽、冬天要使人感到溫暖（對季節的敏感和體貼）；5）凡事要比約定時間提前（守時和從容）；6）即使不下雨也要準備雨具（未雨綢繆）；7）對客人要用心（賓客之間的互相關懷）\n• 日本茶道中的「侘寂」（Wabi-Sabi）美學：侘（Wabi）——簡樸、寂靜、在孤獨中發現的美；寂（Sabi）——時間流逝所賦予的韻味（銅鏽、木頭的包漿、陶器的裂紋）。茶碗中尤其推崇不均勻、不對稱、有瑕疵的「樂燒」（Raku——由千利休委託陶工長次郎創製，以手捏成形、低溫燒製，每個都是獨一無二的）。侘寂的核心精神：在殘缺和不完美中發現真正的美——與西方追求對稱、完美和永恆的美學形成鮮明對比"}]},{"id":"coffee","title":"咖啡","category":"lifestyle","description":"從阿拉比卡豆產地到九種沖煮方式的完整知識體系","icon":"☕","sections":[{"id":"co1","title":"咖啡豆品種與產地風味","content":"兩大主要品種：阿拉比卡Arabica（約佔全球70%產量，生長於中高海拔600–2000米，風味複雜、酸度明亮，是精品咖啡基礎）和羅布斯塔Robusta（低海拔，咖啡因含量為阿拉比卡約兩倍，苦味較重，常用於義式濃縮拼配以增加Crema和口感）。精品咖啡主要產地風味特徵：衣索比亞（咖啡起源地——耶加雪菲Yirgacheffe產區最著名，茉莉花香、柑橘類水果風味、茶感）、哥倫比亞（平衡典範——焦糖甜、堅果味、中等酸度）、巴西（巧克力、堅果、低酸——經典義式基底）、肯亞（強烈黑醋栗和莓果風味，酸度明亮如葡萄酒）、印尼蘇門答臘（曼特寧——草本、香料、醇厚度極高、極低酸度，以獨特的濕刨法Giling Basah處理）、巴拿馬（翡翠莊園藝伎Geisha品種——花香爆炸、茉莉花和佛手柑，拍賣價格屢創紀錄——2023年最佳巴拿馬拍賣會中藝伎咖啡以每磅超過1萬美元的價格成交）。"},{"id":"co2","title":"沖煮方法與義式飲品","content":"手沖Pour Over（V60濾杯/Kalita Wave/Chemex，水溫92–96℃最佳，粉水比約1:15–1:17，研磨度中等偏細如海鹽）。法壓壺French Press（浸泡式萃取、研磨最粗、萃取4分鐘——能保留咖啡油脂產生更醇厚口感）。愛樂壓AeroPress（結合浸泡和壓力，萃取時間短僅1–2分鐘，便攜且容錯率高——甚至有世界愛樂壓錦標賽）。虹吸壺Siphon（利用蒸汽壓力和真空原理，視覺效果極具觀賞性——像化學實驗的咖啡儀式）。冷萃Cold Brew（冷水浸泡12–24小時，酸度極低、口感絲滑，咖啡因含量高）。義式濃縮Espresso（以9巴壓力將92℃水壓過極細研磨咖啡粉，25–30秒萃取約30ml——Crema金黃色泡沫為萃取良好標誌）。義式飲���家族：美式Americano（濃縮+熱水稀釋）、拿鐵Latte（濃縮+蒸牛奶+少量奶泡）、卡布奇諾Cappuccino（濃縮+蒸牛奶+厚奶泡，傳統比例1:1:1）、Flat White（起源於澳洲/紐西蘭，濃縮+絲絨般微泡牛奶，咖啡味更突出）、瑪琪雅朵Macchiato（濃縮+一小勺奶泡標記）。"}]},{"id":"fashion","title":"服裝與時尚","category":"lifestyle","description":"高級訂製工藝、經典品牌譜系與時尚產業生態","icon":"👗","sections":[{"id":"f1","title":"高級訂製（Haute Couture）","content":"高級訂製是受法國法律保護的專有名詞——只有獲得法國工業部認證並符合嚴格標準的品牌才能使用：必須在巴黎擁有工作室（Atelier）、至少僱用15名全職工匠、每季展示至少25套原創設計、全部手工製作並為客戶量身訂製。一件高級訂製禮服可能需要數百甚至數千小時手工（刺繡由Lesage刺繡工坊完成、羽飾由Lemarié工坊製作、褶襉和蕾絲等極精細工藝）。目前僅約十餘個品牌持有一級高級訂製會員資格——Chanel、Dior、Givenchy、Jean Paul Gaultier等。全球僅約2000名客戶（其中相當部分來自中東和海灣地區），是時尚體系中創意和工藝的最高燈塔。","subs":[{"id":"f1a","title":"經典品牌：Chanel與Dior","content":"香奈兒Chanel（可可·香奈兒，1883–1971）：以簡約優雅解放女性身體——將男裝元素引入女裝、以Jersey針織面料製作舒適服裝、1926年推出小黑裙Little Black Dress（黑色此前僅為喪服顏色）、香奈兒2.55手袋和No.5香水成為永恆經典。老佛爺卡爾·拉格斐自1983年起掌舵36年至2019年去世。迪奧Dior（克里斯汀·迪奧）：1947年推出「新風貌」New Look——圓肩、極纖細腰身、蓬大長裙（有些裙子面料超20米），在戰後物資短缺年代引發爭議同時重新喚起女性對優雅和美的渴望。歷任創意總監——伊夫·聖羅蘭、約翰·加利亞諾、拉夫·西蒙等都在品牌歷史上留下深刻印記。"}]},{"id":"f2","title":"其他經典品牌","content":"愛馬仕Hermès（1837年創立於巴黎馬具作坊）：以極致工匠精神（一個柏金包Birkin Bag由一位工匠耗時18–24小時手工製作、使用鞍針縫法Saddle Stitch雙針交叉縫合）、稀有材料和嚴格產量控制著稱。凱莉包Kelly Bag因葛蕾絲·凱莉王妃得名。路易威登Louis Vuitton（1854年）：Monogram帆布（1896年設計，品牌縮寫LV和花卉圖案）是世界最為人知的奢侈品圖案。1997年馬克·雅各布斯擔任首位創意總監將品牌從旅行箱製造商轉型為全面時尚品牌，開創高端品牌與當代藝術家合作先河（村上隆、草間彌生等）。Gucci（佛羅倫斯，1921年）：以雙G標誌、紅綠織帶（Web Stripe，靈感來自馬鞍腹帶）和馬銜扣樂福鞋（Horsebit Loafer）為標誌性設計元素。Prada（米蘭，1913年）：以黑色尼龍面料（原為軍用帳篷材料）顛覆了奢侈品必須使用天然材料的傳統認知。Bottega Veneta（1966年，維琴察）：以Intrecciato皮革編織工藝聞名——「當你的標誌足夠獨特時，你不需要Logo」。"}]},{"id":"cars","title":"汽車品牌","category":"lifestyle","description":"頂級豪華與性能汽車的造車藝術——從勞斯萊斯到法拉利","icon":"🏎️","sections":[{"id":"car1","title":"終極豪華：勞斯萊斯","content":"勞斯萊斯（1906年查爾斯·勞斯和亨利·萊斯創立於英國，2003年被BMW收購）被認為是世界上最精緻的汽車品牌。Phantom幻影旗艦車型的極致手工工藝：車身44,000多種漆色選項全部人工手動噴塗（約45公斤油漆、五層噴塗和手工打磨拋光、耗時約7天完成）。車內皮革來自約8–10張阿爾卑斯山區高海拔牧場的上等牛皮（高海拔=較少蚊蟲叮咬、幾乎無瑕疵），約18天鞣製和染色。標誌性Starlight Headliner星空頂篷——工匠手工在皮革車頂內襯穿入約800–1,600根光纖以模擬夜空繁星，甚至可按客戶要求定製特定日期和地點（如結婚日/生日）的真實星空排列。車頭的歡慶女神Spirit of Ecstasy立標是最具標誌性的汽車符號之一——浪漫起源故事（可能為傳說）：雕塑家查爾斯·賽克斯以貴族約翰·蒙塔古勳爵的秘書（也是情人）埃莉諾·桑頓為原型創作。賓利Bentley（1919年創立，現屬福斯集團）更強調運動性能與奢華的結合——Continental GT是品牌最成功的車型系列。"},{"id":"car2","title":"超級跑車：法拉利與藍寶堅尼","content":"法拉利Ferrari（1947年恩佐·法拉利創立於義大利馬拉內羅）：賽車（特別是F1——法拉利是唯一參加了F1全部賽季的車隊）和量產超跑的傳奇品牌。躍馬標誌（原為一戰義大利王牌飛行員弗朗西斯科·巴拉卡的個人標誌）、標誌性紅色Rosso Corsa賽車紅和獨特的V12自然進氣引擎聲浪組成汽車文化的經典符號。藍寶堅尼Lamborghini（1963年費魯喬·藍寶堅尼創立）：起源故事——拖拉機製造商費魯喬因不滿自己法拉利離合器的品質而向恩佐·法拉利投訴，被恩佐傲慢回絕後決心創立自己的超跑品牌。Countach（1974–1990）以極具未來感的楔形設計和鍘刀門定義了1970–80年代超跑美學。Aventador（2011–2022）標誌性V12引擎和鍘刀門成為全球最暢銷的V12超跑之一。布加迪Bugatti（1909年創立於法國Molsheim，現屬福斯集團）：以極致工程技術聞名——Chiron Super Sport 300+（2019年）成為首款突破300英里/小時（483公里/小時）的量產車。"}]},{"id":"watches","title":"鐘錶鑑賞","category":"lifestyle","description":"高級製錶的終極藝術——機芯工藝、複雜功能與頂級品牌","icon":"⌚","sections":[{"id":"wa1","title":"三大複雜功能","content":"陀飛輪Tourbillon（寶璣1801年獲得專利）：將整個擒縱機構放置在旋轉框架中（通常每分鐘旋轉一圈），以抵消地心引力對擺輪和遊絲的誤差——陀飛輪框架通常包含約40個組件，總重量不到1克，製作所要求的極致微機械工藝使其成為高級製錶工藝的終極展示。三問報時Minute Repeater（最難最考驗工藝的複雜功能）：推動滑桿後腕錶以不同音調的敲擊在微型音簧上報出小時（低音）、刻鐘（高-低交替音）和分鐘（高音）——每個三問腕錶聲音都獨一無二（音簧長度/厚度/材質/硬化處理工藝、錘子大小/形狀和錶殼聲學特性共同決定音質）。百達翡麗每枚三問腕錶出廠前都必須由總裁親自試聽確認音質。萬年曆Perpetual Calendar：能自動識別每月不同天數（28/29/30/31天）和閏年週期，機械記憶程序基於為期四年（48個月/1461天）的凸輪程序——理論上在2100年前不需調校（2100年雖可被4整除但非閏年——因世紀年只有能被400整除的才是閏年，而大多數萬年曆機械程序無法處理此例外）。"},{"id":"wa2","title":"頂級品牌譜系","content":"百達翡麗Patek Philippe（1839年創立於日內瓦，由斯登家族自1932年私有經營至今）：被公認為腕錶世界王者——核心價值在於極致傳統手工工藝，每個零件（包括看不見的內部零件）都經精細手工打磨修飾（倒角Anglage、日內瓦波紋Côtes de Genève、圓形打磨Perlage和黑色拋光Black Polish——鋼製零件的鏡面級拋光，特定角度下呈現完全黑色而非反射光線）——被稱為「隱形之美」Invisible Beauty。百達翡麗日內瓦印記（自2009年取代Geneva Seal，涵蓋整枚腕錶而非僅機芯）。拍賣市場絕對統治者——2014年為小亨利·格雷夫斯定製的超級複雜功能懷錶（24項複雜功能、八年製作）以約2400萬瑞士法郎創時計拍賣世界紀錄。愛彼Audemars Piguet（1875年創立於瑞士汝山谷）：皇家橡樹Royal Oak（1972年，傳奇設計師杰拉德·尊達在一天內設計完成——靈感來自老式潛水頭盔的八角形舷窗和暴露的螺絲）開創了奢華不鏽鋼運動腕錶的全新品類——在1972年前不鏽鋼被認為是廉價材質，皇家橡樹售價比許多金錶還貴，大膽挑戰傳統認知並取得巨大商業成功。"}]},{"id":"jewelry","title":"珠寶與皮具","category":"lifestyle","description":"頂級珠寶工藝、經典設計與皮革藝術的終極指南","icon":"💎","sections":[{"id":"jw1","title":"頂級珠寶品牌","content":"卡地亞Cartier（1847年創立於巴黎）：被英王愛德華七世譽為「皇帝的珠寶商，珠寶商的皇帝」。Tank坦克腕錶（1917年，靈感來自一戰雷諾坦克的俯視形狀）是最經典腕錶設計之一——從戴安娜王妃到安迪·沃霍爾都是其佩戴者。Love手環（1969年Aldo Cipullo設計，以螺絲鎖扣為標誌——寓意鎖住愛情，需要專用螺絲刀打開）是最為人知的珠寶設計之一。蒂芙尼Tiffany & Co.（1837年創立於紐約）：以標誌性「知更鳥蛋藍」Tiffany Blue（Pantone 1837，Tiffany專屬顏色，其他品牌禁止使用）和珍稀鑽石（包括128.54克拉的Tiffany Diamond黃鑽，僅有四位女性佩戴過——奧黛麗·赫本在《蒂芙尼的早餐》宣傳中最為著名）聞名全球。寶格麗Bulgari（1884年創立於羅馬）：以古羅馬和希臘文化為靈感、大膽的色彩組合和獨特的Serpenti蛇形設計聞名。"},{"id":"jw2","title":"頂級皮具品牌","content":"愛馬仕Hermès皮具工藝：使用頂級皮革——Box小牛皮（光滑硬挺、標誌性光澤）、Togo小牛皮（柔軟、粒面紋理，柏金包最受歡迎皮質）、Clemence（比Togo更柔軟垂墜）、Epsom（壓紋牛皮、輕便抗刮）以及極其稀有的Porosus灣鱷、Niloticus尼羅鱷等珍稀皮。鞍針縫法Saddle Stitch是愛馬仕標誌性手工縫線——雙針交叉縫合，即使一處斷線也不會全部散開。每位皮具工匠都需經數年培訓才能獨立製作高端手袋。戈雅Goyard（1853年創立於巴黎，比LV早一年）：以低調奢華定位聞名——從不打廣告、不線上銷售、標誌性Goyardine帆布（三維立體人字紋圖案）是手工逐點繪製而成。戴爾沃Delvaux（1829年創立於比利時，全球最古老的奢華皮具品牌）：比利時皇家供應商，以Le Brillant手袋（1958年設計，建築感十足的馬鞍形扣環）最為著名。"}]}]}];// ── RENDER ──
function renderCategories() {
  const grid = document.getElementById('categoriesGrid');
  grid.innerHTML = categories.map(c => `
    <div class="cat-card" onclick="openCategory('${c.id}')">
      <div class="cat-icon" style="background:${c.color}15">${c.icon}</div>
      <div class="cat-title">${c.title}</div>
      <div class="cat-count">${c.topics.length} 個主題</div>
    </div>
  `).join('');
}

function openCategory(catId) {
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  const topicView = document.getElementById('topicView');
  const homeView = document.getElementById('homeView');

  topicView.innerHTML = `
    <div class="back-row">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="breadcrumb" style="background:${cat.color}15;color:${cat.color}">${cat.icon} ${cat.title}</div>
    </div>
    <div class="section-title">主題列表（${cat.topics.length}）</div>
    ${cat.topics.map(t => `
      <div class="cat-card" style="text-align:left;padding:16px;margin-bottom:10px" onclick="openTopic('${cat.id}','${t.id}')">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:44px;height:44px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px">${t.icon}</div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:15px;color:var(--text)">${t.title}</div>
            <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;line-height:1.4">${t.desc}</div>
          </div>
          <span style="font-size:20px;color:var(--primary-pale)">›</span>
        </div>
      </div>
    `).join('')}
  `;

  homeView.classList.add('hidden');
  topicView.classList.add('active');
  document.getElementById('contentArea').scrollTop = 0;
}

function openTopic(catId, topicId) {
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  const topic = cat.topics.find(t => t.id === topicId);
  if (!topic) return;

  const topicView = document.getElementById('topicView');
  topicView.innerHTML = `
    <div class="back-row">
      <button class="back-btn" onclick="openCategory('${catId}')">←</button>
      <div class="breadcrumb" style="background:${cat.color}15;color:${cat.color}">${cat.icon} ${cat.title}</div>
    </div>
    <div class="topic-header">
      <div class="topic-h1">${topic.icon} ${topic.title}</div>
      <div class="topic-desc">${topic.desc}</div>
      <div class="topic-actions">
        <button class="action-btn" id="bookmarkBtn" onclick="toggleBookmark(this, '${topicId}')">☆ 收藏</button>
        <button class="action-btn" onclick="showToast('📥 文章已儲存為離線閱讀')">📂 離線閱讀</button>
      </div>
    </div>
    <div class="accordion" id="accordionRoot">
      ${topic.sections.map((s, i) => renderSection(s, 0, i)).join('')}
    </div>
  `;
  document.getElementById('contentArea').scrollTop = 0;

  // Open first level by default
  document.querySelectorAll('.accordion-item.depth-0').forEach(item => item.classList.add('open'));
}

function renderSection(section, depth, index) {
  const hasSubs = section.subs && section.subs.length > 0;
  const depthClass = `depth-${Math.min(depth, 3)}`;
  return `
    <div class="accordion-item ${depthClass} ${depth === 0 ? 'open' : ''}">
      <div class="accordion-header" onclick="toggleSection(this.parentElement)">
        ${hasSubs
          ? `<span class="arrow">▶</span>`
          : `<span class="dot"></span>`
        }
        <span class="accordion-title">${section.title}</span>
      </div>
      <div class="accordion-body">
        ${section.content ? `<div class="accordion-content">${section.content}</div>` : ''}
        ${hasSubs ? section.subs.map((sub, i) => renderSection(sub, depth + 1, i)).join('') : ''}
      </div>
    </div>
  `;
}

function toggleSection(item) {
  item.classList.toggle('open');
}

function goHome() {
  const topicView = document.getElementById('topicView');
  const homeView = document.getElementById('homeView');
  topicView.classList.remove('active');
  homeView.classList.remove('hidden');
  document.getElementById('contentArea').scrollTop = 0;
}

function toggleBookmark(btn, topicId) {
  btn.classList.toggle('bookmarked');
  if (btn.classList.contains('bookmarked')) {
    btn.innerHTML = '⭐ 已收藏';
    showToast('⭐ 已加入收藏');
  } else {
    btn.innerHTML = '☆ 收藏';
    showToast('已取消收藏');
  }
}

function searchInSections(sections, query) {
  if (!sections) return false;
  for (const s of sections) {
    if ((s.title||'').toLowerCase().includes(query)) return true;
    if ((s.content||'').toLowerCase().includes(query)) return true;
    if (s.subsections && searchInSections(s.subsections, query)) return true;
    if (s.subs && searchInSections(s.subs, query)) return true;
  }
  return false;
}

function handleSearch() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const resultsDiv = document.getElementById('searchResults');
  const homeView = document.getElementById('homeView');

  if (!query) {
    if (resultsDiv) resultsDiv.remove();
    return;
  }

  const results = [];
  categories.forEach(cat => {
    cat.topics.forEach(topic => {
      if (topic.title.toLowerCase().includes(query) ||
          topic.desc.toLowerCase().includes(query) ||
          searchInSections(topic.sections, query)) {
        results.push({ topic, cat });
      }
    });
  });

  let existing = document.getElementById('searchResults');
  if (existing) existing.remove();

  if (results.length === 0) return;

  const div = document.createElement('div');
  div.id = 'searchResults';
  div.style.cssText = 'margin-bottom:16px;animation:fadeSlideIn 0.3s ease';
  div.innerHTML = `
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">找到 ${results.length} 個相關主題</div>
    ${results.map(r => `
      <div class="cat-card" style="text-align:left;padding:14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between" onclick="openTopic('${r.cat.id}','${r.topic.id}')">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:20px">${r.topic.icon}</span>
          <div>
            <div style="font-weight:600;font-size:14px">${r.topic.title}</div>
            <span style="font-size:11px;padding:2px 8px;border-radius:6px;background:${r.cat.color}15;color:${r.cat.color}">${r.cat.title}</span>
          </div>
        </div>
        <span style="font-size:18px;color:var(--primary-pale)">›</span>
      </div>
    `).join('')}
  `;
  homeView.insertBefore(div, homeView.firstChild);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
}

// Init
renderCategories();
</script>
</body>
</html>
